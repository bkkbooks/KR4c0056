body:
  text: 銘棧道銘并序秦之坤蜀之艮連髙夾深九州之險也隂谿窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉㝠㝠麋鹿無蹊猿猱相望自三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間夐不相接且秦之與蜀也人一其性物周所宜嗜慾無餘源教化無餘門可貿遷可親眤擘坼地脉睽離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不周迴翔有所不合澄結既定窾缺生乎其中西南有漏天天之窾缺也于斯有兹地地之窾缺也天地也者將以上覆下燾含蓄萬靈可通必使而通者也苟有可通而未通則聖賢代其工而通之故有為舟以濟川為梯以踰山唯兹地有川不可以舟涉有山不可以梯級粤有智慮以全𤣥造立巨衡而舉追氏縋懸纑以下梓人猿垂絶㝠鳥傍危岑鑿積石以金刀梁半空於木用斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅勁膠固雲横砥平總庸蜀之通塗統岐雍之康莊都邑之能步山川之無脛若水决防如鴻向陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣遙達人神㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而吹以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下招德在乎義德義之道如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下蚩蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯者荷古人之攸作銘曰天覆地燾本亦同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦惟南則蜀地缺其間坤維不續斗超岸斷屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡勁無蹊以道若川匪舟若陸匪車緣危轉虚步驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我營自顛而植地非革勢才不易林踣植之致惠怨之心勿為斯道不恒勿為斯道可乆禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之物若茲彼知不易兹而易知勒銘道左其同我思陶器銘并序嘗侍論於長者儳有之曰近代之作玉杯麗則麗矣愚以不如古人之為陶器長者韙之以為知言退而思其所自多亦不沗伊人之譽器以利用道從易簡利用者貴無往而不適易簡者取立功而匪勤今天下之至富者土也不勞而成者火也夫陶掬壤以製焚蒸以凝就其不勞因其至富不瑩而冰清珠晥不鍜而金固石堅一工致功千室以給􅷴鬲罍甗缾缶盃盂大窮儋石小極圭撮經鼎鑊而自若在燀爇而莫渝滿堂絶侈靡之譏提挈無剽殺之患其功則易簡也其實則利用也其藏又保安也易簡二儀之理利用五行之本保安立身之方執人之方履物之本從天地之理此三皇五帝所以内户不扃外户不閉無為之德所由生也豈夫玉杯之獨劣其餘孰得而儔焉則刓材搜璞窮山越壑礱磨雕琢鑄鍊丹雘力盡終年之功財殫不訾之産量纔升合質忌湯火寘家得奢盈之議中懷生賊害之累其功則非易簡也其實則非利用也其藏又非保安也悖二儀之理違五行之本乖立身之方此夏桀商紂所以人人頗邪比屋可戮亡身之禍所由生也省費鮮勞皆備於物德且如彼而人賤之煩人蠧財不周於用禍又如此而人貴之久矣哉世之迷也物有賤而可貴亦有貴而可賤惟賢者能審之小子不幸億而有中誠背常人之見故為銘以廣之銘曰黜汚易抔聖人製器易簡作程利用為貴稽諸往載函實攸興裁因掬壤成假焚蒸不雘不丹不雕不刻自結金堅天然冰色財無害産功匪殫力量盡洪纎用窮幽仄物有千金相異我取不費為利物有積功相崇我取不勞為工物有患湯忌火我取往無不可物有剽殺焚軀我取懷藏不虞心存目視奢尋彼至室滿堂盈侈莫我生省庸周用所賤謂何價售勤人所貴者那可貴不貴物失其類失類曰昏雖隆必墜可賤不賤物得其選得選曰明雖幽必見上惟五帝下相三王實有以興亦有以亡蚩蚩百工孰若我陶敬銘有器永告滔滔有唐故銀青光祿大夫行平州别駕馬公墓銘并序嗚呼死也者君子曰終有唐興元二年六月二十四日銀青光祿大夫行平州别駕馬公終于京師國喪英才家亡令子家國不幸痛實可知公諱某字某其先京兆扶風人始實趙氏累葉繼將多總戎塞下有以因居今為燕之名流曾祖某某官祖某某官父某某官公則某官第某子也積奕世忠貞之慶得隂方嚴勁之氣天骨山峻神葱玉輝有孝有悌閨門以和有信有義州閭以附矛㦸韞器風雲馳聲燕趙多竒士公其人也用正直奉籌畧擁旄杖節者尊以果斷行正令擐甲執兵者伏前後佐全師大幕不有暫寧方將張翼翔雲揚鬐遊溟大命不永大病遄及享年三十三秦氏醫遲顔生禍促哀哉夫人某處某氏子二人長曰縱次曰緒永思之感至性過人以貞元十二年歲在某月某日大通卜宅于京兆某鄉某里某原禮也天長地久堙川塹阜于何不有乃為銘德而誌墓云士比常才如瑜在岷燕趙多竒公則其人業繼忠貞識資籌略器流瑚璉羽族雕鶚題輿大郡佐律雄師雖猶枉德亦匪孤時南仰摶鵬更期遐颺東觀逝水忽兹永往卜遠斯及窆于此岡惟宅惟安天長地長有唐故朝議郎行鄂州司倉㕘軍楊公墓誌銘并序公諱某字某其先闗右𢎞農人永嘉過江公自始遷之祖若干代處於閩越曾祖某皇唐循州司馬祖某漳州長史父某泉州南安縣丞公則南安第若干子長七尺骨目瓌異温良節行所至自昭風神識度羣居不掩六籍外偏好穰苴管子之術永泰中以耕戰之法致梁宋軍畫用有成大厯元年節度使右僕射田公薦授左武衛率府倉曹叅軍事在位以貞慎聞公以不仕則墜業躁求則背道或出或處聖人為中依吏部節文敬遵常調大厯八年集授吉州永思縣丞興元元年集授廬州司田叅軍貞元二年授鄂州司倉㕘軍累職貞慎如率府倉曹時每罷官待集卜勝屏居晏如也鄂州秩滿愛其風土亦心焉貞元十二年冬又合集春赴京師遇疾於途以二月四日終於汝州龍興縣之逆旅時年六十七凡入仕三十一年歴官四政祿非豐儉以足務雖劇通以簡上以忠政重下以公平矚皆白珪無玷朱絃有聲嗚呼公之材之量如鐘含音如水待盛大小當應方圓必答我則不衒人胡不求莫能全展光耀以至殞没悲夫夫保性居業時行則行時止則止道也公昔於名官之理是焉士祿農耕猶生則營若死則已亦道也公昨於岐路之役是焉公存以道始亡以道終至人不違道公以之周旋正决乎善始終者也夫人隴西彭氏戴天之感痛以禮成長子晃次子暈季子杲伏凶之號以至見血以年某月日卜葬某鄉某原禮也佳城一閉他時古邱後之人孰知邱中之德墓許有誌故為墓誌銘庶覩今為古者明斯地泉下有君子焉銘曰一種鱗物神則曰龍一種植物貞則曰松楊公於人彼貞彼神藝術潛引温良内克名不稱實祿有負德夭桃信美不能秋敷冬日可愛亦用西徂大期斯來無賢無愚英英楊公與逝川俱下此脩源有形永宅東海西山不易罔易大唐故輔國大將軍兼左驍衛將軍御史中丞馬公墓誌銘并序墓有誌誌有銘誌記也銘名也名人記墓庶髙岸為谷幽壤或呈情當掩者有所歸認斯馬公之墓也公諱實字某其先扶風人生於幽州髙祖某官祖某官父某官若干子皆以雄謀果斷稱公則第三人長八尺有羨鵰姿鶚靈霜嚴壁峻樂而後笑時而後言孝弟忠信分義節槩覩容可見好史學歴代英豪得失皆覈其有不正不直辨論慷慨若加諸已明隂符善司馬法起家為范陽軍要籍本軍疑政畫多自出遷千夫長萬夫長三軍兵馬使莫州近邊戎數為害本軍元帥請統鎮之戎逺逃遁莫人大乂拜御史中丞莫州刺史俄薊州之患如莫州移薊州薊人繼康攝州刺史貞元初本軍之事有大者合議於天子自管内二千石已下擇賢能以公當其選天子異其議竒其詞决所議答于本軍而留近侍拜左驍衛將軍宿衛十一年長松在林利錐處囊森竦頴脱鋒幹獨見天子儲而將用未有所當貞元十四年寢疾其年七月十一日終於京師常樂里之私第出身從事若干年署職蒞官若干政春秋五十一當時俊傑懷材抱器者無不驚呼歎息嗚呼騏驥有騰千騁萬之足伏乎􅇫干將有剸犀截象之鋩閉乎匣將用未用一朝變化為骨燕市入泉延平為知人之痛惜公其比歟夫人鴈門郡田氏之女哭泣之慕痛而中禮子六人男五人一先公四人在曰綬曰縝曰某曰某綬三十八縝年十五其餘幼稚不言可知女二人一人先公一人在四嵗至性攀號感動飛走以其年十一月一日卜葬於京兆府萬年縣洪固鄉延信里司馬村之少陵原禮也其承眷長沙歐陽某執紼及墓就誌而銘曰骨肉歸土賢愚共門英英馬公亦封此原大節大成平生所志貞心壯氣松孤壁峙掄擇雖致材成則未岑崟蒼翠俄摧忽墜脩短無涯傷如之何有唐君子鄭公墓誌銘并序貞元十一年歲次乙亥某月某日清源郡晉江縣君子鄭公年若干終於其居州閭親識逺近漣涕重吉人也嗚呼杞梓植於深林人雖不知不妨其為天下之材也珠玉碎於重泉人雖未玩不妨其喪天下之寳也公之生則深林之材公之歿則重泉之寳不知而有未玩而亡哀哉公諱晚字季實其先宅滎陽永嘉之遷逺祖自江上更徙於閩今為清源晉江人曾祖某官祖某官父某官太夫人同郡潁川陳氏育者三男三女公則長男也自七八嵗則明敏嚴潔無復童心洎十二三則温良貞亮有成人之德既冠儀表可觀孝悌惠和侔於前哲人望無間時譽皆歸鳳不近腥龍多自盤優游仁里四十不試詹有若人之妹獲配於公公太夫人早世妹不逮事則見公霜露之感蒸嘗之敬公尊府君近捐甘㫖妹及同養則見公晨昏之愛縗斬之至奉公居閨門鄉黨者十有五年顧詹於公善良内外兼得受命不永其如命何蘭芬蕙馨或亦中敗惜哉子二人皆㓜公自在日名之曰彦方彦章詹既在京師不遂撫慰來人有述實孺能號妻亦聞哀有過人禮不踰制窆取逺日堂殯三年以貞元十二年某月日永厝於郡城東偏聞儒里常熟湖之北原禮也妹有逺告咨予題誌既忝真懿實舊知人江嶺則遐想象不昧取思芳茂為銘以寄銘曰有斐季實君子之禎忠信温良自㓜而行少不改任長更推誠材植逺林賢産遐壤無知無玩自生自喪骨肉歸土用瘞斯原鳴呼斯永棲君子之魂歐陽行周文集巻四欽定四庫全書歐陽行周文集巻五唐歐陽詹撰
