body:
  text: 記曲江池記水不注川者在藪澤則曰陂曰湖在苑囿則為池為沼苑之沼囿之池力墾而成則多天然而有則寡兹池者其天然歟脩原北峙迴岡旁轉圓環四匝中成窞坎窙窌港洞生泉潝源東西三里而遙南北三里而近當天邑别卜繚垣未繞乃空山之濼曠野之湫然黄河作其左壍清渭為其後洫襃斜右走太一前横崇山濬川鈎結盤護不南不北湛然中渟西北有地平坦彌望五六十里而無窪􅉾紫蓋凝而不散黄旗鬱以常在實陶鈞之至造化之功沙汰一氣之辰財成六合之日既以磽确外為寰宇敞無垠堮以居億兆又選英精内為區域束以襟帶用宅君長若人斯生支體具矣有心以繫其神焉若堂斯考廊廡設矣有室以處其尊焉彼如紫蓋黄旗之氣豈陶鈞造化者用宅君長英精之所耶夫物苟相表裏製必同象泄夫外則廓以靈海導夫内則融乎此湫歴代帝王未得而有豈降巢宅土之後聯綿千百之代建卜都邑不欲合夫天意而居乎將天意尚同其根深蔕固可與終畢者而命處乎故於有隋兆我皇唐之存孕逮其季主營之以湏焉揆北辰以正方度南端而製極墉隍劃趾鈎陳定位地迴帝室湫成厥池既由我署纔成伊去真主巍巍龍盤虎踞爰自中而軌物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則總天府之津液疏皇居之墊隘潢汙入其洞澈銷涎以下澄汙廅隨其佳氣蕩鬱攸而上滅萬户無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎晶如練清明若空俯睇冲融得渭北之飛鴈斜窺澹泞見終南之片石珍木周庇竒華中縟重樓夭矯以縈映危榭巉嵒以輝燭芬芳䕃滲滉瀁電烻凝煙吐靄泛羽遊鱗斐郁郁以閑麗謐徽徽而清肅其涵虚抱景氣象澄鮮有如此者皇皇后辟振振都人遇佳辰於令月就妙賞乎勝趣九重繡轂翼六龍而畢降千門錦帳同五侯以偕至泛菊則因髙乎斷岸祓禊則就潔乎芳沚戲舟載酒或在中流清芬入襟沉昏以滌寒光炫目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文於上空砰輷沸渭神仙奏鈞天於赤水黤藹敷俞天人曳雲霓於𤣥都其洗慮延歡俾人怡懌有如此者至若嬉遊以節宴賞有經則纎埃不動微波以寧熒熒渟渟瑞現祥形其或淫湎以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈與善懲惡有如此者小子幸因受遣觀光上國身不佞而自棄日無名以多暇詢竒覽物得之於斯矚太始之𤣥造訪前跡於碩老天生地成之理識之於性情物義人事之端徴之於耳目夫流惡含和厚生蠲疾則去隂之慝輔陽之德也涵虚抱景氣象澄鮮則藻飾神州芳榮帝宇也延歡滌慮俾人怡悦則致民樂土而安其志也棲神育靈興善懲惡則俗知所勸而重其敎也號惟天邑非可謬創一山一水拳石草樹皆有所謂兹池者其有謂之雄焉意我皇唐湏有此地以居之有此地湏有此池以毗之右至仁之亭毒贊無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而諭夫深則淺矣而有功如彼有德若此代之君子蓋有知之而不述今民無德而稱焉輙粗陳其旨刋諸片石庶元元荷日用之力也貞元五年嵗在己巳夏五月十有五日記太學張博士講禮記記説釋典籍謂之講講之為言耩也如農之耕田疇馬田疇將植而求實雖耕矣必溝分其畦壟嘉穀由是乎生典籍將肄以求明雖習矣必講窮其旨趣儒術由是乎成我國庠春享先師後更月命太學博士清河張公講禮記成儒術也聖祖三刋經九公通其六精於五而禮記在乎其中禮也者御人之大故首于羣籍而講之束脩既行筵肆乃設公就几北坐南面直講抗牘南坐北面大司成端委居於東小司成率屬列於西國子師長序公侯子孫自其館太學師長序鄉大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彦自其館其餘法家墨家書家算家輟業以從亦自其館没堦雲來即集鱗居攅弁如星連襟成帷公先申有禮之本次陳用禮之要正三代損益得失定百家疏義長短鎔乎作者之意注乎學者之耳河傾于懸風落于天清冷灑蕩幽逺無泥所昧鏡徹於靈臺所凝冰釋於心泉後一日聞于朝百司達官造者半後一日聞于都九域知名造者半皆尋聲得器虚來實歸予職在下庠亦掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁拜列當時執簡摳衣者於左偏貞元十四年五月二十七日記福州南澗寺上方石像記萬物闐闐各由襲㳂無襲無㳂而忽以然苟非妖怪實為珍慶斯石像者其珍慶歟始孕靈韞質兆朕未見則峨峨巨石巖峭山立鎮郡城之前阜壓蓮宫之上界海若鞭而莫動天時泐而終固皇唐天寳八年五月六日清晝忽騰雲旁涌驟雨來集驚飈環駭軯訇杳㝠雄雄者雷騞然中震迸火噴野大聲殷空岑嶺跜潭洞簸蕩湏臾風雨散雲雷收項劈輪囷斬焉中闢南委地以柹落北干霄而碣樹不上不下不西不東亭亭厥心隠出真像三十二相具八十種好備列侍環衛品覺有序莊嚴供養文物咸秩端然慈面儼矣儀形似倚雪山而授法如開月殿以趺坐異矣哉不曰博聞乎未聆於既往不曰多智乎罔測其所來且物之堅莫堅於石况髙原廣袤又羣石之傑一朝瓜剖中有雕琢其為造石之初致有相而外封乎其為有石之後入無間以内攻乎意不可以人事徴請試以神化察巍巍釋氏發輝道精其身既傾其神不生等二儀以通變齊四大而有力教於時有所頽靡人於教有所忸怩則為不可思議以煦以吹故示此無跡之跡難然之然俾知我存入我之門經曰千百億化身蓋隨感而應兹身者則百億之一焉昔諸佛報見皆託於有命有命則有生有生則有滅曷若因其不朽之物馮乎不動之基形既長存法亦隨是與夫為童男而出世假長者以來化𤣥𤣥之徼則雖一永永之利則不侔可以禮足而悔罪寄影以安樂予則求福不回者焚香跪仰或從釋子之後故於巉巉之餘仞聊書其所由來貞元六年七月十五日記右街副使㕔壁記使有副副之言繼也其一繼之輔也所以繼其或缺而又輔其違焉其亦總使之務歟皇街使之副其職大矣天子外有六合故内闢六街以達之彼為庭除此為堂室靜諸外必先諸内乃置使以清之我唐新典也蓋以警正天衢糾逖王慝傾環游式遏之卒專扞掫徼循之令夫京師豪傑英俊之都㑹蠻夷戎狄之來萃排輪重足馮衆多撓我防則户伊動必由我察則目伊瑕必見繇是九城之中乘避貴負敬長金玉可拾遺則猶土㓜弱可欺遇則如傷出門若有賓讓路若有神雲興烏合而無暴自東自西以咸萃憧憧焉斯焉而能在其中悖悖焉斯焉而謹在其中六合澄晏六街源之則街使之功副使攸同也貞元八年上以元舅兵部尚書大金吾濮陽公兼右街使俾訪忠良以自佐濮陽公先以節行選次以材能擇加之以更歴因之以故舊得建州别駕前白衣奉御髙陽許公以聞上素知公名即日召見敷對器實有符曩聲當鍚紫綬金章於殿庭而允其請濮陽公本官用視兹佐得人街之政悉以相付公靜而敏清而貞堅鑰禁樞深鋤事根不誡而部伍增肅不按而逵陌倍理日出作日入息三條四出風恬月靜職斯有述公此無作遷蘄州别駕副使如故旌其勞且藉能也夫跡以行生言由事覩公釐斯署之績得國家建斯署之義遂書其義昭其績為公㕔之壁記云其或接公之武踐茲位者任是既重德亦無輕列公之左雖百氏可也貞元十一年五月記泉州北樓記釋名曰樓瞜也謂其髙明覿逺瞜瞜然也建於第宅則以閲園林有媚樹於雉堞則以警冦盜不虞故墨子曰城三十步一坐候樓百步一立候樓兹樓者蓋此郡北墉之立候樓也卜築之始微而具之袤不倍常廣唯再尋製造日逺土木力殆左騫右陊上露下圮有年數矣邦牧安定席公貞元七年下車至九年目之三祀重民力而未形言是年暮秋嵗豐農隙有司率常典告有事于土功公曰斯郡之南極也元后帝鄉實在於北詩不云乎心乎愛矣遐不謂矣欲因戀主向方瞻矚惟北有樓半傾半摧日夜闕登陴擊柝之所風雨憂折榱復隍之患政因時令爾其營之俾有布席跪立之地間更人防卒之蒞事予將時躋展北面拱辰之心焉受命者感公之意如公之意野人羣庶感公之誠如公之誠川朝子來坯崩易蠧趾有餘而不剗基墌自延材有長而不剪棟宇自崇既􅀢庀徒未晦成功倚層霄於軒檻納千里乎牕牖如鱗之廨署若岸之軍壁得之之狀若連山之有重巒長江之蹙洪濤氣勢繇是以雄焉公每子牟情來莊舄思生俯仰於斯徘徊於斯夫完城壯邑有邦之本也戀闕愛君為臣之節也善矣哉公廣兹樓也逺得有邦之本大有為臣之節執邦之本曰公謹臣之節曰忠唯公與忠公斯昭矣小子家在委巷多聞輿頌藝忝儒術每侍公居上志下衷兩獲而達敬書其事為之記以獻至若眺四維之雲物臨萬井之煙景遐象佳致眸莫勝觀非公有樓之素故不之載貞元九年秋九月三十日獻泉州六曹新都堂記貞元八年刺史安定席公為邦之二祀冬造六曹之都堂公表微而慮逺也天子建六官紀綱天下分刺史六司用經緯封中猶天之有四時而人之有四肢一時不若則嵗罔成功一肢不和則體莫全用公以六司之掾如股肱思安之與身之安也火流定中將坯城郭親覽廨宇首視斯署既隤而隘非凝神揆務之所日撫人民不則有國營宫室是亦為政乃量羡府以度用指斯宇而命易又曰處湫居卑非智也煩人蠧財非仁也吾欲全仁而就智藏事者志之有司於是審基趾程廣袤山節藻棁僣也削而不取上階茅櫩逼也革而是捐非約非豐允執厥中然後計具材量日力山木則詶之如市人功則税之若時物樂民願未旬而畢飛梁三道而通負連楣六接以都豁陽軒遐引隂室旁啟挹以重屏翼以迴廊䁆黔黔以秘邃屹崇崇而宏敞夏處其達則炎天以凉冬居其隩則凄風以温足以寧肌靜心釐厥職者也夫哲人有作不唯利身在利人不唯利今在利後相斯堂者公侯卿士禮隔殊品公不之降也斯不亦利人不唯利於身歟堅壯固護存延千祀人不之逮也斯不亦利後不唯利於今歟覩斯堂見公之意時某處某乙為司功某處某乙司户司倉司法司兵司田皆外莊内融懷材抱忠無囘邪以莅下有謇諤以承上當時之彦也請列於記左庶後之君子覩名訪德知夫是日堂有人焉建堂之明年記二公亭記泉州勝屋曰亭優為之名也古者創棟宇纔禦風雨從時適體未盡其要則夏寢冬室春由秋户寒暑酷受不能自滅降及中古乃有樓觀臺榭異於平居所以便春夏而陶湮鬱也樓則重構功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目達神氣就則就矣量其材力實猶有蠧近代襲古增妙者更作為亭亭也者藉之於人則與樓觀臺榭同製之於人則與樓觀臺榭殊無重構再成之靡費如版築欄檻之可處事約而用博賢人君子多建之其建之皆選於勝境今年暮春月邦牧安定席公别駕置同正員前相國天水姜公念兹邦川逼溟渤山連蒼梧炎氛時迴濕雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居髙明蓋謂是月况地理卑庳而不擇爽塏以蕩夫汚廅乎因問風俗相原隰郭東里所共得竒阜髙不至崇卑不至夷形勢廣袤四隅若一含之以澄湖萬頃挹之以危峯千嶺㸃圓水之心當奔崖之前如鏡之鈿狀鼇之首二公止旌輿以迴睇假漁舟而上陟幕煙茵草翫懌移日心眸意籌有建亭之算而未之言也二公既迴邑人踵公遊於斯者如市登中隆觀媚麗前來後至異口同詞曰漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平敎成使俗泰而民以寧者也虞書不曰股肱良哉庶事康哉是謂翼帝藩皇調隂序陽使物阜而民以昌者也席公今日之化育吾徒是以寧姜公昔嵗之弼諧吾徒是以昌且以之寧又以之昌愷悌君子也詩云愷悌君子民之父母二公者真吾父母矣茲阜二公攸選尚而加愛物務休訟簡必復斯至上露下蕪忍令父母憩之乎遂偕發為公就亭之功如牆而前陳誠於縣尹縣尹允其請而為之辨方經蹠等周環當上頂誡奢訓簡以授子來於是家有餘力圃有餘才或掬一抔土焉或剪一枝材焉一心百身蜂還蟻往榛莽可去以自薙瓦甓無脛而奔萃一之日斤斧之功畢二之日圬􅀈之傭息再晨而成二公莫知層梁亘以中豁飛甍翼而四翥東南西北方不殊致糊白墳以呈素雘頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮巖巒疊迴精舍奉其旁達都城企其遐際容影光彩搖漪入瀾指朱軒於潭底閲雲岑乎波裏爌潢油演如飛若動又釣人飄颻於左右游禽出没乎前後一眄一睞千趣萬態税息之者若在蓬壺方丈之上二公重清曠於舊賞納𠂻懇乎羣庶尋幽探異常於斯勞賓祖客常於斯加以平疇間闢通途在下可以觀耕耨可以採謳謠作一亭而衆美具噫天造茲阜其固與人為亭歟不然何不逺郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署曰二公亭雖芻蕘之云其實有謂二公不忽遂以為號小子藝忝於文曾觀光上國去之日歴越遊呉歸之辰踰荆泛漢㑹稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基趾未没山川物象遍得而覽方之於此逺有慙德懿哉二公智周德厚卜地如此感民若彼某非飾説入吾邑者升吾亭者知之古之製器物造宫室或有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其旨姑為之記兼借二公之名於記左以為邦榮在位元寮亦以次序從公而列貞元九年三月二十五日記同州韓城縣西尉㕔記説文曰尉畏也亦慰也主也故字從尸示寸寸者寸量禮度以敬上示者示陳敎令以諭下尸者典職司以居位敬上所謂畏諭下所謂慰居位所謂主全茲三者以莅王爵則仕義周是以古之人嘉用尉字為官號陶唐有太尉周有軍尉秦亦有太尉輿尉東南尉洎漢則復命縣掾曰尉自是以名至於我唐無或易所命善也我唐極天啟宇窮地闢土列縣出于五千分為七等第一曰赤次赤曰畿次畿曰望次望曰𦂳次𦂳曰上次上曰中次中曰下赤縣僅二十萬年為之最畿縣僅於百渭南為之最望縣出于伯鄭縣為之最𦂳縣出於百夏陽為之最上縣僅三伯韓城為之最上之最次於𦂳之最非最之𦂳無與焉𦂳之最次於望之最非望之最無與焉望之最次於畿之最非最之畿無與焉畿之最次於赤之最非最之赤無與焉最之縣長於餘縣如麟鳳五靈之長於羣靈也數長不數類則韓城之稱與萬年渭南鄭縣夏陽竝自𦂳而上簿尉皆再命三命已往而授資歴至之而至也上縣而下則自解褐授韓城既上縣之最簿尉解褐之貴者唯三員伺其闕非年年之有或一員之闕天下皆知之授之日亦皆知之曰某人授韓城尉是其人則頌非其人則誹雖一命之官其為人尚也如此則主司慎擇才地精美縣亦有六曹尉二人一判功户倉其署曰東㕔一判兵法士其署曰西㕔茲㕔兵法士之㕔也根之州則司兵司法司士盡在形之國即兵部刑部工部盡在兵主武法主刑士主工今武未大威務尚繁刑未大措訟尚生工與人興無時休州縣司或雙曹六人分其職國則部屬僚八九十人分其職一人理六人八九十人之理雖大小有異而揆緒不殊不殊其緒不殊其官官不易能至於易者則人無敢易之人無敢易之則國必重之國重之則踐洪鈞大柄所由乎此也貞元十五年春余友人滎陽鄭伯義授焉鄭自上葉聲名為天下聞鄭以經明登科又三舉進士屈於命詞學亦流輩推内行第一其受命之年五月余詣焉十月又詣焉見東㕔有記西㕔無記因請書其姓氏序於左其或先於鄭芳馨猶在者亦得之至於鄭繫於鄭皆繫若譜土壤廣狹物産有無尉非得主不敢僣序十月十五日記歐陽行周文集巻五欽定四庫全書歐陽行周文集巻六唐歐陽詹撰
