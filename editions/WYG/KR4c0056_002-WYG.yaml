body:
  text: 雜著李評事公進示文集以詩贈之風雅不墜地五言始君先希微嘉㑹章杳𠖇河梁篇理蔓語無枝言一意則千往來更後人澆蕩醨前源傾筐實不收樸􅈪華爭繁大敎䕶微旨哲人生令孫髙飈激頽波坐使橫流翻昔日越重阻側聆滄海傳逮兹覿清揚幸覩青琅編泠泠中山醇片片崑邱璠一杯有餘味再覽增光鮮對寳豈皆鑒握鞶良自妍吾其告先師六義今還全蜀中將迴留辭韋相公寧體即雲構方前恒食玉貧居豈及此要自懷歸憶在夢闗山逺如流嵗華逼明晨首鄉路迢逓孤飛翼太原旅懷呈薛十八侍御齊十二奉禮前來稱英俊有食主人魚後來曰賢才又受主人車伊予亦投刺恩煦胡彫疎既覩主人面又獻主人書餬口百家周賃廡三月餘眼見寒序臻坐送秋光除西日惄飢腸北風集絺裾升堂有知音此意當何如初發太原途中寄太原所思驅馬覺漸逺迴頭長路塵髙城已不見况復城中人去意既未甘居情諒多辛五原東北晉千里西南秦一屨不出門一車無停輪流萍與繫匏早晚期相親詠德上韋檢察即韋相之弟也少華類太華太室似少室亞相與丞相亦復無異質渟如月臨水瀟若松照日輝影互光澄隂森兩蔥鬱連城鸞鳯分同氣魚龍出併力革夷心通籌整師律英豪願迴席蠻貊皆屈膝中外行分途寰瀛溥清謐寓興桃李有竒質樗櫟無妙姿皆承慶雲沃一種春風吹美惡苟同歸喧囂徒爾為相將任𤣥造聊醉手中巵自懷州却赴洛途中作惆悵策疲馬孤蓮被風吹昨東今又西冉冉長路岐歲晚樹無葉夜寒霜滿枝旅人恒辛苦㝠寞天何知晨裝行村店月西入山枝􅀈鵊聲求燈徹夜席束裝事晨征寂寂人尚眠悠悠天未明豈無偃息心所務前有程江夏留别辛三十時自襄陽同舟而下予歸閩辛從此赴舉弭棹已傷别不堪離緒催十年一心人千里同舟來鄉路予尚逺客程君未迴將何慰兩端互勉臨歧材徐十八晦落第嘉穀不夏熟大器當晚成徐生異凡鳥安得非時鳴汲汲有攸為驅驅無本情懿哉蒼梧鳯終見排雲征送袁秀才下第歸毗陵羸馬出都門脩途指江東闗河昨夜雨草木非春風矢捨雖未中璞全終待攻層霄秋可翔豈不隨髙鴻聞鄰舍唱凉州有所思有伊善凉曲離别在天涯虚堂正相思所妙發鄰家聲音雖類聞形影終以遐因之憎逺懷惆悵菖蒲花賦得秋河曙耿耿送郭秀才赴舉雜言月没天欲明秋河尚凝白皚皚積光素耿耿橫虛碧南斗接北辰連空濛鴻洞浮髙天蕩蕩漫漫皆晶然實類平蕪流大川星為潭底珠雲是波中煙雞鳴漏盡東方作空曲蒼蒼曉星落鴈呌疑從清淺驚鴈聲似在㳂洄泊并州細侯直下孫才膺秋賦懷金門念排雲漢將飛翻仰之踊躍當華軒夜來陪餞歐陽子偶坐通宵見深旨心知慷慨日昭囘前程志在青㝠裏述德上興元嚴僕射二首山橫碧立竝雄岷大阜洪川共降神心合雲雷清禍亂力迴天地作陽春非熊德媿當周輔稱傑功慙首漢臣何幸腐儒無一藝得為門下食魚人又推車閫外主恩新今日梁州草遍春玉色據鞍雙節下揚兵百萬路無塵春日途中寄故園所親客路度年行故園未云返悠悠去源水日日祗有逺始嘆秋葉零又看青草晚寄書南飛鴻相憶劇鄉中汝川行汝墳春女蠶忙月朝起採桑日西没輕綃裙露紅羅襪半蹋金梯倚枝歇垂空玉腕若無骨映葉朱唇似花發相歡誰是遊冶郎蠶休不得歧路旁許州途中秦川行盡潁川長呉江越嶺已同方征途𣺌𣺌煙茫茫未得還鄉傷近鄉隨萍逐梗見春光行樂登臺鬭在旁林間啼鳥野中芳有似故園皆斷腸銅雀妓蕭條登古臺迴首黃金屋落葉不歸林髙陵永為谷粧容徒自麗舞態閲誰目嗚咽繐帷前歌聲苦於哭題嚴光釣臺弭棹歴陳跡悄然闗我情伊無昔時節豈有今時名辭貴不辭賤是心誰復行欽哉此溪曲永獨英風聲福建送鄭楚材赴京師時觀察劉公亮有感激之意美人河岳靈家本滎水濆門承若蘭族身韞如瓊文早折青桂枝俯窺鴻鵠羣爾來丹霄姿逺逐蒼梧雲有伊光鑒人惜兹瑤蕙薰中酣前激昻四座同氛氲海郡梅霔清山郵炎景曛迴翔罷南遊鳴唳期西聞秦塞鸞鳯征越江雲雨分從兹一别離佇致如堯君和嚴長官秋日登太原龍興寺閣野望百丈化城樓君登最上頭九霄迴棧路八到視并州煙火遺堯庶山河啟聖猷短垣齊介嶺片帆指汾流清鐸中天籟哀鴻下界秋境閑如道勝心逺見名浮豈念乗肥馬方應駕大牛自憐蓬逐吹不得與良遊陪太原鄭行軍中丞登汾上閣中丞詩曰汾樓秋水閣宛似倒閶門惆悵江湖思惟將南客論南客即詹也輙書即事上答并州汾上閣登望似呉閶貫郭河通路縈村水逼鄉城槐臨枉渚巷市接飛梁莫論江湖思南人正斷腸送潭州陸户曹之任户曹自處州司倉除三語又為掾大家聞屈聲多年名下人四姓江南英衡嶺半天秀湘潭無底清何言驅逺車去有蒙莊情送少微上人歸德峯不負人間累棲身任所從灰心聞密行菜色見羸容幻世方同悞深居願繼蹤孤雲與禪誦到後在何峯荆南夏夜水樓懷昭邱直上人雲夢李莘無機成旅逸中夜上江樓雲盡月如練水凉風似秋鳬聲聞夢澤黛色上昭邱不逺人情在良宵恨獨遊送髙士安下第迴岷南寧親偕隱有賢親岷南四十春樓雲自匪石觀國暫同塵就養思兒戲延年愛鳥伸還看謝時輩又作潁陽人酬裴十二秀才孩子詠裴拜曰待看成器後折取桂林餘算日未成年英姿已襃然王家千里後荀氏八龍先葱蒨松猶嫩清明月漸團將何一枝桂容易賞名賢旅次舟中對月寄姜公此公丁泉州門客中宵天色凈片月出滄洲皎潔臨孤島嬋娟入亂流應同故園夜獨起異鄉愁那得休篷轉從君上庾樓御溝新柳貞元八年及第省試東風韶景至垂栁御溝新媚作千門秀連為一道春柔荑生女指嫩葉長龍鱗舞絮迴青岸翻煙拂綠蘋王孫初命賞楚客欲傷神芳意堪相贈一枝光逺人同諸公過福先寺律院宣上人房律座下朝講晝門猶掩闗叨同静者來正值髙雲閒寂爾方丈内瑩然虛白間千燈智惠心片玉清羸顔松色落深井竹隂寒小山晤言流曦晚惆悵歸人寰詠德上太原李尚書那以公方郭細侯并州非復舊并州九重帝宅司丹地十萬兵樞擁碧油鏘玉半為趨閣吏腰金皆是走庭流王褒見德空知頌身在三千最上頭及第後詶故園親故才非天授學非師以此成名曩豈期楊葉射頻因偶中桂枝材美敢當之稱文作藝方慙德相賀投篇料媿詞猶著褐衣何足羡如君即是載鳴時除夜長安客舍不寐宵仍寢如流嵗又遷望家思獻壽算甲恨長年虚牖傳寒柝孤燈照絶編誰應問窮轍泣盡更澘然早秋登慈恩寺塔寳塔過千仞登臨盡四維毫端分馬頰墨㸃辨蛾眉地逈風彌𦂳天長日久遲因髙欲有賦逺意慘生悲許州送張中丞出臨潁鎮心誦隂符口不言風驅千騎出轅門孫呉去後無長策誰敵留侯直下孫蜀門與林藴分路後屢有山川似閩中因寄林藴藴亦閩人也村步如延壽川源似福平延夀福平皆閩中川原之名延夀即藴之别墅在焉福平即予之别墅在焉無人相與識獨自故鄉情樂津店北陂嬋娟有麗玉如也美笑當予繫予馬羅帷碧簟豈相容行到山頭憶山下歐陽行周文集巻二欽定四庫全書歐陽行周文集巻三唐歐陽詹撰
