body:
  text: 書與鄭伯義書居方足下胡妳物故仁孝多感悲慟如何逺助悽惻秋凉體與神康僕素寡悰暢遐亦可悉華下來人居方居華山之隂承今冬以前明經赴調罷舉進士何顛且不沛逝而能復歟居方哉夫非有必行則諫必有拒忤情懷歡古人所難雖僕於居方亦不易之今流既從川華旣歸根輙分間布白致以牋素居方忖覽知及蘧瑗四十九年之已往陶濳今是昨非之悟焉漁者所務唯魚不必在梁在笱弋者所務唯禽不必在矰在繳國家設尊官厚祿為人民也為社稷也在求其人非與人求在得其人非與人得唯道德膺厥求唯賢能膺厥得賢能事事而發見道德誠誠而後信苟須事事苟須誠誠則必委以務命以職從而覈之四海之大億兆之衆不可逢而委命之是用啓稍異之間姑致其我樂而自耀者讀往載究前言則曰明經屬以詞賦以事則曰進士中夫程度者取政事最輕小者命以始又令公侯子孫卿大夫子弟能力役供給者曰千牛進為三衛齋郎限以年月終亦試之其有成則陟陟不已乃尊乃厚其有敗則黜黜不已乃戮乃士取之於諸科暫殊用之於諸科則一良未即以進士賢而明經不賢也但以選才如選材焉以規則失之於方以矩則失之於圓欲方圓畢至然後擇其利用者寳之中方則善於圓中圓而善於方者木材也者在堅貞可久人才也者在德行有恒不可久不可恒雖售之於今必不售之於後蚩蚩之人貴此賤彼是不深達國家選士之意見近而迷逺者居方寧斯人之徒歟况目覩進士出身十年二十年而終於一命者有之明經諸色入仕須臾而踐卿相者有之忠與孝相生君與父相隨於家美即於國良為閨門重則為朝廷尚此古今聖賢絶慮萬不失一之得也僕忝居方遊自貞元之初於今十有三祀熟得居方之為人甘旨可求則已在尊長之前矣衣食可讓則已在兄弟之邊矣急難當行則必在交遊之先禮義當往則無在時賢之後晨昏無方之性愛悌友于之情長長之敬下下之眷與朋之信接物之道居方無不盡則於家於閨門盡矣於國於朝廷詎少哉嘗清宵月下寒序火邊或醉或醒接以餘論君子欲其暗然而彰惡自衒自媒沽名者二年間見居方求試於詞塲僕悢悢如失才如居方地如居方方如所得詎止乎然諸科中升乎一科矣宜存一梁一笱一矰一繳之義事事誠誠之㫖中規中矩之求委恒久脩黜陟俟乎暗然之來也况近聞宗懿之中景行居方彌篤焉上以居方達慈於下下待居方申愛乎上居貧孀孤達宦棺櫬悉居方竭力已有可行咨乎可及饑飽不異魂體皆歸年纔弱冠行跡如此豈徒生哉借如居方束帛到門而有未起居方以藝自謁雖從家命亦以非矣悲哉更逐齊人之後邪僕竊以為知人曩得居方以為居方也洎昨視所行則非居方今聆嘉聞又居方矣如其知如其知竟履元和以叶愚念得之以道為姜為傅不得以道為囬為憲時之令人豈不善歟面叙不周此亦何云與王式書公範足下長史及大人以薄官某大人任溫州長史大人任博羅縣丞予自能記憶只見馳載長㓜勤勤南北予雖童稚意甚不居洎有安固丞潮陽掾某兄謩任安固縣丞兄􅈯任潮州司倉予時已冠似或議事以為地分遐陋進取必無逺大若肄業承家則安固潮陽亦幾於不墜矣便懷耕食鑿飲之心焉事親敬長之道睦友與人之義恂恂自勉不意竊鄉曲之譽所疑不忘質所見不忘述時時有得多幸忝儕類之歸加以博窺墳籍適有章句濮陽仲宣河東千齡滎陽從易濟北有融琅琊次臣呉播字仲宣薛壽字千齡鄭簡字從易康暐字有融王雲卿字次臣則某鄉曲之人皆有識度為州里所重者皆博雅明達君子公範亦其人焉每論性行量識度評學業酌文詞不以虛薄往往掛於牙齒予年二十有一公範與羣公則可予以進士之目而有令予觀國之心予以羣公所貺之名繹先賢正名之旨進士者豈不言其可以仕進而能裨助政化始自下而升上終自上而利下者也近代亦曰舉人實古今舉賢進能之科也則有若風后力牧膺黃帝之舉舜禹稷契膺唐虞之舉伊尹姜牙膺湯武之舉管仲冀缺膺桓文之舉五羖三傑膺嬴劉之舉皆齊聖廣淵明允篤誠立功立事出於人表之流也降自晉宋齊梁則有若陸機鮑昭謝朓江淹亦以登庸雖道德器用不及曩辰而詞學詩流為一時之秀想當羣公之論豈容易之度力不任又先與靈元道士虹巖逸人某鄉人也道士蔡明濬逸人羅山甫靈源虹巖其所居山名也有潘湖合鍊奉養之契潘湖其上下所居地名乞從宿志勤勤懇懇獲與靈源虹巖同居者三年公範與羣公雖不苦以前事相迫而流言時至建中初因當道廉察故相國常公本州將故中書舍人薛公南澗之談西湖之體常相公為福州觀察使薛舍人典泉州日予以薄劣見識二公於南澗寺有所剪餙及予辭歸故林於西湖泛舟致餞也丹青目下程凖前期公範與羣公激厲轉加予亦稍信云云之覲時兄弟親屬方以衆情聞於大人大人與羣公遂有龍首之會龍首山名也予之別墅在焉時詢可否至於再三羣公不悔前言以為可固可必人之於子皆欲其升高致遠至其秋大人則有遣從計吏之命當發之日大人及慈親親祭行於東郊公範與羣公亦共餕神餘於野席離觴旣輟大人誠朂數言言可切骨銘心征車云動慈親嗚咽數聲聲堪斷腸號魄公範與羣公備見備聞也慰上下之望在乎早成名早歸寜予必不惜伎能而有所絶墮以深上下之念汲汲搖搖如旌如翹受遣之明年達於長安賃廡六秋禮闈四上頻竭激昂之力累為簸揚之棄反躬忖已徘徊又疑豈常薛公輕於布素而有佞歟為羣公溫良與朋友有不忠歟楊朱對歧墨翟觀素勁挺之志半作歸心况以近夢慈親以亂􅁝繞予之身萬重大人囓予臂見血蓋神祗以大人誠切逺警於予焉絲繞者豈非思念纒綿之象也囓臂者豈非囓指令歸之義也萬重見血者豈非示其甚也公範與予遊處最深者且莆陽讀書接席五年其於為人公範知之莆陽去家四百餘里晨昏之思忽至珍異之味忽得亦不以始昨違離便奔馳而去性自天至實非勉為今一辭庭闈而踰半紀以本心每每馳戀若此魂夣昭昭感發如彼日夜之心公範可量竊欲審覈良駑摭分進退阻故人無新知怳不可問因考使逥更有决斯科也先以才藝取次以德行伸大之事君細之臨人如予所習可以當之於取乎如予事親可以移之於君乎如予理身可以施之於人乎其可也則待命待知庶榮親之道抑溫清之心如其不可則任材任器息干時之機謝風塵之苦書至與裁裁已遄復家在國在佇為去就予以為子之道所恨不知也知必無不竭若於為臣之道所恨不知也知必無不為人生於世區區者所務豈不立名乎有名於國亦名也有名於家亦名也予何攘臂於其間醜於家而美於國哉予無此心亦公範知之東風扇和山青水清野芳且榮林鳥時鳴樽有酒匣有琴公範休暢某再拜送張尚書書前鄉貢進士歐陽詹於洛陽旅舍再拜授僕人書獻尚書閣下某同衆君子㐲在尚書下風久矣孟冬已寒㐲帷尚書尊體動止萬福人生於世今天下之人識與未識有一善則願知之有一困則願知之尚書以為其人何如哉愚以百年二百年無一而已矣尚書旣知身則其人乎旣知其人某斯所以願也凡今之人進露於長者或以殫詞褒頌為先者亦或求人書狀為先者㐲計尚書飽見之英明特達必不之愛小子固直亦竊醜之况以尚書茂德雄才則騰於寰宇矣豈假區區片言隻字彰明於身乎以尚書山容海納則自斷於胷襟矣豈在攸攸八行尺牘進退於人乎知不然矣某方拙魯訥不敢遊詞某閩越人向京師七千里矣去秋逺應直言極諫詔不逮試便住西秦今冬將從博學宏詞科赴集期昨至東洛舊負人錢五萬卒然以逢某則合還人又艱迫唯一驢一馬悉以償之賃廡之下如喪手足兀然不能出門者再旬於茲矣亦以窘懇遍祈於人人無非常所與唯疋帛斗粟供朝夕則纔可過其外則莫就無車無儲寄人之廬士之窮莫窮乎此今日有來相看者曰子之困至於是何不以情聞於徐方南陽公乎明日有來相看者曰子之困至於是何不以情聞於徐方南陽公乎某晝忖夜量旣在尚書矣又人人異口同詞同驅之心與議并俾忘干犯以困投於尚書尚書之力上將驅雲雷清宇宙副萬乗之頼答億兆之望豈獨遺某所願知之困者乎尚書下將燮隂陽調風雨合百神之意允飛走之望豈獨遺某所願知之困乎救火之家水雖在逺不以逺而往者知其必能濟患也某之困曾未拜伏尚書所居洛陽西鄰陜虢北俯河陽南接陳許東有汴滑捨東西南北之近越千里控於尚書者亦得尚書必救所困焉神遊五侯之門遍心擇王公之量匝方决意投於尚書尚書留意焉布露微碎亦非容易考試事畢特冀拜㐲雖有蓄積庻及面陳上鄭相公書將仕郎守國子監四門助教歐陽某謹齋沐緘書再拜遣隷子弟獻於相公中衢之車下庶及乎閣下當今主上聖明宰輔賢明可行已行可止已止其或未行未止非不知也非不念也未可行而未可止也某愚䝉欲陳所見則在知之之後念之之内矣不敢復言今斯有言自言而已人有百行修萬事精内扣潛鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者相公以為有之乎某將十有十百有百千有千也何以若知自近之耳某嘗讀論語得孔子曰古之學者為已今之學者為人傷時之學者不由所學矜所學也某不敏傷竊如之况禀羔羊鴻雁之性未資訓𨗳而敬順和合乎教者十或四五潔身畏人直拙自守始亦以孝弟忠信約禮從儀人生合爾博聞游藝行義修詞人生固然殊不以有為而為也幸屬昭代以此官人敬趣條目遂希詮擇五試於禮部方售鄉貢進士四試於吏部始授四門助教某兩應博學宏詞不受一平選被駮又一平選授助教夫人百行庶幾萬事留心不仕則已仕則冀就髙衢逺途展其素蓄垂名於後代播美於當時匪徒利斗粟希片帛救寒暑給朝夕也所以利斗粟希片帛者不以之無與其百行庶幾萬事留心之流别行也某非斯人之徒歟其慕彼人之徒歟企夫髙衢逺途也噫四門助教限以四考格以五選十年方易之官也自兹循資歴級然得太學助教其考選年數又如四門若如之則二十年矣自茲循資歴級然得國子助教其考選年數又如太學若如之則三十年矣三十年間未離助教之官人壽百嵗七十者稀某今四十年有加矣更三十年於此是一生不覩髙衢逺途矣况先三十年孰存亡哉其或素蓄當在重泉之下矣忖已方人所以知百行修萬事精内扣潛鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者十有十百有百千有千也嗚呼今之髙懸爵祿廣設名位實大乎德行與乎能事也德行也者孝悌也忠信也不可於公堂斯須而得試也須漸乎父母昆弟之言㳂乎州閭鄉曲之譽某逺人也父母昆弟居萬里之外州閭鄉曲在三江之南孝悌之言無由漸朝廷之耳忠信之譽莫得通闕下之聞也能事也者秉持也應奉也不可虚處無任而得呈也須形乎政令裁製之庸著乎役藝使才之致某冗官也政令裁製一月兩衙之謂役藝使才二鄭陪行音航而已秉持之庸不可形考課之目應奉之致是絶選能之見也縱有顔閔之德游夏之學宰我之政事夫子之文章其於是也但父母昆弟自相知州閭鄉曲自相許於海隅嶺徼其奈拳拳之身何夫大田斯穫而有則遺秉滯穗也萬秉稀一萬穗稀一某豈遂當其一乎且天地也命之翅必與之羽翮副其巨細使得飛也命之足必與之蹄蹠稱其長短使得行也若命之翅而不與之羽翮與之而巨細不相副飛則墜命之足而不與之蹄蹠與之而長短不相稱行則顛命適遺之墜與適遺之顛則如無命無與也其庸愚不知造物之㫖者視之則不之怪其明賢深探理源者其謂天地何且邦國也勸人以德行用鍚之爵祿必契其分量使得行道也聳人以能事用錫之名位必權其輕重使得榮身也若勸以德行而不錫之爵祿錫之而分量不相契道則屈聳以能事而不錫之名位錫之而輕重不相權身則辱勸適遺之屈聳適遺之辱則如無勸無聳也其庸愚不知造化之㫖者視之則不之怪其明賢深探理體者其謂邦國何某代居閩越自閩至於呉則絶同鄉之人矣自呉至於楚則絶同方之人矣過宋由鄭踰周到秦朝無一命之親路無迴眸之舊猶孤根寄不食之田也人人耘耨所不及家家漑灌所不沾其濯乃條枚成乃華實者上天至仁之膏澤厚地無私之陽春乎相公為上天霖雨佐厚地發生也何以處某焉夫舉善不遺於微陋使能必盡其材器真宰相之任也自唐及虞有其人自夏及商有其人自周及秦有其人自漢而還無代無有洎國朝歴歴可數也相公能以某為手下濫觴乎似善斯升真善以至似能斯拔眞能以來古人行此天下歸仁也相公行之哉行之哉今則猶古算度途逺蒼皇造次歐陽行周文集巻八欽定四庫全書歐陽行周文集巻九唐歐陽詹撰
