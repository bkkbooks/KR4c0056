body:
  text: 序翫月詩序月可翫翫月古也謝賦鮑詩朓之庭前亮之樓中皆翫也貞元十二年歐閩君子陳可封在秦寓於永崇里華陽觀予與鄉故人安陽邵楚萇濟南林藴潁川陳詡亦旅長安秋八月十五日夜詣陳之居脩厥翫事月之為翫冬則繁霜太寒夏則蒸雲太熱雲蔽月霜侵人蔽與侵俱害乎翫秋之於時後夏先冬八月之於秋季始孟終十五於夜又月之中稽於天道則寒暑均取於月數則蟾兎圓况埃􅅽不流太空悠悠芳菲徘徊摶華上浮升東林入西樓肌骨與之疏凉神魄與之清冷四君子悦而相謂曰斯古人所以為翫也旣得古人所翫之意宜襲古人所翫之事因作翫月詩詩曰八月三五夕舊嘉蟾兎光斯從古人好共下今宵堂素魄皎孤凝芳輝紛四揚徘徊林上頭泛灩天中央皓露助流華輕飈佐浮凉清冷到肌骨潔白盈衣裳惜此苦宜翫攬之非可將含情顧廣庭願勿沉西方泉州刺史席公宴邑中赴舉秀才於東湖亭序貢士有宴我牧席公新禮也貞元癸酉歲邑有秀士八人公將首薦於闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈惠二典為用鮮或克兼諸侯升俊造於天子遣之日唯行鄉飲酒之禮則享禮也胾肉𤣥酒莫飲莫食公念肉不使食則仁不下浹酒不使飲則歡不上交方欲激邦俗於流醨致王人乎德行而賢者仁未伊浹才者歡未我交其若蚩蚩何秋七月與八人者鄉飲之禮旣脩乃加之以宴餚移已膳醴出家醖求絲桐匏竹以將之選華軒勝境以光之後一日遂有東湖亭之㑹公削桑榆之禮執賓主之儀揖讓升堂從容就筵樂遍作而情性不流爵無算而儀形有肅鏘鏘焉濟濟焉於是老㓜來窺盡室盈岐非其親懿則其閭里皆内訟而誓遷善焉於戲行其敎不必耳提而口授移其風不必門扇而戸吹公斯宴則風移教行其間矣真盡心竭誠奉主化民之宰也烟景未暮酒德俱飽有逡廵避位而言曰夫詩者有以美盛德之形容君侯因片善附小能囘一邑之心成一邑之行而昭吾人恭儉於嘉享示吾人慈惠於清宴迴人心成人行周孔之才也昭恭儉示慈惠管晏之賢也不有歌詠其如六義何是日人有甘棠頖宫之什客有天水姜閲河東裴叅和潁川陳詡邑人濟陽蔡沼佐賛盛事亦獻雅章小子公之甿幸鼓㣲聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂從卜商之後書其旨為首序别桞由庾序孔子見老耼曰魚吾知其能游鳥吾知其能翔游可網翔可弋至於龍則吾不知耼其龍乎今予遇河東桞由庾亦孔子之耼矣眉長五寸耳近上頂寡少言笑皎若冰雪意或時發皆𤣥漠杳㝠之事從君子累忝之遊松櫟殊姿鴉鸞異情翌日予云之京師栁曰月隂日陽鱗潛羽翔海鵬君於焉斯化㝠鴻吾從此而游南充近有上升者留言於長老謝自然於果州南充縣白日上升之時言當復有從此而上升者豈為吾設邪吾焉往夫其德行文學可以敦教化正雅頌予勸裨堯而補舜栁頷而不對貞元十三年七月十六日緜州紫極宫黃籙齋場别送族叔歐陽行元落第迴廣陵序族叔行元旣射策與主司不合春二月將歸淮南所寓羣公設祖方獻未酬叔悄然有不暢之色羣公亦愕爾而阻歡小子侍觴奉而前曰歸好事春美時酒樂物叔於三者加同人將之而未悦豈禮闈失意之為乎崑吾産金荆山産玉自民役巧鎔琢盖多惟干將和璞有大聞非百鍊則其良可用歟非三獻而其寳乃真歟苟良苟真不即成不即售適以精其研稔其實如叔也亦何稽於一邂逅哉若昔之人作必行動必中則蘓秦無履穿之歎寗戚無石爛之歌孫𢎞無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔欣然見卞氏再來之路平歸心納春景安酒意四座以叶千鍾有娯旣醉升車秋為到期送巴東林明府之任序國以民為本縣令親人之親者苟有命授無非慎擇今年執政又加精選自吏曹銓擬往而退下者十之五六濟南林公以始仕之調發硎之刃請宰一邑夫官劇巴東也而使為之平衡無疑鈞軸不轉非輕重質器目以昭如則安可於其難而易若此解褐結綬當時之盛旣受牒恭命而濟南公與予鄉而且故幼而知公行先鄉曲譽是通閭井之意術以明經升實探教化之本今有社稷有民人則弓矢入養叔之手徽絃在師曠之膝何微之不中何妙之不盡去矣無使朱邑魯恭專美乎是官其餘則巫峽峨峨岷江湯湯水天下清山天下秀游盤貴境為池為墉退公多暇為我迴睇送建上人尋陽司業後留詣涇原劉行軍序建上人自茲而一西更為故人也巫咸山有道釋子建上人元和之淳氣以類合休神遂性曩與小司成陽公得於林棲公從下風之請斯縻大君之爵同方相致殊途且來雖羇鸞𡨕鴻一飛一籠遐心逺意終共超曠遊佛廟賞靈臺壺冰片玉光潔再裕來為去始散實聚終上人故人有在西土曰大夢未覺還宜一歡陶瓶芒履此焉留在永路着首悠然髙雲西之人幾日而覿松栢之下無凡草鸑鷟之侣無凡禽西之人豈陽公之儔歟覯遇之辰瓊玖之列詩可頌德覩於斯其撰之竹帛儻傳俾後之人知貞元是嵗賢人之會二也送李孝廉及第東歸序明經自漢而還取士之嘉也經也者聖人講善之錄志立身正家齊國理在乎其中為人父者莫不欲其子之明為人君者莫不欲其臣之明明斯行行斯近近則平乎性命逺則成乎政令邇來加取比興屬詞之流更曰進士謂近於古之立言也為時稍稱其僥倖浮薄之輩希以無為有雖中乾外槁多捨明趨進俾去華取實君子惡以真混假縱含章抱器半捨進為明新第李孝廉則含章抱器捨進為明者晳晳肌骨松寒玉清以志學升太學以學就升宗伯背文手占滯義口占三載不售皇鄭復來投短書出長巻精専炳煥儔倫襃然聖朝貞元癸丑嵗明經登者不上百人孝廉冠其首非獨學勝亦以文聞則有我芳華加之典實不惡夫僥倖浮薄角力於比興屬詞竝矢分弓未知鹿死誰手不為也捨青紫之有路獻榮名以趨庭長途春光我美多彼噫盡藝而適猶有前聞家食非明時相待之意孝廉其志之送常熟許少府之任序始入仕一有縣尉或中或上或𦂳銓衡評才若地稱而命之至於𦂳無得幸而處而𦂳中之美者尤難以人今年孝廉卽髙陽許君授常熟尉者實𦂳中之美君十三舉明經十六登第後三舉進士皆屈於命去冬以前明經從常調䕃資貴中之乙判居等外之甲旣才且地擢以是官夏四月隨之官之牒玉貎青春芬芳有舊望棠隂而委質鬱蘭陔以辭親征車轔轔所往在目異時九仞由茲一簣在邦由家也不出於忠信許君常以為已任夫何恤哉士之生制四方之志軫念於離别非所以為士也行乎送張陲山南謁嚴相公序相國馮翊王作鎮南梁為名賢藪澤四方浮川走陸結轍連艫岷山之坡碾成谷音欲漢水之磧汩成淵耀華呈實涌溢門館量器而待未始失賢故天下真賢雖逺皆往以賢躡跡者清河張子乎張百行為實五言為華有實可呈有華可耀度虚襟之必答抗髙步以斯謁玉露初降金風景清褒斜峯峯千萬相見奮客情如歸意指危棧猶平道馮翊之門唯才與德人之所與馮翊無不與是行也非張獨知其可衆君子共知之旣知之若詠若歌各言其志送王式東遊序瑯琊王式字公範予邑之英而忘形之友生也少同所好服膺周孔之道長齊所得願裨堯舜之化時命不與人無知己雨散雲乖四方五祀旣乏孔融鄭莊之公薦乃效張儀蘇秦之自鬻百川會海相得上國丹誠未昭於鏡鑑黃金已銷於桂玉予懷待兎之固猶伺北闕寢書之報公範見變豹之理將遊東諸侯之國魚川鳥陸俾為異路曩日之别復起於今嗟乎夫人不得自然之至道㝠㝠飄於物外則天之至愚􅱗􅱗貿貿乎泥滓各得其方無枉性矯神之艱也企矚仁義盤旋禮樂下不植地上不麗天孤雲隨風斷蓬逐篲是不能岧嵉昭灼揚光其間坼華資而公範猶䝉賈薄藝而予莫售禽棲朽木蠖屈窮轍可悲也夫况赫赫皇都實吾人逞志之所大丈夫歛塵襟而瞻紱冕策蹇驢以窺軒蓋食米菽而覘粱肉吟苦寒以聆鐘鼓傷哉公範得無媿邪加之離情悢悢何述萬乘之都千箱之年有故人而適逺無巵酒以叙别男兒巵酒之不致亦何論他日之浮沉哉平生之懷未易言也離者會之資㑹實離之本今離旣由昨㑹後㑹得不由今離乎離㑹相生蓋不足歎公範勉之東諸侯聞有梁孝燕昭矣歐陽行周文集巻九欽定四庫全書歐陽行周文集巻十唐歐陽詹撰序送蔡沼孝廉及第後歸閩覲省序昔人論别有賦論恨有賦狀仳離陳感憤其未見予於蔡侯是日之情蓋古人之遺情也人之慙莫先乎同有求而一不得人之慕莫甚乎偕逺遊而一先歸蔡侯沼字虚中予之邑人又懿親也虛中以學予謬以文共受遣乎長吏皆求試於宗伯虚中登太常第歸寕故園予有曝鰓之困猶留京師同求在予則不得偕遊虚中則先歸堂俱有親身亦祈達自負違顏落羽之耻對人飛鳴就養之慶懷寸方為
