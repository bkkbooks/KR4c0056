body:
  text: 雜著益昌行幷序貞元年中天子以工部郎中興元少尹呉興沈公長源牧利州其為政五年予旅遊由于利覩人安俗阜欽所以美作詩一章利州故益昌郡也目曰益昌行詩曰驅馬至益昌倍驚文俗和耕夫壟上謠負者途中歌處處川復原重重山與河人煙遍餘田時稼無閑坡問業一何脩太守德化加問身一何安太守恩懷多賢哉我太守在古無以過愛人甚愛子理邦如理家雲雷既奮騰草木遂萌芽乃知良二千德足為國華今時固精求漢帝非徒嗟四氣有青春衆植佇揚葩期當作説霖天下同滂沲題華十二判官汝州宅内亭幷序覩居處翫好則才不才了然可知如華斯亭華豈常人歟規畫既髙圬塓有潔媚以花草清以竹木綺􅄢菴澹琅玕森然牆外人寰入門雲林使人心以之閒神以之逺華朝於斯夕於斯心不朗神不王其可得乎則虚廓其靈恬淡其性由才不才矣非逃名逺世方曰㝠搜賢哉華未展襟懷視於斯則昭然在前矣予既遊且尚詩以美之衆君子其以為然亦宜相廣詩曰髙居勝景誰能有佳意幽情共可歡新栁遶門青翡翠脩篁浮徑碧琅玕步兵阮籍空除屏彭澤陶潛謾掛冠只在城隍也趨府豈如吾子道斯安奉和太原鄭中丞登龍興寺閣青窻朱户半天開極目凝神望幾迴晉國頽墉生草樹皇家瑞氣在樓臺千條水入黃河去萬㸃山從紫塞來獨恨侍遊違長者不知髙意是誰陪太原和嚴長官八月十五日夜西山童子上方翫月寄嚴中丞少尹西寺碧雲端東溟白雪圑年來一夜翫君在半天看素魄當懷上清光在下寒宜裁濟江什有阻惠連歡覩亡友李三十觀秭歸鎮壁題詩處舊友親題壁上詩傷看緣跡不緣詞門前猶是長安道無復迴車下筆時題秦嶺南下斯湏隔帝鄉北行一步掩南方悠悠煙景兩邊意蜀客秦人各斷腸自南山却赴京師石臼嶺頭即事寄嚴僕射鳥企虵盤地半天下窺千仞倒浮煙因髙迴望沾恩處認得梁州落日邊與洪孺卿自梁州迴途中經駱谷見野果有閩中懸壺子既同採摘用呈之洪亦閩人青苞朱實忽離離摘得盈筐淚更垂上德同之豈無意故園山路一枝枝出蜀門北客今朝出蜀門翛然領得入時魂遊人莫道歸來易三不曾聞古老言韋晤宅聽歌服製虹霓鬢似雲蕭郎屋裏上清人等閑逐酒傾杯樂飛盡虹梁一夜塵與林藴同之蜀途次嘉陵江認得越鳥聲呈林林亦閩中人也正是閩中越鳥聲幾迴留聽暗沾纓傷心激念君深淺共有離鄉萬里情送聞上人遊嵩山二室峯峯昔願遊從雲從鶴思悠悠丹梯石磴君先去為上青㝠最上頭永安寺照上人房草席蒲團不掃塵松間石上似無人羣隂欲午鐘聲動自煑溪蔬養幻身讀周太公傳論兵去商虐講德興周道屠沽未遇時豈異兹川老山中老僧笑向來人話古時繩床竹杖自扶持秋深頭冷慵將剃白黑蒼然髪到眉贈魯山李明府外户通宵不閉闗抱孫弄子萬家閒若將邑號稱賢宰又是皇唐李魯山泉州赴上都洛陽亭留别舍弟及故人天長地濶多岐路身即飛蓬共水萍疋馬將驅豈容易弟兄親故滿離亭送張驃騎邠寧行營寳馬琱弓金僕姑龍驤虎視出皇都揚鞭莫恠輕邊騎曾在漁陽敵萬夫題梨嶺南北風煙即異方連峯危棧倚蒼蒼哀猿咽水偏髙處誰不沾衣望故鄉題第五司户侍御曾稱野鶴比羣公忽作長松向府中驄馬不騎人不識冷然三尺别生風秋夜寄𢎞濟上人尚被浮名誘此身今時誰與德為鄰遙知是夜檀溪上月照千峯為一人觀送葬何事悲酸淚滿巾浮生共是北邙塵他時不見北山路死者還曾哭送人宿建溪中宵即事蕯藭一席眠還坐蛙噪螢飛夜未央僮僕舟人空寂寂隔簾微月入中倉建溪行待陳詡予先發福州陳續發中路待之不得偕行那得㑹心期先者貪前後者遲空憶麗詞能狀物每看竒異但相思題王明府郊亭日日郊亭啟竹扉論桑勸稼是常機山城要得牛羊下方與農人分背歸塞上行聞説胡兵欲利秋昨來投筆到營州驍雄已許將軍用邊塞無勞天子憂迴别業留别郭中諸公千山江上背斜暉一徑中峯見所歸不信扁舟迴在晚宿雲先己到柴扉九日廣陵同陳十五先輩登髙懷林十二先輩客路重陽日登髙寄上樓風煙今令節臺閣古雄州泛菊聊斟酒持萸懶挿頭情人共惆悵良久不同遊九日廣陵登髙懷邵二先輩簪萸泛菊俯平阡飲過三杯却惘然十嵗此辰同醉友登髙各處已三年薛舍人使君觀察韓判官侍御許雨晴到所居既霽先呈即事江臯昨夜雨收梅江南夏雨曰梅寂寂衡門與釣臺西島落花隨水至前山飛鳥出雲來觀風駟馬能言駐行縣雙旌許蹔迴豈不偶然聊為竹空令石逕掃莓苔除夜侍酒呈諸兄示舍弟莫歎明朝又一春相看堪共賞兹身悠悠寰宇同今夜膝下傳杯有㡬人元日陪早朝斗柄東迴歲又新邃旒南靣挹來賓和光髣髴樓臺曉休氣氛氲天地春儀籥不唯丹宂鳥稱觴半是越裳人江臯腐草今何幸亦與恒星拱北辰題延平劍潭想象精靈欲見難通津一去水漫漫空餘昔日凌霜色長與澄潭白晝寒曉泊漳州營頭亭迴峯疊嶂遶亭隅散㸃煙霜勝畫圖日暮華軒巻長箔太清雲上對蓬壺答韓十八駑驥吟韓十八駑驥吟原詩云駑駘誠齷齪市者何其稠力小苦難制價微良易酬渴飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔驅牽入市門行者不為留借問價幾何黄金比嵩邱借問行幾何咫尺視九州飢食玉山禾渴飲醴泉流問誰能為御曠世不可求惟昔穆天子乗之極遐遊王良執其轡造父挾其輈因言天外事恍惚使人愁駑駘謂騏驥餓死余爾羞有能必見用有徳必見收孰云時與命通塞皆自由騏驥不敢言低迴但垂頭人皆劣騏驥共以駑駘優喟余獨興歎才命不同謀寄詩同心子為我髙聲謳故人舒其憤作爾駑驥篇駑取易售陳驥以難知言委曲感既深咨嗟詞亦殷伊情有逺瀾余志遊其源室在周孔堂道適堯舜門調雅聲寡同途遐勢難翻顧兹萬恨來假彼二物云賤貴而貴賤世人良共然芭蕉一葉妖茙葵一花妍異無材實資手植堦墀前楩楠十圍瑰松栢百尺堅罔念棟梁功野長邱墟邊傷哉昌黎韓焉得不迍邅上帝本厚生大君方建元實將庇羣甿庶此規崇軒班爾圖永安掄擇其精專君看廣厦中豈有庭前萱智達上人水精念珠歌水已清清中不易當其精精華極何宜更復加磨拭良工磨拭成貫珠泓澄洞澈看如無星輝月耀莫之逾駭雞照乗徒稱殊上人念佛泛真諦一佛一珠以為計既指其珠當佛身亦欲珠明佛像智咨董母訪朱公得之玓瓅羣竒中龍龕鷲嶺長隨躬朝自手持纎掌透夜來月照紅絛空窮川極陸難為寳孰説車渠將瑪碯連連寒溜下隂軒熒熒泫露垂秋草皎晶晶彰煌煌陸離電烻紛不常凌眸暈目生光芒我來借問脩行術數日殷勤羡兹物上人視日授微言心凈如斯即諸佛贈山南嚴兵馬使即僕射堂弟也為鴈為鴻弟與兄如鵰如鶚傑連英天旋地轉煙雲黑共鼓長風六合清歐陽行周文集巻三欽定四庫全書歐陽行周文集巻四唐歐陽詹撰
