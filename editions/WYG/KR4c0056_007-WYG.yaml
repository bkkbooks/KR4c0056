body:
  text: 雜著唐天志天雖覆育生生如有情則或與或否其與也非徒與其否也非徒否受命有生生者率其道反其道之致焉率則與反則否斯理也固必信至皇帝以孚皇唐百七十有載皇帝御宇之十四祀也嵗在辛未實貞元七年其受命率道天與生生如情之秋歟神哉靈哉明允惠和哉是嵗之天也亭乎其正洞九霄以清徹之中若有同夫有求者鬱乎其變浮五色以薰薰郁郁之中若有察夫所厭者稱物之性應時之欲手足之赴人心羽翼之循鳥情農夫在畦蠶婦在林商或舟車工或烻雘願燥願濕罔不從志其餘則三光序流六氣時行上至事事下洎營營羽毛鱗介勾甲萌芽求諸濡渥則常雨求諸煦旭則常晴求諸吹蕩則常風求諸恬謐則常寧求諸烟雲則常隂求諸日月則常明非不雨也非不不雨也非不風也非不不風也非不隂也非不不隂也合雨而後雨物不之其雨合晴而後晴物不乏其晴合風而後風物不乏其風合寧而後寧物不乏其寧合隂而後隂物不乏其隂合明而後明物不乏其明實皇帝知上帝以生生為已物與其禍福酌已得失而寘之欽若兢若温如穆如心性二儀支體四時似續上𤣥之欬與夫人心能領天之憂承父之命繼堂紹構得其心贈遺獻酬愜其衷則財賄器物唯意是役牧圉䑓隷惟意是用以其役無不當也以其用無不宜也上德勝隋天實維唐皇帝則唐天第九子也旣克負荷上天所以雅意焉且烟雲風雨亦天之財賄也日月星辰亦天之器物也神祗精靈亦天之牧圉䑓隷也是以皇帝動息神祗莫不隨㫖趣精靈莫不申肅穆寂寥駱驛虚無囊篋日月管鑰風雨敬恭誅責而啓閉多少之故將䕃休施烟雲若自請帷幕而使舒張矣將灑潤散氣風雨若自請盆翣而使澆扇矣將烜清晝布陽德若自請爐竈而使燀灼矣將光幽夜啓隂靈若自請燈燭而使昭明矣處植唯滋含靈不析以莓莓熈熈蓋子祗父慈相為福釐也凡書惡記善雖史官之職箴淫述德或人所通規鯫生則人之一夫耳謳吟日月而為之志若簡册已載復何言哉儻猶未也庻補其闕是歲也扶風竇公叅河中董公晉輔政之三年趙郡李公紓為天官之四年范陽盧公徵為地官之元年范陽張公濛為春官之二年昌黎韓公佪為夏官之三年呉郡陸公䞇同為夏官之二年京兆杜公黃裳為秋官之二年清河張公式為冬官之五年夫太宰六官於天子之為理亦澄𣲖而清洪流者故列於斯志之末刖卞和述昔卞和以荆山之璞獻楚武王曰非寳也刖之次獻於文王文王亦曰非寳也又刖之世皆有二君不識寳之議小子鄙慮嘗致於斯瞜瞜然若見二君之意後世之議者脱未之思焉夫國之安危人之邪正如影與響繫乎后躬于則從而于易則從而易珠玉者勞之母財之蠧侈之本害之圃國君好之下必從之則將有不耕而搜山不藝而攻石背義而忘仁輕穀而賤帛耕之隳藝之墮穀之散帛之耗義之虧仁之挫則國從而喪矣古人有言曰不貴難得之貨使民不為盜又曰大寳曰位二君所言卞氏之璞非寳者蓋寳此者也不然玉之與石猶菽比麥雖至愚昧亦或辨之况二君乎縱時狐疑忍愛玉人須臾之功不試琢磨於一石而忽先王之法輕絶人之四體歟甚不然矣實將抑奇玩却無益剪奢靡之萌啓淳龎之跡欲其蕢桴土鼔上復於犧軒象箸玉杯下銷於辛受四方風行而自化百姓日用而不知也大功無形至德無名人以瑣瑣之智莫覩𡨕㝠之情昔宋玉以蕃禽井鮒不測靈鳯長鯨信哉嗚呼使仲尼居今則與泰伯同稱矣小子不敏竊述其㫖以佐知言云甘露述述甘露昭孝德也貞元壬申嵗福州福唐縣尉清源莆田邑人濟南林公攢太夫人終公毎一痛哭至水漿不入口或三日或五日内外羸憊殆至殞滅癸酉將與先府君修合葬之禮公之於事親存旣竭其力送終思盡其勤曰含襚品章則有王度不敢之越也塋域固䕶實在我功當懇而行之於是躬開坎室自埏塼甓與兄弟手攻肩負以鑿以築雖率情性而無僣法度不違典禮而有異常儀載考再理而未之窆也春三月五日忽異氣自天氛氲下䝉非雲非烟羃羃緜緜彩耀光鮮馨香馥然起朝及暝徘徊不散先是繞壟已栽松栢洎晨枝葉間遍懸露滴其滴齊大如梧子公奇之與兄弟及鄉人時相慰者而嘗之其味甘異於人間所甘之味日漸髙不銷不晞轉堅轉明瑩然珠相鏗然玉聲如是者三日覩者爭取或食或翫噫天㝠㝠其間蓄靈地陳陳其間蓄神靈無形神無身無形無言無身無聲苟有可襃以物而旌苟無可褒物不虛行其德常其物常其德稀其物稀予聞甘露之説莫覿甘露之實其為稀也不亦甚乎今為公而降公之德豈常德歟况殊香啓途異彩相宣凝結豐圓向日翻堅者哉則其至誠所招又多矣予執吊禮幸獲而見珍聳不足遂為之述暗室箴行之檢身非以為人無淫無佚出處宜一孜孜碩人㝠㝠暗室罔縱爾神罔輕爾質逺茲小惡念彼元吉勿謂旁帷上蓋天監無外勿謂後掩前扃神在無形天不長慝神實王直神怒天誅未始有極昔者趙盾假寐兢莊天迴厥害鉏霓以亡又有符堅竊為制度神敗其類蒼蠅以呼天窺神窺人無不知神忿天忿身無所隠澗松抱節幽蘭有薰歲寒不變無人亦芬草木猶爾人其曷云戒慎乎其所不覩恐懼乎其所不聞先師有言敢告天君弔九江驛碑材文并序弔傷而有辭者也噫九江驛之碑其可興辭而弔歟斯碑之材昔太師魯國顔忠肅公所建祖亭之碑也公負辭華代之銘誌多公之辭亦好採異留名之致頃為湖州牧州産碑材石毎使工琢之與辭兼行磨礱而成常心所用者不可勝數斯碑也終山之窮僻得之於自然趺本有龜䕶頂有螭雖不甚成而拏躩憤興如神如靈公神而珍之精選所處湖州無稱立罷守迴朝載而途卜出蘓臺入毘陵亦無稱立轉丹陽由建業亦無稱立次江州州南有湖湖東有嶠蛟奔螭引直到湖心頓趾之處則茂林峭石勢環氣勝非往時所睇而神祠曰祖將軍廟在焉公覿其詭秀與碑材叶即日以酒酺奠白移祖神出錢五萬造亭曰祖亭南香爐峯北潯陽城九江為庭千艘歴堦亭旣就公製創亭之文手勒斯碑而立之公文為天下最書為天下最斯亭之地亦天下最庶資三善加以斯碑之奇相持萬古而採異畱名之致一得也後典州吏於州之九江驛有修坯之勞狀其末績乃取斯碑剗公之述寘已之述今為九江驛之碑焉予旅游江州税於茲驛祠部員外郎鄭恕同之鄭與州將嚴士良共為予説而俱以視嗚呼先賤後貴世之常也先貴後賤人之傷也以祖亭方九江驛則蘭室鮑肆矣以魯公之文方人之文則牢醴糟糠矣以魯公之札翰方人之札翰則錦繡枲麻矣以魯公之用方人之用則華夏夷狄矣痛哉斯碑出祖亭入九江驛失魯公文得人之文削魯公之札翰題人之札翰亡魯公之用就人之用是去蘭室而居鮑肆捨牢醴而食糟糠脱錦繡而服枲麻黜諸夏而即夷狄可悲之甚者况我質天成必將可名魯公所以卜擇敬慎如彼而常人無良黷辱如此與有道而黥無罪而刖投四裔魑魅何以别邪石不能言其豈無寃故弔之情違以傷理拂乃寃人實有之物亦應焉嗚呼子碑寃可子知隂隲子材豈曰無意必有以殊方頌以異與顔表勝以殊則名從吏君卑以異奚旌産子旣授子不終致悠悠彼蒼何嗟及矣美玉抵禽高冠藉足有類於碑先榮後辱繼世生哲詎無賢兮將覿於斯固悼於斯庶滌所黷而復攸宜屹屹升碑如神如祗人得以專天造何為其不然矣其不然矣弔漢武帝文并序閲太史氏書見漢武之御極雖非求仁蹈道之主亦英雄之君也然覩其内傳有學神仙築三山為飲露餐霞希升汗漫激流企石用擬林泉嗚呼履其位而不知所以守好其事而不知所以從夫一物各異道萬彚不同致帝王之與神仙林泉之與朝市猶鱗羣毛族川陸分之日居月諸晝夜常之麒麟不可有處淵蛟龍不可更居藪玉兔莫延於旦金烏罔瞻於宵附其翼者兩其足與其角者去其齒不兼之義天理昭彰帝者宜本於親人仙者宜先於遠世以林泉為意者可居於草澤以天下為念者可謹於朝廷是以唐堯虞舜無野心子晉許由辭寳祚誠以帝王與神仙有隔林泉將朝市難并也今據唐堯虞舜之地而求子晉許由之志不亦迂而可痛哉况君子所以推心屈體為僕御元元所以刲膏割血為飽暖非圖好林泉而學神仙也故予覽其傳傷心久之戊辰嵗秋八月周覽秦原次茂陵之下旣覩永歸之地彌懷所行之事且夫承天統物豈無足稱之德歟蓋歎日月高明有時虧異珠玉貞潔不免疵瑕徘徊路隅興言而弔云赫赫兮炎靈降神造漢焚秦四葉重茂翹英洊新首出羣龍卓為世祖秋風揚文夏日昭武柔不化之人闢未名之土雖殊仁聖之后是異凡庸之主伊可膚寸明有不周事非所事求非所求惟此帝謨想夫仙道魚處重淵獸居茂草辨乎朝市别以林泉日由旦陸月麗宵天跡旣兩分理誰齊克若死將生猶南與北貪臣王公鞅掌者可以勤萬幾欲升汗漫逍遙者可以為匹夫愛深宫秘殿者可以垂旒纊好青山綠水者可以棲江湖飲露叅腥激流貫都苟能同致實曰殊途堯舜曰聖由晉匪愚確乎守一亦以難俱况乎小人唯唯罔圖山水君子乾乾孰為神仙嗚呼哀哉前監孔彰髙臺深池夫差以戕尋山越海嬴政其亡有一於此未或無殃胡為不辰互窮厥方舟全虎臂車出羊腸已臨隧炭幾絶苞桑反覆前聞痛心疾首藥石無人瑾瑜有垢暑來寒往時移代久古壟將頽惡聲不朽日臨宇宙有時而虧目覩毫釐或不見眥將為而不知復知而故為嗚呼噫嘻補漢書封雍齒册文曰臣節貴忠后德貴公忠則為其主所自盡公則於其人罔以私咨爾雍齒爾有臣節孔明予以公心奬爾其敬聽予言罔惑嗚呼昔嬴氏不臧流毒四海天將勦絶厥類假手於予一人爾主項氏昧厥命木蠧猪突附振旁撓予在泉未涌用困於彭地爾為厥主來戕予實有必戮之志罔若天之歴數徂於予躬俾泰山萬乘蔽於一葉予於所自隠有見爾心於時爾為楚臣予為漢人予則爾仇敵爾宜討之予罔攸憾今大寳歸予夷嬴殱項予欽若上帝惟天下君爾則率土之濱罔非予民予宜子之爾罔攸惕夫爵以尊德祿以養賢爾能致身於厥主孰若爾賢德予分爾茅土以勸所事君爾奉上之誠罔易乎舊予體元之政咸用維新砥礪爾能轉作予人兢兢慄慄共闡大猷無使齊桓管仲專於棄瑕之美念之哉歐陽行周文集巻七欽定四庫全書歐陽行周文集巻八唐歐陽詹撰
