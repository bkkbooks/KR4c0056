body:
  text: 歐陽行周文集卷第九序翫月詩序月可翫翫月古也謝賦鮑詩眺之庭前亮之樓中皆翫也貞元十二年歐閩君子陳可封在秦寓于永崇里華陽觀予與鄕故人安陽邵楚萇濟􅀯林藴潁川陳詡亦旅長安秋八月十五日夜詣陳之居脩厥翫事月之爲翫冬則繁霜太寒夏則蒸雲太熱雲蔽月霜侵人蔽與侵俱害乎翫秋之於時後夏先冬八月之於秋季始孟終十五於夜又月之中稽於天道則寒暑均取於月數則蟾兎圓况埃􅅽不流太空悠悠芳菲徘徊摶華上浮升東林入西樓肌骨與之䟽凉神魂與之淸冷四君子悅而相謂曰斯古人所以爲翫也旣得古人所翫之意宜襲古人所翫之事作翫月詩詩曰八月三五夕舊嘉蟾兎光斯從古人好共下今宵堂素魄皎􅀌凝芳輝紛四揚徘徊林上頭泛􅃩天中央皓露助流華輕飊佐浮凉淸冷到肌骨潔白盈衣裳惜此苦宜翫􅄃之非可將含情顧黃庭願至沉西方泉州刺史席公宴邑中赴舉秀才於東湖亭序貢士有宴我牧席公新禮也貞元癸酉歲邑有秀士八人公將首薦于闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈惠二典爲用鮮或克兼諸侯升俊造於天子遣之日唯行鄕飮酒之禮則享禮也胾肉玄酒莫飮莫食公念肉不使食則仁不下浹酒不使飮則歡不上交方欲激邦俗於流醨致王人乎德行而賢者仁未伊浹才者歡未我交其􅀂􅃖􅃖何秋七月與八人者鄕飮之禮旣脩乃加之以宴餚移巳膳醴岀家醖求絲桐匏竹以將之選華軒勝境以光之後一日遂有東湖亭之會公削桑榆之禮執賔主之儀揖讓升堂雍容就筵樂遍作而情性不流爵無筭而儀形有肅鏘鏘焉濟濟焉於是老㓜來窺盡室盈岐非其親懿則其閭里皆内訟而誓遷善焉於戲行其敎不必耳提而口授移其風不必門扇而戸吹公斯宴則風移敎行其間矣眞盡心竭誠奉主化民之宰也煙景未暮酒德俱飽有逡廵避位而言曰夫詩者有以美盛德之形容君侯因片善附小能回一邑之心成一邑之行而昭吾人恭儉於嘉享示吾人慈惠於淸宴廻人心成人行周孔之才也昭恭儉示慈惠管晏之賢也不有􅁔詠其如六義何是日人有甘棠頖宮之什客有天水姜閱河東裴叅和頴川陳詡邑人濟陽蔡沼佐替盛事亦獻雅章小子公之甿幸鼔微聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂從卜商之後書其㫖爲首序别桞由􅁃序孔子見老聃曰魚吾知其能游鳥吾知其能翔游可網翔可弋至於龍則吾不知聃其龍乎今予遇河東栁由􅁃亦孔子之聃矣眉長五寸耳近上頂寡言少笑皎若冰雪意或時發皆玄漠杳㝠之事從君子累忝之遊松櫟殊姿鴉鸞異情翌日予云之京師栁曰月隂日陽鱗濳羽翔海鵬君於焉期化􅄀鴻君從此而游􅀯充近有上升者留言於長老謝自然於果州南充縣白日上升之時言當復有從此而上升者豈爲吾設邪吾焉徃夫其德行文學可以敦敎化正雅頌予勸裨堯而補舜栁頷而不對貞元十三年七月十六日緜州紫極宮黃籙齋場别送族叔陽行元落第廻廣陵序族叔行元旣射䇿與主司不合春二月將歸淮􅀯所寓群公設祖方獻未酬叔悄然有不暢之色群公亦愕爾而歡小子侍觴奉而前曰歸好事春美時酒樂物叔於三者加同人將之而未悅豈禮闈失意之爲乎崑吾產金荆山產玉自民􅃥巧鎔琢蓋多惟干將和璞有大聞非百鍊則其良可用三獻而其寳乃眞歟茍良苟眞不􅀰成不􅀰售適以精其研稔其實如叔也亦何稽於一邂逅哉昔之人作必行動必中則蘇秦無履穿之歎寗戚無石爛之􅁔孫弘無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔欣然見卞氏再來之路平歸心納春景安酒意四坐以叶千鍾有娯旣醉升車秋爲到期送巴東林明府之任序國以民爲本縣令親人之親者苟有命授無非愼擇今年執政又加精選自吏曹銓擬徃而退下者十之五六濟􅀯林公以始仕之調發硎之刃請宰一邑天官劇巴東也而使爲之平衡無疑鈞軸不轉非輕重質器目以昭如則安可於其難而易若此解褐結綬當時之盛旣受牒恭命而濟􅀯公與予鄕而且故㓜而知公行先鄕曲譽是通閭井之意術以明經升實􅊥敎化之本今有社稷有民人則弓矢入飬叔之手徽絃在師曠之􅂰何微之不中何妙之不盡去矣無使朱邑魯恭專美乎是官其餘則巫峽峨峨岷江湯湯水天下淸山天下秀游盤貴境爲池爲墉退公多暇爲我廻睇送建上人尋陽司業後留詣涇原劉行軍序建上人自兹而一西更爲故人也巫咸山有道釋子建上人元和之淳氣以􅀋合休神遂性曩與小司成陽公得于林棲公從下風之請斯縻大君之爵同方相致殊途且來雖覉鸞㝠鴻一飛一籠遐心遠意終共超曠遊佛廟賞靈臺壺冰片玉光潔再􅁉來爲去始散實聚終上人故人有在西土曰大夢未覺還宜一歡陶瓶芒履此焉而往永路着首悠然高雲西之人㡬日而覿松栢之下無凡草鸑鷟之侣無凡禽西之人豈陽公之儔歟覯遇之辰瓊􅅼之列詩可頌德覩于斯其撰之竹帛儻傳俾後之人知貞元是歲賢人之會二也送李孝廉及第東歸序明經自漢而還取士之嘉也經也者聖人講善之錄志立身正家齊國理在乎其中爲人父者莫不欲其子之明爲人君者莫不欲其臣之明明斯行斯近則平乎性命遠則成乎政令邇來加取比興屬詞之流更曰進士謂近於古之立言也爲時稍稱其僥倖浮薄之軰希以無爲有雖中乾外槁多捨明趨進俾去華取實君子惡以眞混假縱含章抱器半捨進爲明新第李孝㢘則含章抱器捨進爲明者晢晢肌骨松寒玉淸以志學升太學以學就升宗伯背文手占滯義口占三載不售皇鄭復來􅄬短書岀長卷精專炳煥儔倫裦然聖朝貞元癸丑歲明經登者不上百人孝㢘冠其首非獨學勝亦以文聞則有我芳華加之典實不惡夫僥倖浮薄角力於比興属詞竝矢分弓未知鹿死誰手不爲也捨靑紫之有路獻榮名以趨庭長途春光我美多彼噫盡藝而適猶有前聞家食非明時相待之意孝㢘其志之送常熟許少府之任序始入仕一有縣尉或中或上或緊銓衡評才􅀂地稱而命之至於緊無得幸而處而緊中之美者尤難以人今年孝㢘即高陽許君授常熟尉者實緊中之美君十三舉明經十六登第後三舉進士皆屈於命去冬以前明經從常調䕃資貴中之乙判居等外之甲旣才且地擢以是官夏四月随之官之牒玉貌靑春芬芳有舊望棠隂而委質鬱蘭陔以辭親征車轔轔所徃在日異時九仞由玆一簣在邦由家也不岀於忠信許君常以爲己任夫何恤哉士之生制四方之志軫念於離别非所以爲士也行乎送張陲山南謁嚴相公序相國馮翊王作鎭南梁爲名賢藪澤四方浮川走陸結轍連艫岷山之坡碾成谷音欲漢水之磧汨成淵耀華呈實涌溢門館量器而待未始失賢故天下眞賢雖遠皆徃以賢躡跡者淸河張子乎張百行爲實五言爲華有實可呈有華可耀度虛􅁭之必荅抗高歩以斯謁玉露初䧏金風景淸褒斜峯峯千萬相見奮客情如歸意指危棧猶平道馮翊之門唯才與德人之所與馮翊無不與是行也非張獨知其可衆君子共知之旣知之若詠􅀂􅁔各言其知送王式東遊序瑯琊王式字公範予邑之英而忘形之友生也少同所好服膺周孔之敎長齊所得願裨堯舜之化時命不與人無已知雨散雲乖四方五祀旣乏孔融鄭莊之公薦乃效張儀蘇季之自鬻百川會海相得上國丹誠未昭於鏡鑑黃金巳銷於桂玉予懷待兎之固猶伺北闕寢書之報公範見變豹之理將遊東諸侯之國魚川鳥陸俾爲異路曩日之别復起於今嗟乎夫人不得自然之至道㝠㝠飄於物外則天之至愚􅱗􅱗貿貿乎泥滓各得其方無枉性矯神之艱也企矚仁義盤旋禮樂下不植地上不麗天􅀌雲随風斷蓬逐篲是不能岩􆁿昭灼􅀭光其間坼華資而公範猶􅀩賈薄藝而予莫售禽棲朽木蠖屈窮轍可悲也夫况赫赫皇都實吾人逞志之所大丈夫歛塵􅁭而瞻紱冕䇿蹇驢以窺軒蓋食米菽而覘􅆝肉吟苦寒以聆鍾鼓傷哉公範得無媿邪加之離情悢悢何述萬乘之都千箱之年有故人而適遠無巵酒以叙别男兒巵酒之不致亦何論他日之浮沉哉平生之懷未易言也離者會之資會實離之本今離旣由昨會後會得不由今離乎離會相生蓋不足歎公範勉之東諸侯聞有梁孝燕昭矣
