body:
  text: 歐陽行周文集卷之一賦岀門賦岀門辭家也人有志而斯逞予紛然而遠遊别天性之至慈去人情之好仇嚴訓誡予以勿乆指蒲栁以傷秋弱室咨予以遄歸目女蘿而起愁心眷眷以纒綿淚浪浪而共流惕懷安以敗名曾何可以少留於是驅忠信以爲車執藝業以爲贄越三江踰五嶺望堯旌而求試庶亦呈功取爵建德􅀭名􅀗甘㫖而報勤光晝錦以廻衡如弧斯張如鳥斯征射百歩而期中飛三年而必鳴􅮠飃天寒崢嶸歳晚鵲聮翩以不定蓬悠􅀭而自轉逮前程之尚遙顧所離而日遠事紛拏以爭拔情交戾而不和退藩籬則弱羽戀於雲路激龍門則纎鱗限乎尺波身違日日之晨昏戀悽悽而莫遣親益年年之羸老思搖搖而􅀂何慜靈輙於困窮舉兾缺於壟畆一仁聲之永大一孝德之玆乆伊錫􅀋以拯窮豈今無而昔有爾乃循否泰以俟命黙風塵以愴艱苟䟽溟以納流願覆簣以成山路實多岐絲無定色任玄黃之濡染信疆理之南北管因媒而解􅅞越自遇而升車虞先榮而後悴姜始卷而終舒傷哉數子之稅駕吾未知其所如石韞玉賦淸潤積中光華外發荆山之石􅀆玉在其中和氏未異􅀆追師不攻内抱貞明蓄珪璋而自異外封磽确與砮礪而攸同紛爾千峯塊然一石石居山而有􅀋玉處胎而無跡昭彰奇彩象鸞鏡之猶埋特逹英姿狀蠙珠之未拆齊草木之偕賤疊泥沙而共積瓌材則韞精氣時􅀭結白虹於林薄浮淸氣於巖岡多見巳形空知六瑞之貴罕窮未朕誰分十仞之光混瘞嵌巖沈􅀩蘙薈同夫有智懷其有以若無侔彼不爭守厥屯而俟泰明其内晦其外將藏器以待知不干物以招害原夫石則稱堅而可轉玉則受琢而凝淸日遇良工一則有順而無固時惟哲后一則無脛而前呈我唐文武建元成康紹㣧􅀗王母之玉琯致淮夷之琛賮向華池而効色從溫樹以流潤伊抱璞之未聞亦梯山之自進佳􅆝糅粃黃金在沙必簸糠而颺礫兾取實以除華彫琢儻行輝章希發願同三獻之納庶免再來之刖廻鸞賦夫何䧏一人􅀆將凝帖乎萬方神其精而傑其質􅀆赫赫魏魏以昻昻應千年之寳歷承八聖之重光道爲紀德爲綱仁爲宅義爲防化悠悠而蕩蕩風習習以洋洋沐雨露以蕃昌燭日月以皆康癸亥之歳大皥司政乃作幸于西順上帝之令將行曰相彼元元以哲后爲父母視淫君猶芻狗予其在德則夷狄皆予之子也伊重關撃拆虞誰而守乎予其不淑則骨肉實予讎敵也雖金城湯池於予何有乎四門大開七􅃦停驚颺凛凓以風淸寂澄凝而月靜于時厥有頑民從愚至逆假鴻恩以出入弄神器於間􅂩於是天忿地怒人慘神惻積憤氣以交衝疊􅁈心以濳逼災變流演妖氛充塞山河列以長晦日月在而無色明則士庶幽則靈祇豚魚有識草木無知企喁喁以嗷嗷望我后之來儀如孺子之憶慈親焉如涸鱗之念長津焉如枯苗之待膏􅀨焉如籠鳥之仰林莽焉旣而文物無荒聲明有素木葉猶飛金風未暮聖澤西浹天顏東顧廻旂旗整鑾輅雨師啓途風伯前驅豐􅂭布令烈缺行誅神㓛莫仇天力誰虞櫛􅌭紛於瀴溟駢駱驛乎虛無洗地軸拂天衢殱有罪福無􅇳雰霾掃蕩於寰區塵埃滌濯乎皇都元兇不戮而淪痛品物未覲而遙蘇爾其靈物旣光乘輿乃從雲車煙馭春心日容鬱霏霏以葳㽔輝熠熠以嚴顒祥風􅠞􅠞以淫淫瑞色靉靉而溶溶􅄥籠焉虹霓之縈儀鳯髣髴焉江霧之送遊龍若夷􅀂夏乃愚乃賢振振騈駢殷殷闐闐巷如流以湯湯野􅀂草而芊芊雲浮巨嶽水集洪川至喜翻悲含淚而前曰自沐玄化􅁳􅁳綿綿如載于天如飮于泉卒歳永年皆調自然異曰殷憂方昭厥由歸歟歸歟人待其居是日也皇帝乃闢金門升紫宮宣睿㫖奨天􅂨熈乎􅀂微雷淑氣暢昆􅆉芬乎􅀂韶光麗景發靑䓗下蟠厚地上洽玄穹扶桑而西虞泉而東百福交通萬彚大同白日三舍以逡巡瞪不征以融融南山萬歲以爭呼頷􅀂動而崇崇至矣哉之德也深乎大乎滂乎沛乎爾其汪濊乎可謂上合天經下叶神靈旁綂神明中􅀗人情故能不守有與之守不爭有與之爭此一舉也足見天地之心足辨人神之意諒無黨以無偏唯夫道德之比者也將歸賦憶求名於薄藝曾十稔以别離􅅻還鄕之半齡又三年于路岐紅顔匪長白日如馳苒苒皆盡悠悠爲誰親有父母情有閨闈居唯苦飢行加相思加相思􅀆寧􅀂飢辭家千里心與偕歸南省之蘭東山之薇一芳一菲何是何非歸去來􅀆秋露霑衣王者宜日中賦以題爲韻杲杲者日中則重光燭生生於有晦暖物物以無疆人在下君體陽故法之象之宜諸帝王亭然止六合居中赫矣洞九霄臨下取其正諒無邪僻之徒倣其明詎有幽隂之者瞻端嚴則體率慕光昭以心冩想照彌乎八紘庶化覃於九野觀夫高春始上虞泉未移面方輿而再朗􅀧圓昊以重規有隼之墉匿寸隂而影盡無禽之井透百尺以光披含靈亹亹處植離離穴有向陽之戸柯無不煦之枝伊體元在已有國於斯􅄱厥功以居大固其義之攸宜况日則􅀋王王實况日道符罔二理契惟一當其食􅉴用貶膳以去縣仰以高明􅀡弃儔而背匹是以如之致唐堯之盛假之在周易之豐暮非乏照朝亦有融或背籬東之蟄或遺山右之䝉掩彼不言黜履邪而有蔽放玆取則貴無偏以處中正不正通難通可以勵垂衣之聖政可以激御遠之神聦者也我皇祗􅀂高穹保玆洪祚順三辰之耿耀稽八卦之明諭覿兢莊霑煦嫗美盛德之􅄱容遂屛營而作賦瑾瑜匿瑕賦物無終美捨短從長玉之美者其曰瑾瑜雖特逹之自有豈玼瑕之則無菲食其端葑采其下苟當無而可用諒在人而罔捨况服飾所珎禮容攸假五德人尚居然揔之百寳物雄又其尤者只如夷吾委質曲逆從王一則措其所短一則舉其所長伊十仞之可貴詎一眚而爲傷是故異比荆山奇同鄭市縱靑蠅之下􅀧有白虹以旁起􅅣中良工佩宜君子爾若惡其細而棄其大我則揚其表而掩其裏矧乃珪或致磨璧當可指終詶九年之積不損連城之美朂矣乎韞獨明之見宰萬物之工覩其材而辨其器履其始而知其終建莫大之勲與悠悠旣異收稀代之寳將􅖰􅖰寧同砮璞自克散材徒鬱苟無分寸之痕翳罔有㝷尺之盤屈瑩乏光華紱乖音律攻之有曠乎目力斵之不益於人物空知有玷與無疣豈不道䟽而理拂至剛也必時時而外缺至淸也乍渾渾而罔容考瑾瑜之含匿亦厥義之云從不然者玄黃巳疲奚復騁乎千里輪囷則疴焉得用於九重瑜之體全者則稀瑾之無瑕者亦罕惟追師之鑒選納尺長而寸短徴君洪涯子圖賦雲際長枕以表貞節矯矯徴君居幽行聞朗詠堯年之日棲遲姑射之雲英英時傑好奇藝絕窺窮圖繪之能寫得隱淪之哲豈不以懷材習技我藴跨俗之工履道全眞彼有過人之節者也觀夫杖藜載酒面石依松盡是山中之意全移物外之蹤入室終窺知裂繒而畫岀升堂始睇疑在野而相逢如言實黙令如行實止蘿纎纎以垂㡌草靑靑而藉履洋乎令聞昭晰得其所由儼夫儀􅄱髣髴知其所似原夫賢逹作範丹靑立程將模前而示後必體物而歸誠服惟身表容實心旌對冰雪之顔覩蘭蕙之纓暗識伯夷之㓗遙憐虞仲之貞知身巳識看畫如生矜且復莊􅀂此辰之有識貪之與欲同在日之無情􅄱似植以亭亭衣如風而曳曳臨諸瑤席之上想彼雲林之際萬物方秀千峯初霽神飄飄而自遠身悠悠而不繫我之心矣惟賢允􅆇披圖畫於是日得夫君乎此堂乃知君之於德也大畫之於工也長畫非君無以展其妙君非畫莫得揚其光物有相假不其昭彰揆人事之美惡論功庸之夥少伊畫也可以稱智者之兼惟君也可以作眞人之表者也明水賦玄化無宰至精感通智之不測有明水焉方諸在手圓月居天象質遐分則迢遙而逈遠英華濳合遂滴􅄋以流漣可謂妙自斯妙玄之又玄此道也自何而干彼靈也從何而借越杳杳之蒼旻阻㝠㝠之永夜望蟾魄而光彩殊流端蛤􅄱而淸冷忽下等陽燧之通感實柔祗之秘化豈不以我惟陽德伊乃隂徒精靈合契氣􅀋相符共禀坤而配坎諒交津以有濡玆理焉自取之乎必有斯水也遂生之於本無精潔可嘉淸明斯在湛玉壺以無垢入犧罇而有待處罍實爵今則由於鬯人置下升堂巳不關乎眞宰稽乎所自原夫所致臨庭目擊雖從隂鑒而來向月心祗又似上夭而至來莫我挈至莫我精弃本不仁故存名而曰水從宜酌號遂表性而稱明信可薦宗祏郊上淸故得歸先歲享告帝功成冠三酒而首進掩五齊以先行招百神之景福致萬姓之元禎無益於人鄙玉漿於夜漏自求其逸哂珠露於金莖遊原習坎固有冥感處陸浮空不無玄通龍吟雲而致􅀨虎嘯谷而來風動無千里之效潤纔百里之功詎􅀂以握中之􅃈細向天上之曈朧精液下融神人以崇而福禄攸同者也春盤賦裁紅暈碧巧助春晴多事佳人假盤盂而作地䟽綺繡以爲春叢林具秀百卉爭新一本一根叶陶甄之妙致片花片葉得造化之窮神日惟上春時物將革栁依門而半綠草連河而欲碧室有慈孝堂居斑白命聞可續年知暗惜研秘思於金閨同獻壽乎瑤席昭然斯義哿矣而明春是敷榮之節盤同饋薦之名始曰春􅀆受春有未衰之意終爲盤也進盤則奉養之誠儻觀表以見中庶無言而見情懿夫繁而不撓􅀋天地之無巧雜且莫同何才智之多工庭前梅白蹊畔桃紅指掌而幽􅀷數處分寸則芳菲㡬叢呼噏旁臨作一團之朝霧衣巾暫拂成萬􅀣之春風原其心匠始規神謀創運從衆象以遐覽總群􅄱而内藴彼有材實我則以短長小大而謀彼有文華我則以玄黃赤白而暈故得事随意製物逐情裁凝神而珍奇競集下手而芬馨亂開不然者欲翫扶踈須買靑山以樹要窺菡萏待䟽綠沼而栽將以緩愁子之思將以逞吾人之才此一作也察其所由稽其所據匪徒爲以徒設誠有禆而有助者也藏冰賦西陸朝覲方岀之也晚日離斗􅀆昏星見奎鴻向北􅀆龍角徂西天子慮曾冰以爲災闢凌隂而大納山人於其時而貢職庶夀域以同躋黑牡旣馨玄冥巳祝人惟在土侔有賦以歸王物或稱琛􅀋無脛而奔陸鑿固沍於窮壑閉重泉乎夏屋烱乎于將之岀地燦乎連城之韞匵尔乃東風月仲之節西陸晨覿之朝薦明靈於􅃦廟頒有位乎中朝光可鑒形鄙照車之寳楚淸䏻禦暑輕翣莆之珎堯向玉堂以􅀌瑩鎭瓊筵而自昭助微凉於長簟廻煩燠於炎颷􅀑神以之而饗集君臣以之而利饒豈止疾雷不震凄風不飄致兩儀之交泰作六氣之和調而巳哉冰之藏也㫖意可稽冰之賦焉英華可覿休宗社之成禮暢乾坤而樹績順時元吉爲我政之􅁪孚悖道致尤寧魯臣之屢折六合蒼蒼萬物攘攘詎無時啓亦有時藏繹其功而此譬於厥德而何方勁挺金相貞淸玉質展其用無愧於明時韞其光不欺於暗室平凛冽以冬入滌赫曦而夏岀穿楊發彼觀國于玆㡬又一倍以増悲嗚呼麟非騰噬之儔詎豺狼之共穴鳯實仁靈之􅀋豈鷹鸇之同列惟玉石之不分亦薰蕕之自别是以謇謇心競昻昻面折彼炎炎之原燎信撲之而不㓕寧歸死以申懷不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡爲是日力不如人使典章之不信俾忠義之空勤律中大吕日臨䝉谷風颼颼於衰草煙茫茫乎平陸思悽悽而塡臆涙淫淫以盈目義則非其知友親故遠乎骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭律和聲賦見象聲律以和萬方詠聲周􅀆律聲遍人心厚􅀆國風變伊在堯之旣引載得䕫而斯見哀思慮始安和追徃宗伯官也擇人乎有才正始化焉選音於無象綴咸池之雅韻去桑間之末賞圖風普以雨周筭天長而地廣律則以宮激徴詠則從濁揚淸且懲流而反正常誡險以歸平􅀂近􅀂遠非幽非明􅀋無臭等無聲信矣惟時與四時而德洽純如合莫彌六合以文成善詠者聲應聲者律會高低以齊奏諧疾徐而竝出跡不得㝷功如何述爲災爲眚曾莫奉於淫后調陽序隂屢見資乎聖日故得之者體圓御方失之者亡禋絶祀比屋可戮桀紂罔測其所由率土可封堯舜固知其所以不然者移風之言􅂚謂易俗之訓則䢷我所以淸六管順賡歌載唱載吹匪塤箎之獨叶一張一弛豈琴瑟之空和八紘有截四海無波物阜人蕃雖歸之乎至德鳥來獸舞蓋於斯而靡他其理微其用遠論有助也侔大君之得一考無情焉同八風之吹萬可謂我詠斯暢我律斯藏發揚六氣孕育群方處植者以之而茂實含識者於焉而夀昌彼離連與栗陸復何道而稱皇歐陽行周文集卷之一
