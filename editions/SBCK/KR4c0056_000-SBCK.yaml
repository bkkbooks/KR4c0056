front:
  text: 唐書文藝傳歐陽詹字行周泉州晉江人其先皆爲本州州佐縣令閩越地肥􅄛有山泉禽魚雖能通文書吏事不肯北宦及常衮罷宰相爲觀察使始擇縣鄕秀民能文辭者與爲賔主釣禮觀游饗集必與里人矜耀故其俗稍相勸仕初詹與羅山甫同隱潘湖徃見衮衮奇之辭歸泛舟飲餞舉進士與韓愈李觀李絳崔羣王涯馮宿􅁃承宣聮第皆天下選時稱龍虎榜閩人第進士自詹始詹事父母孝與朋友信義其文章􅀷切回復明辨與愈友善詹先爲國子監四門助敎率其徒㐲闕下舉愈愽士卒年四十餘崔羣哭之甚愈爲詹哀辭自書以遺羣初徐晦舉進士不中詹數稱之明年高第仕爲福建觀察使語及詹必流涕從子秬字降之亦工爲文陸洿自右拾遺除司勲郎中棄官隱吳中詔召之旣在道秬遺書讓出處之遽洿不至還秬名益聞開成中擢進士第而里人蕭本妄言與貞獻太后近屬恩寵赫然秬耻之㑹澤潞劉從諫表秬在幕府秬爲辨質本之僞本終得罪其子積拒命秬方休假還家積表斥損時政或言秬爲之詔流崖州賜死臨刑色不撓爲書徧謝故人自誌墓人皆憐之
