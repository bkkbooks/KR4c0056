body:
  text: 歐陽行周文集序福建等州都團練觀察處置等使正議大夫使持節都督福州諸軍事福州刺史兼御史中丞上柱國賜紫金魚袋李貽孫纂歐陽君生于閩之里㓜爲児孩時即不與衆童親狎行止多自處年十許歲里中無愛者每見河濵山畔有片景可採心獨娱之常執卷一編忘歸於其間逮風月淸暉或暮而尚留窅不能釋不自知所由蓋其性所多也未甚識文字随人而問章句忽有一言契於心移日自得長吟高嘯不知其所止也父母不識其志每嘗謂里人曰此男子未知其指何如要恐不爲汨􅃿之饑氓也未知爲吉凶邪鄕人有覽事多而熟於聞見者皆賀之曰此􅀂家之寳也柰何慮之過歟自此遂日日知書㐲聖人之敎慕愷悌之化逹君臣父子之節忠孝之際唯恐不及操筆屬詞其言秀而多思率人所未言者君道之容易由是振發於鄕里之間建中貞元時文詞崛興遂大振耀歐閩之鄕不知有他人也會故相常衮來爲福之觀察使有文章高名又性頗嗜誘進後生推㧞於寒素中唯恐不及至之日比君爲芝英每有一作屢加賞進遊娱燕饗必召同席君加以謙德動不踰節常公之知日又加􅀷矣君之聲漸騰於江淮且逹於京師矣時人謂常公能識眞㝷而陸相贄知貢舉搜羅天下文章得士之盛前無倫比故君名在榜中常與君同道而相上下者有韓侍部愈李校書觀洎君竝數百歳傑岀人到于今伏之君之文新無所襲才未甞困精於理故言多周詳切於情故叙事重復宜其司當代文柄以變風雅一命而卒天其絶邪君於貽孫言舊故之分於外氏爲一家故其屬文之内名爲予伯舅所著者有南陽孝子傳有韓城縣尉􅆹壁記有與鄭居方書皆可徴於集故予冲㓜之歲􅀰拜君於外家之門大和中予爲福建團練副使日其子價自南安抵福州進君之舊文共十編首尾凡􅀂干首泣拜請序予諾其命矣而詞竟未就價微有文又早死大中六年予又爲觀察使令訪其裔因􅀗其孫曰澥不可使歐陽氏之文遂絕其所傳也爲題其序亦以卒後嗣之願云歐陽行周文集目錄歐陽詹字行周第一卷賦岀門賦石韞玉賦廻鑾賦將歸賦王者宜日中賦瑾瑜匿瑕賦徴君洪崖子圖賦明水賦春盤賦藏冰賦懷忠賦律和聲賦第二卷雜著李評事示文集蜀中將廻留辭韋相公太原旅懷途中寄太原所思詠德上韋檢察寓興赴洛途中作晨裝行江夏留别贈徐十八晦送袁秀才聞鄰舍唱凉州有所思送郭秀才述德上興元嚴僕射春日途中汝川行許州途中銅雀妓題嚴光釣臺福州送鄭楚材赴京師秋日登龍興寺登汾上閣送陸戸曹送少微上人歸德峯荆南夏夜水樓送高士安下第酬裴十二秀才旅次舟中對月寄姜公御溝新栁過福光寺律院宣上人房詠德上李尚書及第後詶故園親故除夜長安客舍早秋登慈恩寺塔送張中丞寄林藴樂津店北陂第三卷雜著益昌行題華判官汝州宅内亭登龍興寺八月十五日夜翫月覩亡友題壁題秦嶺寄嚴僕射途中採摘懸壺子岀蜀門韋晤宅聽􅁔認得越鳥聲送聞上人遊嵩山題照上人房讀周太公傳山中老僧贈魯山李明府留别舍弟送張驃騎邠寧行營題梨嶺題第五司戸侍御寄弘濟上人觀送葬宿建溪即事建谿行待陳詡題王明府郊亭塞上行留别郭中諸公登高懷林十二先軰九日登高雨晴即事除夜侍酒元日陪早朝題延平劒潭晚泊漳州營頭亭駑􅂹吟又和此首水精念珠歌贈山南嚴兵馬使第四卷銘棧道銘陶器銘馬公墓誌銘楊公墓誌銘鄭公墓誌銘御史中丞馬公墓誌銘第五卷記曲江池記太學張愽士講禮記記上方石像記右街副使􅆹壁記泉州北樓記泉州六曹新都堂記二公亭記同州韓城縣西尉㕔記第六卷頌德勝頌二章有所恨二章東風二首片言折獄論南陽孝子傳自明誠論珍祥論第七卷雜著唐天文刖卞和述甘露述暗室箴吊九江驛碑文吊漢武文補封雍齒冊文第八卷書與鄭伯義書與王式書上張尚書書上鄭相公書第九卷序翫月詩序宴更湖亭序别桞由􅁃序送楊行元序送林明府序送建上人序送李孝㢘序送常熟許少府序送張陲序送王式東遊序第十卷序送蔡沼覲省序送鹽山林少府序送無知上人序送楊據序送陳八赴舉序二月三日宴僚吏序餞斐叅和序送洪孺卿赴舉序歐陽行周文集目錄終
