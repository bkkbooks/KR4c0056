body:
  text: 歐陽行周文集卷之二雜著李評事公進示文集以詩贈之風雅不墜地五言始君先希微嘉會章杳􅁳河梁篇理蔓語無枝言一意則千徃來更後人澆蕩醨前源傾筐實不􅀵樸􅈪華爭繁大敎護微㫖哲人生今孫高飊激頽波坐使横流翻昔日越重阻側聆滄海傳逮玆覿淸陽幸覩靑琅編泠泠中山醇片片崑山璠一杯有餘味再覽增光鮮對寳豈皆鑒握鞶良自妍吾其告先師六義今還全蜀中將廻留辭􅅊相公寧體則雲構方前􅁪食玉貧居豈及此要自懷歸憶在夢關山遠如流歲華逼明晨首鄕路迢逓􅀌飛翼大原旅懷呈薛十八侍御齊十二奉禮前來稱英俊有食主人魚後來曰賢才又受主人車伊予亦􅄬刺恩煦胡彫踈旣覩主人面又獻主人書餬口百家周賃廡三月餘眼見寒序臻坐送秋光除西日惄飢腸北風集絺裾升堂有知音此意當何如初發太原途中寄太原所思驅馬覺漸遠廻頭長路塵高城巳不見况復城中人去意自未甘居情諒猶辛五原東北􅀳千里西南秦一􅋰不出門親車無停輪流萍與繫匏早晩期相親詠德上韋檢察即韋相之弟也少華􅀋太華太室似少室亞相與丞相亦復無異質渟如月臨水瀟若松照日輝影互光澄隂森兩䓗鬱連城鸞鳯下同氣魚龍岀倂力革夷心通籌整師律英豪願廻席蠻貊皆屈􅂰中外行分途寰瀛􅄎淸謐寓興桃李有奇質樗櫟無妙姿皆承慶雲沃一種春風吹美惡苟同歸喧􅅝徒爾爲相將任玄造聊醉手中巵自懷州却赴洛途中作惆悵䇿疲馬􅀌蓮被風吹昨東今與西冉冉長路岐歲晩樹無葉夜寒霜滿枝依人􅁪辛苦㝠寞天何知晨裝行村店月西入山枝鵊聲求燈徹夜席束囊事晨征寂寂人尚眠悠悠天未明豈無􅅯息心所務前有程江夏留别辛三十時自襄陽同舟而下予歸閩辛從此赴舉弭棹巳傷别不堪離緒催十年一心人千里同舟來鄕路予尚遠客程君未廻將何慰兩端互勉臨岐材徐十八晦落第嘉榖不夏熟大器當晚成徐生異凡鳥安得非時鳴汲汲有攸爲驅驅無本情懿哉蒼梧鳯終見排雲征送袁秀才下第歸毗陵羸馬岀都門脩途指江東關河昨夜􅀨草木非春風矢捨雖未中璞全終待攻層霄秋可翔豈不隨高鴻聞鄰舍唱凉州有所思有伊善凉曲離别在天涯虛堂正相思所妙發鄰家聲音雖􅀋聞􅄱影終以遐因之憎遠懷惆悵菖蒲花賦得秋河曙耿耿送郭秀才赴舉雜言月􅃿天欲明秋河尚凝白皚皚積光素耿耿横虛碧南斗接北辰連空􅄥鴻同浮高天蕩蕩漫漫皆晶然實􅀋平蕪流大川星爲潭底珠雲是波中煙雞鳴漏盡東方作空曲蒼蒼曉煙落鴈呌疑從淸淺驚鴈聲似在㳂洄泊幷州細侯直下孫才鷹秋賦懷金門念排雲漢將飛翻仰之踊躍當華軒夜來陪餞歐陽子偶坐通宵見􅀷旨心知慷愷日昭回前程志在靑㝠裏述德上興元嚴僕射二首山横碧立竝雄岷大阜洪川共降神心合雲雷淸禍亂力廻天地作陽春非熊德媿當周輔稱傑叨慙首漢臣何幸腐儒無一藝得爲門下食魚人又推車閫外主恩新今日梁川草遍春玉色據鞍雙節下揚兵百里路無塵春日途中寄故園所親客路度年行故園未云返悠悠去源水日日祗有遠始嘆秋葉零又看靑草晩寄書南飛鴻相憶劇鄕中汝川行汝墳春女􅁞忙月朝起採桑日西没輕綃裙露紅羅襪半蹋金梯􅀝枝歇垂空玉腕􅀂無骨映葉朱唇似花發相歡誰是遊冶郎􅁞休不得岐路旁許州途中秦川行盡頴川長吳江越嶺巳同方征途􅄅􅄅煙茫茫未得還鄕傷近鄕随萍逐梗見春光行樂登臺闘在旁林間啼鳥野中芳有似故園皆斷腸銅雀妓蕭條登古臺廻首黃金屋落葉不歸林高陵永爲谷粧容徒自麗舞態閱誰目嗚咽繐帷前歌聲苦於􅂘題嚴光釣臺弭棹歷陳跡悄然関我情伊無昔時節豈有今時名辭貴不辭賤是心誰復行欽哉此溪曲永獨英風聲福州送鄭楚材赴京師時觀察劉公亮有感激之意美人河岳靈家本滎水濆門承􅀂蘭族身韞如瓊文早折靑桂枝俯窺鴻鵠群爾來丹霄姿遠逐蒼梧雲有伊光鑒人惜玆瑞蕙薰中酣前激昻四座同氛氲海郡梅霔晴山郵炎景曛廻翔罷南遊鳴唳期西聞秦塞鸞鳯征越江雲雨分從玆一別離佇􅆀如堯君和嚴長官秋日登太原龍興寺閣野望百丈化城樓君登最上頭九霄廻棧路八到視幷州煙火遺堯庶山河啓聖猷短垣齊介嶺片帛指汾流淸鐸中天􅄜哀鴻下界秋境閑如道勝心遠見名浮豈念乗肥馬方應駕大牛自憐蓬逐吹不得與良遊陪太原鄭行軍中丞登汾上閣中丞詩曰汾樓秋水闊宛似倒閶門惆悵江湖思惟將南客論南客即詹也輙書即事上答幷州汾上閣登望似吳閶貫郭河通路縈村水逼鄕城槐臨枉渚巷市接飛梁莫論江湖思南人正斷腸送潭州陸戸曹之任戸曹自處州司倉除三語又爲掾大家聞屈聲多年名下人四姓江南英衡嶺半天秀湘潭無底淸何言驅遠車去有􅀩莊情送少微上人歸德峯不􅀒人間累棲身任所從􅁅心聞密行菜色見羸容幻世方同悞􅀷居願繼蹤􅀌雲與禪誦到後在何峯荆南夏夜水樓懷昭丘􅀡上人雲夢李莘無機成旅逸中夜上江樓雲盡月如練水凉風似秋鳬聲聞夢澤黛色上昭丘不遠人情在良宵恨獨遊送高士安下第廻岷􅀯寧親偕隱有賢親岷􅀯四十春樓雲自匪石觀國暫同塵就養思児戲延年愛鳥伸還看謝時軰又作潁陽人酬裴十二秀才孩子詠裴拜曰待看成器後折取桂林余筭日未成年英姿巳襃然王家千里後荀氏八龍先葱蒨松猶嫩淸明月漸團將何一枝桂容易賞名賢旅次舟中對月寄姜公比公丁泉州門客中宵天色凈片月岀滄洲皎㓗臨􅀌島嬋娟入亂流應同故園夜獨起異鄕愁那得休蓬轉從君上􅁃樓御溝新栁貞元八年及第省試東風韶景至垂栁御溝新媚作千門秀連爲一道春柔荑生女指嫩葉長龍鱗舞絮廻靑岸翻煙拂綠蘋王孫初命賞楚客欲傷神芳意堪相贈一枝光遠人同諸公過福先寺律院宣上人房律座下朝講畫門猶掩關叨同静者來正值高雲閑寂爾方丈内瑩然虚白間千燈智惠心片玉淸羸顔松色落􅀷井竹隂寒小山晤言流曦晚惆悵歸人寰詠德上太原李尚書􅄼以公方郭細侯幷州非復舊幷州九重帝宅司丹地十萬兵樞擁碧油鏘玉半爲趨閣吏腰金皆是走庭流王褒㫕德空知頌身在三千最上頭及第後詶故園親故才非天授學非師以此成名曩豈期楊葉射頻因偶中桂枝材美敢當之稱文作藝方慙德相賀投篇料媿詞猶著褐衣何足羡如君即是載鳴時除夜長安客舍仍寢如流歲又遷望家思獻夀筭甲恨長年虚牖傳寒柝孤燈照絕編誰應問窮轍泣盡更澘然早秋登慈恩寺塔寳塔過千仞登臨盡四維毫端分馬頰墨􅀧辨蛾眉地逈風彌緊天長日乆遲因高欲有賦遠意慘生悲許州送張中丞出臨潁鎭心誦隂符口不言風驅千騎出轅門孫吳去後無長䇿誰敵留侯􅀡下孫蜀門與林藴分路後屢有山川似閩中因寄林藴藴亦閩人也村歩如延夀川源似福平延壽福平皆閩中川原之名延夀即藴之别墅在焉福平即予之别墅在焉無人相與識獨自故鄕情樂津店北陂嬋娟有麗玉如也美笑當予繫予馬羅帷碧簟豈相容行到山頭憶山下歐陽行周文集卷第二
