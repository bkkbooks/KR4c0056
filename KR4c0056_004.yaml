body:
  text: 歐陽行周文集卷第四銘棧道銘幷序秦之坤蜀之艮連高夾深九州之險也隂谿窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉㝠㝠麋鹿無蹊猿猱相望自三代而徃蹄足莫之能越秦雖有心蜀雖有情五萬年間夐不相接且秦之與蜀也人一其性物同所宜嗜慾無餘源教化無餘門可貿遷可親昵擘坼地脉睽離物理豈造化之意乎天實凝淸而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不周廻翔有所不合澄結旣定窽缺生乎其中西南有漏天天之􅑆缺也于斯有玆地地之窽缺也天地也者將以上覆下燾含蓄萬靈可通必使而通者也苟有可通而未通則聖賢代其工而通之故有爲舟以濟川爲梯以踰山唯玆地有川不可以舟渉有山不可以梯級粤有智慮念全玄造立巨衡而舉追氏縋懸纑以下梓人猿垂絶㝠鳥傍危岑鑿積石以金力梁半空於木用斜根玉壘旁綴靑泥截斷岸以虹矯繞翠屏而龍踠堅勁交固雲橫砥平捴庸蜀之通塗綂歧雍之康莊都邑之能歩山川之無脛若水决防如鴻向陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣以逹人神會同稽禮樂之短長量威力之汙隆可王者王可公者公而吹以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼爲上懷來在乎德爲下招德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不爲琢材雖多恐不爲構想夫徃昔有時而有有時而無是用惕惕天下蚩蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯湯者荷古人之攸作銘曰天覆地燾本亦同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦惟南則蜀地缺其間坤維不續斗超岸斷屹爲兩區秦人路絶蜀火煙孤天實不通賢斯有造鑚堅剡勁無蹊以道若川匪舟若陸匪車緣危轉虚歩驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我營自顛而植地非革勢才不易林踣植之致惠怨之心勿爲斯道不恒勿爲斯道可乆禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之物若玆彼知不易玆而易知勒銘于左其同我思陶器銘幷序甞侍論於長者儳有之曰近代之作玉杯麗則麗矣愚以不如古人之爲陶長者韙之以爲知言退而思其所自多亦不沗伊人之譽器以利用道從易簡利用者貴無罔而不適易簡者取立功而匪勤今天下之至富者土也不勞而成者火也夫陶掬壤以製焚蒸以凝就其不勞因其至冨不瑩而冰淸珠晥不鍜而金固石堅一工致功千室以給􅷴鬲罍甗缾缶盃盂大窮儋石小極圭撮經鼎鑊而自若在燀爇而莫渝滿堂絶侈靡之譏提挈無剽殺之患其功則易簡也其實則利用也其藏又保安也易簡二儀之理利用五行之本保安立身之方執人之方履物之本從天地之理此三皇五帝所以内戸不扄外户不閉無爲之徳所由生也豈夫玉杯之獨劣其餘孰得而儔焉則刓材搜璞窮山越壑礱磨雕琢鑄鍊丹雘力盡終年之功財殫不訾之産量纔升合質忌湯火寘家得奢盈之議中懷生賊害之累其功則非易簡也其實則非利用也其藏又非保安也悖二儀之理違五行之本乖立身之方此夏桀商紂所以人人頗邪比屋可戮亡身之禍所由生也省費鮮勞皆備於物德且如彼而人賤之煩人蠧財不周於用禍又如此而人貴之乆矣哉世之迷也物有賤而可貴亦有貴而可賤惟賢者能審之小子不幸憶而有中誠背常人之見故爲銘以廣之銘曰黜汚易抔聖人製器易簡作程利用爲貴稽諸徃載函實攸興裁因掬壤成假焚蒸不雘不丹不雕不刻自結金堅天然冰色財無害産功匪殫力量盡洪纎用窮幽仄物有千金相異我取不費爲利物有積功相崇我取不勞爲工物有患湯忌火我取徃無不可物有剽殺焚軀我取懷藏不虞心存目視奢尋彼至室滿堂盈侈莫我生省庸周用所賤謂何賈害勤人所貴者那可貴不貴物失其類失類曰昏雖隆必墜可賤不賤物得其選得選曰明雖幽必見上惟五帝下相三王實有以興亦有以亡蚩蚩百工孰若我陶敬銘有器永告滔滔有唐故銀靑光祿大夫行平州別駕馬公墓誌銘幷序嗚呼死也者君子曰終有唐興元二年六月二十四日銀靑光祿大夫行平州別駕馬公終于京師國䘮英才家亡令孫家國不幸痛毒可知公諱某字某其先京兆扶風人始實趙氏累葉繼將多總戎塞下有以因居今爲燕之名流曾祖某某官祖某某官父某某官公則某官第某子也積奕世忠貞之慶得隂方嚴勁之氣天骨山峻神葱玉輝有孝有悌閨門以和有信有義州閭以附矛㦸韞器風雲馳聲燕趙多奇士公其人也用正直奉籌畧擁旄杖節者尊以果斷行正令擐甲執兵者伏前後佐全師大幕不有暫寧方將張翼翔雲揚鬐遊𬈑大命不永大病遄及享年三十三秦氏毉遟顔生禍促哀哉夫人某處某氏子二人長曰縱次曰緒永思之感至性過人以貞元十二年歲在某月某日大通卜宅于京兆某鄕某里某原禮也天長地乆堙川塹阜于何不有乃爲銘德而誌墓云士比常才如瑜在岷燕趙多奇公則其人業繼忠貞識資籌略器流瑚璉羽族雕鶚題輿太郡佐律雄師雖猶柱德亦匪孤時南仰摶鵬更期遐颺東觀逝水忽玆永往卜遠斯及窆于此岡惟宅惟安天長地長有唐故朝議郎行鄂州司倉叅軍楊公墓誌銘幷序公諱某字某其先関右弘農人永嘉過江公自始遷之祖若干代處於閩越曾祖某皇唐循州司馬祖某漳州長史父某泉州南安縣丞公則南安第若干子長七尺骨目瓌異温良節行所至自昭風神識度群居不掩六籍外偏好穰苴管子之術永泰中以耕戰之法致梁宋軍畫用有成大暦元年節度使右僕射田公薦授左武衛率府倉曹叅軍事在位以貞愼聞公以不仕則墜業躁求則背道或出或處聖人爲中依吏部節文敬遵常調大暦八年集授吉州永思縣丞興元元年集授廬州司田叅軍貞元二年授鄂州司倉叅軍累職貞愼如率府倉曹時每罷官待集卜勝屏居晏如也鄂州秩滿愛其風土亦心焉貞元十二年冬又合集春赴京師遇疾於途以二月四日終于汝州龍興縣之逆旅時年六十七凡入仕三十一年歴官四政祿非豐儉以足務雖劇通以簡上以忠政重下以公平瞩皆白珪無玷朱絃有聲嗚呼公之材之量如鐘含音如水待盛大小當應方圓必荅我則不衒人胡不求莫能全展光耀以至殞沒悲夫夫保性居業時行則行時止則止道也公昔於名官之理是焉士祿農耕猶生則營若死則巳亦道也公昨於岐路之役是焉公存以道始亡以道終至人不違道公與之周旋正矣乎善始終者也夫人隴西彭氏戴天之感痛以禮成長子晃次子暈季子杲伏凶之號以至見血以年某月日卜葬某鄕某原禮也佳城一閉他時古丘後之人孰知丘中之德墓許有誌故爲墓誌銘庶覩今爲古者明斯地泉下有君子焉銘曰一種鱗物神則曰龍一種植物貞則曰松楊公於人彼貞彼神藝術濳引溫良内克名不稱實祿有負德夭桃信美不能秋敷冬日可愛亦用西徂大期斯來無賢無愚英英楊公與逝川俱下此脩源有形永宅東海西山不易罔易大唐故輔國大將軍兼左驍衛將軍御史中丞馬公墓誌銘幷序墓有誌誌有銘誌記也銘名也名人記墓庶髙岸爲谷幽壤或呈情當掩者有所歸認斯馬公之墓也公諱寔字某其先扶風人生於幽州高祖某官祖某官父某官若干子皆以雄謀果斷稱公則第三人長八尺有羡鵰姿鶚靈霜嚴壁峻樂而後笑時而後言孝弟忠信分義節㮣覩容可見好史學歴代英豪得失皆覈其有不正不直辨論慷慨若加諸巳明隂符善司馬法起家爲范陽軍要籍本軍疑政畫多自岀遷千夫長萬夫長三軍兵馬使莫州近邊戎數爲害本軍元帥請綂鎭之戎遠逃遁莫人大乂拜御史中丞莫州刺史俄薊州之患如莫州移薊州薊人繼康攝州刺史貞元初本軍之事有大者合議於天子自管内二千石已下擇賢能以公當其選天子異其議奇其詞决所議答于本軍而留近侍拜左驍衛將軍宿衛十一年長松在林利錐處囊森竦頴脫鋒幹獨見天子儲而將用未有所當貞元十四年寢疾其年七月十一日終于京師常樂里之私第岀身從事若干年署職蒞官若干政春秋五十一當時俊傑懷材抱器者無不驚呼歎息嗚呼騏驥有騰千騁萬之足伏乎櫪干將有剸犀截象之鋩閉乎匣將用未用一朝變化爲骨燕市入泉廷平爲知人之痛惜公其比歟夫人鴈門田氏鴈門郡王氏之女哭泣之慕痛而中禮子六人男五人一先公四人在曰綬曰縝曰某曰某綬三十八縝年十五其餘㓜稚不言可知女二人一先公一人在四歲至性攀號感動飛走以其年十一月一日卜葬于京兆府萬年縣洪固鄕延信里司馬村之少陵原禮也其承眷長沙歐陽某執紼及墓就誌而銘曰骨肉歸土賢愚共門英英馬公亦封此原大節大成平生所志貞心壯氣松孤壁峙掄擇雖致材成則未岑崟蒼翠俄摧忽墜脩短無涯傷如之何有唐君子鄭公墓誌銘幷序貞元十一年歳次乙亥某月某日淸源郡晉江縣君子鄭公年若干終于其居州閭親識遠近漣涕重吉人也嗚呼杞梓植於深林人雖不知不妨其爲天下之材也珠玉碎於重泉人雖未玩不妨其䘮天下之寳也公之生則深林之材公之殁則重泉之寳不知而有未玩而亡哀哉公諱晩字季實其先宅滎陽永嘉之遷遠祖自江上更徙于閩今爲淸源晉江人曾祖某官祖某官父某官太夫人同郡頴川陳氏育者三男三女公則長男也自七八歲則明敏嚴潔無復童心洎十二三則溫良貞亮有成人之德旣冠儀表可觀孝悌惠和侔於前哲人望無間時譽皆歸鳯不近腥龍多自盤優游仁里四十不試詹有若人之妹獲配於公公太夫人早世姝不逮事則見公霜露之感蒸嘗之敬公尊府君近捐甘㫖妹及同養則見公晨昏之愛縗斬之至奉公居閨門鄕黨者十有五年顧詹於公善良内外兼得受命不永其如命何蘭芬蕙馨或亦中敗惜哉子二人皆㓜公在日名之曰彦方彥章詹既在京師不遂撫慰來人有述實孺能號妻亦聞哀有過人禮不踰制窆取遠日堂殯三年以貞元十二年某月日氷厝于郡城東偏聞儒里常熟湖之北原禮也妹有遠告咨于題誌旣忝眞懿實舊知人江嶺則遐想象不昧取思芳茂爲銘以寄銘曰有斐李實君子之禎忠信温良自㓜而行少不改任長更推誠材植遠林寳産遐壤無知無玩自生自喪骨肉歸上用瘞斯原嗚呼斯永棲君子之魂歐陽行周文集卷第四
