body:
  text: 歐陽行周文集卷第五記曲江池記木不注川者在藪澤則曰陂曰湖在苑囿則為池為沼苑之沼囿之池力墾而成則多天然而有則寡茲池者其天然歟修原北峙回岡旁轉圓環四匝中成窞坎窙窖港洞生泉潝源東西三里而遙南北三里而近當天邑别卜繚垣未繞刀空山之濼曠野之湫然黃河作其左塹淸渭為其後洫裒斜右走太一前橫崇山濬川鈎結盤護不南不北湛然中亭西北有地平坦彌望五六十里而無窪坳紫蓋凝而不散黃旗鬱以常在實陶鈞之至造化之功沙汰一氣之辰財成六合之日既以磽確外為寰宇敞無垠堮以居億兆又選英精內為區域束以襟帶用宅君長若人斯生支體具矣有心以繫其神焉若堂斯考廊廡設矣有室以處其尊焉彼如紫蓋黃旗之氣豈陶鈞造化者用宅君長英精之所耶夫物苟相表裏製必同象泄夫外則廓以靈海導夫內則融乎此湫歷代帝王未得而有豈降巢宅土之後聮綿千百之代建卜都邑不欲合夫天意而居乎將天意尚伺其根深蒂固可與終畢者而命處之故於有隋兆我皇唐之在孕逮其季主營之以須焉揆北辰以正方度南端而製極墉隍劃趾鈎陳定位地回帝室湫成厥池既由我身才成伊去真主巍巍龍盤虎踞爰自中而軌物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則總天府之津液疏皇居之墊隘潢汚入其洞徹銷涎漦以下澄汚廅隨其佳氣蕩鬱攸而上滅萬戶無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎晶如練淸明在空俯睇沖融得渭北之飛鴈斜窺淡濘見終南之片石珍木周庇奇華中縟重樓夭矯以縈映危榭巉嵒以輝燭芬芳蔭滲滉漾電烻凝煙吐靄泛羽遊鱗斐郁郁以間麗謐徽徽而淸肅其涵虛抱景氣象澄鮮有如此者皇皇后辟振振都人遇佳辰於今月就妙賞乎勝趣九重繡轂翼六龍而畢降千門錦帳同五侯而偕至泛菊則因高乎斷岸祓禊則就潔乎芳沚戲舟載酒或在中流淸芬入襟沉昏以滌寒光炫目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文于上空砰輷沸渭神仙奏均天於赤水黤藹敷俞天人曵雲霓於玄都其洗慮延歡俾人怡懌有如此者至若嬉遊以節宴賞有經則纎埃不動微波以寧熒熒渟渟瑞現祥形其或淫湎以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈與善懲惡有如此者小子幸因受遣觀光上國身不佞而自棄日無名以多暇詢奇覽物得之於斯矚太始之玄造訪前蹤於碩老天生地成之理識之於性情物義人事之端徴之於耳目夫流惡含和厚生蠲疾則去隂之慝輔陽之德也涵虛抱景氣象澄鮮則藻飾神州芳榮帝宇也延歡滌慮俾人怡悅則致民樂土而安其志也棲神育靈與善懲惡則俗知所勸而重其教也號惟天邑非可謬創一山一水拳石草樹皆有所謂茲池者其有謂之雄焉意有我皇唐須有此地以居之有此地須有此池以毗之右至仁之亭毒贊無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而諭夫深則淺矣而有功如彼有德若此代之君子蓋有知之而不述今民無德而稱焉輒粗陳其旨刋諸岸石庶元元荷日用之力也貞元五年歲在巳巳夏五月十有五曰記大學張博士講禮記記説釋典籍謂之講講之為言溝也如農之耕田疇焉田疇將植而求實雖耕矣必溝分其畦壟嘉榖由是乎生典籍將隸以求明雖習矣必講窮其旨趣儒術由是乎成我國庠春享先師後更月命太學博士淸河張公講禮記成儒術也聖祖三刋經九公通其六精於五而禮記在乎其中禮也者御人之大故首于群籍而講之束修既行筵肆乃設公就几北坐南面直講抗牘南坐北靣大司成端委居于東小司成率屬列于西國子師長序公侯子孫自其館太學師長序鄉大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彥自其館其餘法家墨家算家輟業以從亦自其館沒階雲來即集鱗居攢辨如星連襟成帷公先申有禮之本次陳用禮之要正三代損益得失定百家疏義長短鎔乎作者之意注乎學者之耳河傾于懸風落于天清冷灑蕩幽遠無泥所昧鏡徹於靈臺所疑冰釋於心泉後一日聞于朝百司逹官造者半後一日聞于都九域知名造者半皆尋聲得器虛來實歸豫職在下庠亦掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁拜列當時執簡摳衣者于左偏貞元十四年五月二十七日記福州南澗寺上方石像記萬物闐闐各由襲沿無襲無沿而忽以然苟非妖怪實為珍慶斯石像者其珍慶歟始孕靈韞質兆朕未見則峨峨巨石巖峭山立鎮郡城之前阜壓蓮宮之上界海若鞭而莫動天時泐而終固皇唐天寶八年五月六日淸晝忽騰雲旁涌驟雨來集驚飊環駭軯訇杳冥雄雄者雷騞然中震迸火噴野大聲殷空岑嶺躨跜潭洞篩蕩須臾風雨散雲雷收項劈輪囷斬然中闢南委地以柿落北干霄而碣樹不上不下不西不東亭亭厥心隱出真像三十二相具八十種好備列侍環衛品覺有序莊嚴供養文物咸秩端然慈面儼矣儀形似倚雪山而授法如開月殿以趺坐異矣哉不曰博聞乎未聆於既往不曰多智乎罔測其所來且物之堅莫堅於石况高原廣袤又群石之傑一朝瓜剖中有雕琢其為造石之初致有相而外封乎其為有石之後入無間以內攻乎意不可以人事徴請試以神化察巍巍釋氏發輝道精其身既傾其神不生等二儀以通變齊四大而有力教於時有所頽靡人於教有所忸怩則為不可思議以煦以吹故示此無迹之迹難然之然俾知我存存我之門經曰千百億化身蓋隨感而應茲身者則百億之一焉昔諸佛報見皆託於有命有命則有生有生則有滅曷若因其不朽之物馮乎不動之基形既長存法亦隨是與夫為童男而出世假長者以來化玄玄之徼則雖一永永之利則不侔可以禮足而悔罪寄影以安樂豫則求福不回者焚香跪仰或從釋子之後故於巉巉之餘仞聊書其所由來貞元六年七月十五日記右街副使廳壁記使有副副之言繼也其一繼之輔也所以繼其或缺而又輔其違焉其亦總使之務歟皇街使之副其職大矣天子外有六合故內闢六街以逹之彼為庭除此為堂室靜諸外必先諸內乃置使以淸之我唐新典也蓋以警正天衢紏逖王慝傾環遊式遏之卒專扞掫徼循之令夫京師豪傑英俊之都會蠻夷戎狄之來萃排輪重足馮衆多撓我防則户伊動必由我察則目伊瑕必見繇是九城之中乘避貴負敬長金玉可拾遺則猶土幼弱可欺遇則如傷出門若有賔讓路若有神雲興烏合而無暴自東自西以咸萃憧憧焉斯焉而能在其中悖悖焉斯焉而謹在其中六合澄晏六街源之則街使之功副使攸同也貞元八年上以元舅兵部尚書大金吾濮陽公兼右街使俾訪忠良以自佐濮陽公先以節行選次以材能擇加之以更歷因之以故舊得建州别駕前白衣奉御高陽許公以聞上素知公名即日召見敷對器實有符曩聲當錫紫綬金章於殿庭而允其請濮陽公本官用視茲佐得人街之政悉以相付公靜而敏淸而貞堅鑰禁樞深鋤事根不誡而部伍增肅不按而逵陌倍理日出作日入息三條四出風恬月靜職斯有述公此無作遷蘄州别駕副使如故旌其勞且藉能也夫迹以行生言由事覩公釐斯署之績得國家建斯署之義遂書其義昭其績為公廳之壁記云其或接公之武踐茲位者任是既重德亦無輕列公之左雖百氏可也貞元十一年五月記泉州北樓記釋名曰樓瞜也謂其高明覿遠瞜瞜然也建於第宅則以閲園林有媚樹於雉堞則以警寇盜不虞故墨子曰城三十步一坐候樓百步一立候樓茲樓者蓋此郡北墉之立候樓也卜築之始微而具之袤不倍常廣唯再尋製造日遠土木力殆左騫右陊上露下圯有年數矣邦牧安定席公貞元七年下車至九年目之三祀重民力而未形言是年暮秋歲豐農隙有司率常典告有事于土功公曰斯郡之南極也元后帝鄉實在於北詩不云乎心乎愛矣遐不謂矣欲因戀主向方瞻矚惟北有樓半傾半摧日夜闕登陴擊柝之所風雨憂折榱復隍之患政因時令爾其營之俾有布席跪立之地間更人防卒之蒞事豫將時躋展北靣拱辰之心焉受命者感公之意如公之意野人群庶感公之誠如公之誠川朝子來壞崩易蠧趾有餘而不剗基墌自延材有長而不剪棟宇自崇既望庀徒未晦成功倚層霄於軒檻納千里乎窗牖如鱗之廨署若岸之軍壁得之之狀若連山之有重巒長江之蹙洪濤氣勢繇是以雄焉公每子牟情來莊舄思生俯仰於斯徘徊於斯夫完城壯邑有邦之本也戀闕愛君為臣之節也善矣哉公廣茲樓也遠得有邦之本大有為臣之節執邦之本曰公謹臣之節曰忠唯公與忠公斯昭矣小子家在委巷多聞輿頌藝沗儒術每侍公居上志下衷兩獲而逹敬書其事為之記以獻至若眺四維之雲物臨萬井之煙景遐象佳致眸莫勝觀非公有樓之素故不之載貞元九年秋九月三十日獻泉州六曹新都堂記貞元八年刺史安定席公為邦之二祀冬造六曹之都堂公表微而慮逺也天子建六官紀綱天下分刺史六司用經緯封中猶天之有四時而人之有四肢一時不若則歲罔成功一肢不和則體莫全用公以六司之掾如股肱思安之與身之安也火流㝎中將壞城郭親覽廨宇首視斯署既隤而隘非凝神揆務之所日撫人民不則有國營宮室是亦為政乃量羡府以度用指斯宇而命易又曰處湫居卑非智也煩人蠹財非仁也吾欲全仁而就智藏事者志之有司於是審基趾程廣袤山節藻梲僣也削而不取土階茅欄逼也革而是捐非約非豐允執厥中然後計具材量日力山木則酬之如市入功則稅之若時物樂民願未旬而畢飛梁三道而通負連楣六接以都豁陽軒遐引隂室旁啓挹以重屏翼以回廊䁆黔黔以祕邃屹崇崇而宏敞夏處其逹則炎天以涼冬居其隩則凄風以溫足以寧肌靜心釐厥職者也夫哲人有作不唯利身在利人不唯利今在利後相斯堂者公侯卿士禮隔殊品公不之降也斯不亦利人不唯利於身歟堅壯固護存延千祀人不之逮也斯不亦利後不唯利於今歟覩斯堂見公之意時某處某乙為司功某處某乙司戶司倉司法司兵司田皆外莊內融懷材抱忠無回邪以蒞下有謇諤以承上當時之彥也請列于記左庶後之君子覩名訪德知夫是日堂有人焉建堂之明年記二公亭記泉州勝屋曰亭優為之名也古者創棟宇才禦風雨從時適體未盡其要則夏寢冬室春由秋戶寒暑酷受不能自減隆及中古乃有樓觀臺榭異於平居所以便春夏而陶湮鬱也樓則重搆功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目逹神氣就則就矣量材力實猶有蠧近代襲古增妙者更作為亭亭也者籍之於人則與樓觀臺榭同製之於人則與樓觀臺榭殊無重構再成之縻費如版築欄檻之可處事約而用博賢人君子多建之其建之皆選之於勝境今年暮春月邦牧安定席公别駕置同正前相國天水薑公念兹邦川逼溟渤山連蒼梧炎氛時回溼雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居高明蓋謂是月向地理卑庳而不擇爽塏以蕩夫汚廅乎因問俗相原隰郭東里所共得奇阜高不至崇庳不至夷形勢廣袤四隅若一含之以澄湖萬頃挹之以危峯干嶺點圓水之心當奔崖之前如鏡之鈿狀鼇之首二公止旌輿以回睇假漁舟而上陟幕煙茵草玩懌移日心眸意籌有建亭之算而未之言也二公既回邑人踵公遊於斯者如市登中隆觀媚麗前來後至異口同詞曰漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平教成使俗泰而民以寧者也虞書不曰股肱良哉庶事康哉是謂翼帝藩皇調隂序陽使物阜而民以昌者也席公今日之化育吾徒是以寧薑公昔歲之弼諧吾徒是以昌且以之寧又以之昌愷悌君子也詩云愷悌君子民之父母二公者真吾父母矣兹阜二公攸選尚而加愛務休訟簡必復斯至上露下蕪忍令父母憩之乎遂偕發為公就亭之如墻而前陳誠于縣尹縣尹允其請而為之辨方經跖等周環當上頂誡奢訓簡以授子來於是家有餘糧圃有餘木或掬一抔土焉或剪一枝材焉一心百身蜂還蟻往榛莽可去以自剃瓦甓無脛而奔萃一之日斤斧之功畢二之日圬塓之傭息再晨而成二公莫知層梁亘以中豁飛甍翼而四翥東南西北方不殊致糊白墳以呈素雘頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮巖巒疊回精舍奉其旁逹都城企其遐際容影光彩搖漪入瀾指朱軒於潭底閲雲岑乎波裏爌潢油演如飛若動又釣人飄颻於左右遊禽出沒乎前後一眄一睞千趣萬態稅息之者若在蓬壼方丈之上二公重淸曠於舊賞納衷懇乎群庶尋幽採異常於斯勞賔祖客常於斯加以平疇間闢通途在下可以親耕耨可以採謳謠作一亭而衆美具噫大造茲阜其固與人為亭歟不然何不遠郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署曰二公亭雖芻蕘之云中實有謂二公不忽遂以為號小子藝忝于文曾觀光上國去之日歷越遊吳歸之辰踰荆泛漢會稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基趾未流山川物象遍得而覽方之於此遠有慙德懿哉二公智周德厚卜地如此感民若彼某非飾説入吾邑者升吾亭者知之古之製器物造宮室或有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其旨姑為之記兼借二公之名于記左以為邦榮在位元寮亦以次序從公而列貞元九年三月二十五日記同州韓城縣西尉廳記説文曰尉畏也亦慰也主也故字從尸示寸寸者寸量禮度以敬上示者示陳教令以諭下尸者典職司以居位敬上所謂畏諭下所謂慰居位所謂主全茲三者以蒞王爵則仕義周是以古之人嘉用尉字為官號陶唐有太尉周有軍尉秦亦有太尉輿尉東南尉洎漢則復命縣掾曰尉自是以名至於我唐無或易所命善也我唐極天啓宇窮地闢上列縣出于千分為七等第一曰赤次赤曰畿次畿曰望次望曰緊次緊曰上次上曰中次中曰下赤縣僅二十萬年為之最畿縣僅于百渭南為之最望縣出于伯鄭縣為之最緊縣出于百夏陽為之最上縣僅二伯韓城為之最上之最次于緊之最非最之緊無與焉緊之最次于畿之最非最之畿無與焉畿之最次于赤之最非最之赤無與焉最之縣長於餘縣如麟鳯五靈之長於郡靈也數長不數類則韓城之稱與萬年渭南鄭縣夏陽並自緊而上簿尉皆再命三命巳往而授資歷至之而至也上縣而下則自解褐授韓城既上縣之最簿尉解褐之貴者唯三員伺其闕非年年之有或一員之闕天下皆知之授之日亦皆知之曰某人授韓城尉是其人則頌非其人則誹雖一命之官其為人尚也如此則主司愼擇方地精美縣亦有六曹尉二人一判功戶倉其署曰東廳一判兵法士其署曰西廳茲廳兵法士之廳也根之州則司兵司法司士盡在形之國即兵部刑部工部盡在兵主武法主刑士主工今武未大威務尚繁刑未大措訟尚生工與人興無時休州或雙曹六人分其職國則部屬寮八九十人分其職一人理六人八九十人之理雖大小有異而揆緒不殊官其官其官不易能至於易者則人無敢易之人無敢易之則國必重之國重之則踐洪鈞大柄所由乎此也貞元十五年春余友人滎陽鄭伯義授焉鄭自上葉聲名為天下聞鄭以經明登科又三舉進士屈於命詞學亦流輩推內行第一其受命之年五月余詣焉十月又詣焉見東􅈦有記西廳無記因記書其姓氏序于左其或先于鄭芳馨猶在者亦得之至于鄭繫于鄭若土壤廣狹物産有無尉非得主不敢僣序十月十五日記歐陽行周文集卷第五
