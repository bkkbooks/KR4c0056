body:
  text: 歐陽行周文集卷之一賦出門賦出門辭家也人有志而斯逞豫紛然而遠遊别天性之至慈去人情之好仇嚴訓誡豫以勿久指蒲栁以傷秋弱室咨豫以遄歸目女蘿而起愁心眷眷以纒綿淚浪浪而共流惕懷安以敗名曾何可以少留於是驅忠信以為車執藝業以為贄越三江踰五嶺望堯旌而求試庶亦呈功取爵建德揚名獲甘旨而報勤光晝錦以回衡如弧斯張如鳥斯征射百步而期中飛三年而必鳴􅮠飄天寒崢嶸歲晚鵲聮翩以不定蓬悠揚而自轉逮前程之尚遙顧所離而日遠事紛拏以爭拔情交戾而不和退藩籬則弱羽戀於雲路激龍門則纎鱗限乎尺波身違日日之晨昏戀悽悽而莫遣親益年年之羸老思搖搖而若何慜靈輒於困窮舉兾缺於壟畝一仁聲之永大一孝德之茲久伊錫類以拯窮豈今無而昔有爾乃循否泰以俟命默風塵以愴艱苟疏溟以納流願覆簣以成山路實多岐絲無定色任玄黃之濡染信疆理之南北管因媒而解縛越自遇而升車虞先榮而後悴薑始卷而終舒傷哉數子之稅駕吾未知其所如石韞玉賦淸潤積中光華外發荆山之石兮玉在其中和氏未異兮追師不攻內抱貞明蓄圭璋而自異外封磽確與砮礪而攸同紛爾千峯塊然一石石居山而有類玉處胎而無迹昭彰奇彩象鸞鏡之猶埋特逹英姿狀蠙珠之未拆齊草木之偕賤疊泥沙而共積瓌材則韞精氣時揚結白虹於林薄浮淸氣於巖岡多見巳形空知六瑞之貴罕窮未朕誰分十仞之光混瘞嵌巖沈蒙蘙薈同夫有智懷其有以若無侔彼不爭守厥屯而俟泰明其內晦其外將藏器以待知不干物以招害原夫石則稱堅而可轉玉則受琢而凝淸日遇良工一則有順而無固時惟哲后一則無脛而前呈我唐文武建元成康紹㣧獲王母之玉琯致淮夷之琛賮向華池而效色從溫樹以流潤伊抱璞之未聞亦梯山之自進佳粱糅粃黃金在沙必簸粳而揚礫兾取實以除華雕琢儻行輝章希發願同三獻之納庶免再來之刖回鸞賦夫何降一人兮將凝帖乎萬方神其精而傑其質兮赫赫魏魏以昻昻應千年之寶歷承八聖之重光道為紀德為綱仁為宅義為防化悠悠而蕩蕩風習習以洋洋沐雨露以蕃昌燭日月以皆康癸亥之歲大皥司政乃作幸于西順上帝之令將行曰相彼元元以哲后為父母視淫君猶芻狗豫其在德則夷狄皆豫之子也伊重關擊拆虞誰而守乎豫其不淑則骨肉實豫讎敵也雖金城湯池於豫何有乎四門大開七寢停驚揚凛溧以風淸寂澄凝而月靜于時厥有頑民從愚至逆假鴻恩以出入弄神器於間隙於是天忿地怒人慘神惻積憤氣以交衝疊冤心以濳逼災變流演妖氛充塞山河列以長晦日月在而無色明則士庶幽則靈祇豚魚有識草木無知企喁喁以嗷嗷望我后之來儀如孺子之憶慈親焉如涸鱗之念長津焉如枯苗之待膏雨焉如籠鳥之仰林莽焉既而文物無荒聲明有素木葉猶飛金風未暮聖澤西浹天顏東顧回旗旗整鑾輅雨師啓途風伯前驅豐隆布令烈缺行誅神㓛莫仇天力誰虞櫛􅌭紛於瀴溟駢駱驛乎虛無洗地軸拂天衢殱有罪福無辜氛霾掃蕩於寰區塵埃滌濯乎皇都元凶不戮而淪痛品物未覲而遙蘇爾其靈物既光乘輿乃從雲車煙馭春心日容鬱霏霏以葳㽔輝熠熠以嚴顒祥風􅠞􅠞以淫淫瑞色靉靉而溶溶𪷟籠焉虹霓之縈儀鳯髣佛焉江霧之送遊龍若夷若夏乃愚乃賢振振駢駢殷殷闐闐巷如流以湯湯野若草而芊芊雲浮巨嶽水集洪川至喜翻悲含淚而前曰自沐玄化冥冥綿綿如載于天如飮于泉卒歲永年皆調自然異曰殷憂方昭厥由歸歟歸歟人待其居是日也皇帝乃闢金門升紫宮宣睿旨奬天衷熙乎若微雷淑氣暢昆蟲芬乎若韶光麗景發靑蔥下蟠厚地上洽玄穹扶桑而西虞泉而東百福交通萬彚大同白日三舍以逡巡瞪不征以融融南山萬歲以爭呼頷若動而崇崇至矣哉之德也深乎大乎滂乎沛乎爾其汪濊乎可謂上合天經下叶神靈旁統神明中獲人情故能不守有與之守不爭有與之爭此一舉也足見天地之心足辨人神之意諒無黨以無偏唯夫道德之比者也將歸賦憶求名於薄藝曾十稔以别離才還鄉之半齡又三年于路岐紅顔匪長白日如馳苒苒皆盡悠悠為誰親有父母情有閨闈居唯苦飢行加相思加相思兮寧若飢辭家千里心與偕歸南省之蘭東山之薇一芳一菲何是何非歸去來兮秋露霑衣王者宜日中賦以題為韻杲杲者日中則重光燭生生於有晦暖物物以無疆人在下君體陽故法之象之宜諸帝王亭然止六合居中赫矣洞九霄臨下取其正諒無邪僻之徒倣其明詎有幽隂之者瞻端嚴則體率慕光昭以心寫想照彌乎八紘庶化覃於九野觀夫高春始上虞泉未移面方輿而再朗點圓昊以重規有隼之墉匿寸隂而影盡無禽之井透百尺以光披含靈亹亹處植離離穴有向陽之戶柯無不煦之枝伊體元在已有國於斯形厥功以居大固其義之攸宜况日則類王王實况日道符罔二理契惟一當其食􅉴用貶膳以去縣仰以高明直棄儔而背匹是以如之致唐堯之盛假之在周易之豐暮非乏照朝亦有融或背籬東之蟄或遺山右之蒙掩彼不言黜履邪而有蔽放茲取則貴無偏以處中正不正通難通可以勵垂衣之聖政可以激御遠之神聰者也我皇祗若高穹保茲洪祚順三辰之耿耀稽八卦之明諭覿兢莊霑煦嫗美盛德之形容遂屛營而作賦瑾瑜匿瑕賦物無終美捨短從長玉之美者其曰瑾瑜雖特逹之自有豈玼瑕之則無菲食其端葑采其下苟當無而可用諒在人而罔捨况服飾所珍禮容攸假五德人尚居然揔之百寶物雄又其尤者只如夷吾委質曲逆從王一則措其所短一則舉其所長伊十仞之可貴詎一眚而為傷是故異比荆山奇同鄭市縱靑蠅之下點有白虹以旁起琢中良工佩宜君子爾若惡其細而棄其大我則揚其表而掩其裏矧乃圭或致磨璧當可指終酬九年之積不損連城之美朂矣乎韞獨明之見宰萬物之工覩其材而辨其器履其始而知其終建莫大之勳與悠悠既異收稀代之寶將􅖰􅖰寧同砮璞自克散材徒鬱苟無分寸之痕翳罔有尋尺之盤屈瑩乏光華紱乖音律攻之有曠乎目力斫之不益於人物空知有玷與無疣豈不道疏而理拂至剛也必時時而外缺至淸也乍渾渾而罔容考瑾瑜之含匿亦厥義之云從不然者玄黃巳疲奚復騁乎千里輪囷則疴焉得用於九重瑜之體全者則稀瑾之無瑕者亦罕惟追師之鑒選納尺長而寸短徴君洪涯子圖賦雲際長枕以表貞節矯矯徴君居幽行聞朗詠堯年之日棲遲姑射之雲英英時傑好奇藝絶窺窮圖繪之能寫得隱淪之哲豈不以懷材習技我藴跨俗之工履道全真彼有過人之節者也觀夫杖藜載酒面石依松盡是山中之意全移物外之蹤入室終窺知裂繒而畫出升堂始睇疑在野而相逢如言實默令如行實止蘿纎纎以垂帽草靑靑而藉履洋乎令聞昭晰得其所由儼夫儀形髣佛知其所似原夫賢逹作範丹靑立程將模前而示後必體物而歸誠服惟身表容實心旌對冰雪之顔覩蘭蕙之纓暗識伯夷之潔遙憐虞仲之貞知身巳識看畫如生矜且復莊若此辰之有識貪之與欲同在日之無情形似植以亭亭衣如風而曳曳臨諸瑤席之上想彼雲林之際萬物方秀千峯初霽神飄飄而自遠身悠悠而不繫我之心矣惟賢允臧披圖畫於是日得夫君乎此堂乃知君之於德也大畫之於工也長畫非君無以展其妙君非畫莫得揚其光物有相假不其昭彰揆人事之美惡論功庸之夥少伊畫也可以稱智者之兼惟君也可以作真人之表者也明水賦玄化無宰至精感通智之不測有明水焉方諸在手圓月居天象質遐分則迢遙而逈遠英華濳合遂滴瀝以流漣可謂妙自斯妙玄之又玄此道也自何而干彼靈也從何而借越杳杳之蒼旻阻冥冥之永夜望蟾魄而光彩殊流端蛤形而淸冷忽下等陽燧之通感實柔祗之祕化豈不以我惟陽德伊乃隂徒精靈合契氣類相符共稟坤而配坎諒交津以有濡茲理焉自取之乎必有斯水也遂生之於本無精潔可嘉淸明斯在湛玉壺以無垢入犧樽而有待處罍實爵今則由於鬯人置下升堂巳不關乎真宰稽乎所自原夫所致臨庭目擊雖從隂鑒而來向月心祗又似上夭而至來莫我挈至莫我精棄本不仁故存名而曰水從宜酌號遂表性而稱明信可薦宗祏郊上淸故得歸先歲享告帝功成冠三酒而首進掩五齊以先行招百神之景福致萬姓之元禎無益於人鄙玉漿於夜漏自求其逸哂珠露於金莖遊原習坎固有冥感處陸浮空不無玄通龍吟雲而致雨虎嘯谷而來風動無千里之效潤才百里之功詎若以握中之瑣細向天上之曈朧精液下融神人以崇而福祿攸同者也春盤賦裁紅暈碧巧助春晴多事佳人假盤盂而作地疏綺繡以為春叢林具秀百卉爭新一本一根叶陶甄之妙致片花片葉得造化之窮神日惟上春時物將革栁依門而半緑草連河而欲碧室有慈孝堂居斑白命聞可續年知暗惜研祕思於金閨同獻壽乎瑤席昭然斯義哿矣而明春是敷榮之節盤同饋薦之名始曰春兮受春有未衰之意終為盤也進盤則奉養之誠儻觀表以見中庶無言而見情懿夫繁而不撓類天地之無巧雜且莫同何才智之多工庭前梅白蹊畔桃紅指掌而幽深數處分寸則芳菲幾叢呼吸旁臨作一團之朝霧衣巾暫拂成萬樹之春風原其心匠始規神謀創運從衆象以遐覽總群形而內藴彼有材實我則以短長小大而謀彼有文華我則以玄黃赤白而暈故得事隨意製物逐情裁凝神而珍奇競集下手而芬馨亂開不然者欲玩扶踈須買靑山以樹要窺菡萏待疏緑沼而栽將以緩愁子之思將以逞吾人之才此一作也察其所由稽其所據匪徒為以徒設誠有禆而有助者也藏冰賦西陸朝覲方出之也晚日離斗兮昏星見奎鴻向北兮龍角徂西天子慮曾冰以為災闢凌隂而大納山人於其時而貢職庶夀域以同躋黑牡既馨玄冥巳祝人惟在土侔有賦以歸王物或稱琛類無脛而奔陸鑿固沍於窮壑閉重泉乎夏屋炯乎于將之出地燦乎連城之韞櫝爾乃東風月仲之節西陸晨覿之朝薦明靈於寢廟頒有位乎中朝光可鑒形鄙照車之寶楚淸能禦暑輕翣莆之珍堯向玉堂以孤瑩鎮瓊筵而自昭助微涼於長簟回煩燠於炎颷鬼神以之而饗集君臣以之而利饒豈止疾雷不震凄風不飄致兩儀之交泰作六氣之和調而巳哉冰之藏也旨意可稽冰之賦焉英華可覿休宗社之成禮暢乾坤而樹績順時元吉為我政之恆孚悖道致尤寧魯臣之屢折六合蒼蒼萬物攘攘詎無時啓亦有時藏繹其功而此譬於厥德而何方徑挺金相貞淸玉質展其用無愧於明時韞其光不欺於暗室平凛冽以冬入滌赫曦而夏出穿楊發彼觀國于茲幾又一倍以增悲嗚呼麟非騰噬之儔詎豺狼之共穴鳯實仁靈之類豈鷹鸇之同列惟玉石之不分亦薰蕕之自别是以謇謇心競昻昻面折彼炎炎之原燎信撲之而不滅寧歸死以申懷不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡為是日力不如人使典章之不信俾忠義之空勤律中大吕日臨蒙谷風颼颼於衰草煙茫茫乎平陸思悽悽而填臆淚淫淫以盈目義則非其知友親故遠乎骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭律和聲賦見象聲律以和萬方詠聲周兮律聲遍人心厚兮國風變伊在堯之既引載得夔而斯見哀思慮始安和追往宗伯官也擇人乎有才正始化焉選音於無象綴咸池之雅韻去桑間之末賞圖風普以雨周算天長而地廣律則以宮激徴詠則從濁揚淸且懲流而反正常誡險以歸平若近若遠非幽非明類無臭等無聲信矣惟時與四時而德洽純如合莫彌六合以文成善詠者聲應聲者律會高低以齊奏諧疾徐而並出迹不得尋功如何述為災為眚曾莫奉於淫后調陽序隂屢見資乎聖日故得之者體圓御方失之者亡禋絶祀比屋可戮桀紂罔測其所由率土可封堯舜固知其所以不然者移風之言曷謂易俗之訓則那我所以淸六管順賡歌載唱載吹匪塤箎之獨叶一張一弛豈琴瑟之空和八紘有截四海無波物阜人蕃雖歸之乎至德鳥來獸舞蓋於斯而靡他其理微其用遠論有助也侔大君之得一考無情焉同八風之吹萬可謂我詠斯暢我律斯藏發揚六氣孕育群方處植者以之而茂實含識者於焉而夀昌彼離連與栗陸復何道而稱皇歐陽行周文集卷之一
