body:
  text: 歐陽行周文集卷之二雜著李評事公進示文集以詩贈之風雅不墜地五言始君先希微嘉會章杳冥河梁篇理蔓語無枝言一意則千往來更後人澆蕩醨前源傾筐實不收朴􅈪華爭繁大教護微旨哲人生今孫高飊激頽波坐使橫流翻昔日越重阻側聆滄海傳逮茲覿淸陽幸覩靑琅編泠泠中山醇片片崑山璠一杯有餘味再覽增光鮮對寶豈皆鑒握鞶良自妍吾其告先師六義今還全蜀中將回留辭韋相公寧體則雲構方前恆食玉貧居豈及此要自懷歸憶在夢關山遠如流歲華逼明晨首鄉路迢遞孤飛翼大原旅懷呈薛十八侍御齊十二奉禮前來稱英俊有食主人魚後來曰賢才又受主人車伊豫亦投刺恩煦胡雕踈既覩主人面又獻主人書糊口百家周賃廡三月餘眼見寒序臻坐送秋光除西日惄飢腸北風集絺裾升堂有知音此意當何如初發太原途中寄太原所思驅馬覺漸遠回頭長路塵高城巳不見况復城中人去意自未甘居情諒猶辛五原東北晉千里西南秦一屨不出門親車無停輪流萍與繫匏早晚期相親詠德上韋檢察即韋相之弟也少華類太華太室似少室亞相與丞相亦復無異質渟如月臨水瀟若松照日輝影互光澄隂森兩蔥鬱連城鸞鳯下同氣魚龍出並力革夷心通籌整師律英豪願回席蠻貊皆屈膝中外行分途寰瀛溥淸謐寓興桃李有奇質樗櫟無妙姿皆承慶雲沃一種春風吹美惡苟同歸喧囂徒爾為相將任玄造聊醉手中巵自懷州却赴洛途中作惆悵䇿疲馬孤蓮被風吹昨東今與西冉冉長路岐歲晚樹無葉夜寒霜滿枝依人恆辛苦冥寞天何知晨裝行村店月西入山枝鵊聲求燈徹夜席束囊事晨征寂寂人尚眠悠悠天未明豈無偃息心所務前有程江夏留别辛三十時自襄陽同舟而下豫歸閩辛從此赴舉弭棹巳傷别不堪離緒催十年一心人千里同舟來鄉路豫尚遠客程君未回將何慰兩端互勉臨岐材徐十八晦落第嘉榖不夏熟大器當晚成徐生異凡鳥安得非時鳴汲汲有攸為驅驅無本情懿哉蒼梧鳯終見排雲征送袁秀才下第歸毗陵羸馬出都門修途指江東關河昨夜雨草木非春風矢捨雖未中璞全終待攻層霄秋可翔豈不隨高鴻聞鄰舍唱涼州有所思有伊善涼曲離别在天涯虛堂正相思所妙發鄰家聲音雖類聞形影終以遐因之憎遠懷惆悵菖蒲花賦得秋河曙耿耿送郭秀才赴舉雜言月沒天欲明秋河尚凝白皚皚積光素耿耿橫虛碧南斗接北辰連空𪷟鴻同浮高天蕩蕩漫漫皆晶然實類平蕪流大川星為潭底珠雲是波中煙雞鳴漏盡東方作空曲蒼蒼曉煙落鴈呌疑從淸淺驚鴈聲似在沿洄泊並州細侯直下孫才鷹秋賦懷金門念排雲漢將飛翻仰之踊躍當華軒夜來陪餞歐陽子偶坐通宵見深旨心知慷愷日昭回前程志在靑冥裏述德上興元嚴僕射二首山橫碧立並雄岷大阜洪川共降神心合雲雷淸禍亂力回天地作陽春非熊德愧當周輔稱傑叨慙首漢臣何幸腐儒無一藝得為門下食魚人又推車閫外主恩新今日梁川草遍春玉色據鞍雙節下揚兵百里路無塵春日途中寄故園所親客路度年行故園未云返悠悠去源水日日祗有遠始嘆秋葉零又看靑草晚寄書南飛鴻相憶劇鄉中汝川行汝墳春女𧖟忙月朝起採桑日西沒輕綃裙露紅羅襪半踏金梯倚枝歇垂空玉腕若無骨映葉朱唇似花發相歡誰是遊冶郎𧖟休不得岐路旁許州途中秦川行盡頴川長吳江越嶺巳同方征途渺渺煙茫茫未得還鄉傷近鄉隨萍逐梗見春光行樂登臺鬪在旁林間啼鳥野中芳有似故園皆斷腸銅雀妓蕭條登古臺回首黃金屋落葉不歸林高陵永為谷粧容徒自麗舞態閲誰目嗚咽繐帷前歌聲苦於哭題嚴光釣臺弭棹歷陳迹悄然關我情伊無昔時節豈有今時名辭貴不辭賤是心誰復行欽哉此溪曲永獨英風聲福州送鄭楚材赴京師時觀察劉公亮有感激之意美人河嶽靈家本滎水濆門承若蘭族身韞如瓊文早折靑桂枝俯窺鴻鵠群爾來丹霄姿遠逐蒼梧雲有伊光鑒人惜茲瑞蕙薰中酣前激昻四座同氛氲海郡梅霔晴山郵炎景曛回翔罷南遊鳴唳期西聞秦塞鸞鳯征越江雲雨分從茲一別離佇致如堯君和嚴長官秋日登太原龍興寺閣野望百丈化城樓君登最上頭九霄回棧路八到視並州煙火遺堯庶山河啓聖猷短垣齊介嶺片帛指汾流淸鐸中天籟哀鴻下界秋境間如道勝心遠見名浮豈念乘肥馬方應駕大牛自憐蓬逐吹不得與良遊陪太原鄭行軍中丞登汾上閣中丞詩曰汾樓秋水闊宛似倒閶門惆悵江湖思惟將南客論南客即詹也輒書即事上答並州汾上閣登望似吳閶貫郭河通路縈村水逼鄉城槐臨枉渚巷市接飛梁莫論江湖思南人正斷腸送潭州陸戶曹之任戶曹自處州司倉除三語又為掾大家聞屈聲多年名下人四姓江南英衡嶺半天秀湘潭無底淸何言驅遠車去有蒙莊情送少微上人歸德峯不負人間纍棲身任所從灰心聞密行菜色見羸容幻世方同誤深居願繼蹤孤雲與禪誦到後在何峯荆南夏夜水樓懷昭丘直上人雲夢李莘無機成旅逸中夜上江樓雲盡月如練水涼風似秋鳬聲聞夢澤黛色上昭丘不遠人情在良宵恨獨遊送高士安下第回岷南寧親偕隱有賢親岷南四十春樓雲自匪石觀國暫同塵就養思兒戲延年愛鳥伸還看謝時輩又作潁陽人酬裴十二秀才孩子詠裴拜曰待看成器後折取桂林余算日未成年英姿巳褒然王家千里後荀氏八龍先蔥蒨松猶嫩淸明月漸團將何一枝桂容易賞名賢旅次舟中對月寄薑公比公丁泉州門客中宵天色淨片月出滄洲皎潔臨孤島嬋娟入亂流應同故園夜獨起異鄉愁那得休蓬轉從君上庾樓御溝新栁貞元八年及第省試東風韶景至垂栁御溝新媚作千門秀連為一道春柔荑生女指嫩葉長龍鱗舞絮回靑岸翻煙拂緑蘋王孫初命賞楚客欲傷神芳意堪相贈一枝光遠人同諸公過福先寺律院宣上人房律座下朝講畫門猶掩關叨同靜者來正值高雲間寂爾方丈內瑩然虛白間千燈智惠心片玉淸羸顔松色落深井竹隂寒小山晤言流曦晚惆悵歸人寰詠德上太原李尚書那以公方郭細侯並州非復舊並州九重帝宅司丹地十萬兵樞擁碧油鏘玉半為趨閣吏腰金皆是走庭流王褒光德空知頌身在三千最上頭及第後酬故園親故才非天授學非師以此成名曩豈期楊葉射頻因偶中桂枝材美敢當之稱文作藝方慙德相賀投篇料愧詞猶著褐衣何足羡如君即是載鳴時除夜長安客舍仍寢如流歲又遷望家思獻夀算甲恨長年虛牖傳寒柝孤燈照絶編誰應問窮轍泣盡更澘然早秋登慈恩寺塔寶塔過千仞登臨盡四維毫端分馬頰墨點辨蛾眉地逈風彌緊天長日久遲因高欲有賦遠意慘生悲許州送張中丞出臨潁鎮心誦隂符口不言風驅千騎出轅門孫吳去後無長䇿誰敵留侯直下孫蜀門與林藴分路後屢有山川似閩中因寄林藴藴亦閩人也村步如延夀川源似福平延壽福平皆閩中川原之名延夀即藴之别墅在焉福平即豫之别墅在焉無人相與識獨自故鄉情樂津店北陂嬋娟有麗玉如也美笑當豫繫豫馬羅帷碧簟豈相容行到山頭憶山下歐陽行周文集卷第二
