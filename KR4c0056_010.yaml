body:
  text: 方為丈夫稟太和曰人子不包羞不痛心行道之人也虛中胸中有心者以豫此辰之意如何哉悢悢悽悽渾渾迷迷飮觴以若荼視春光其如秋周秦九軌之道吳楚千里之水聘逸騎揚輕舟激爾淸風歡拜非遠人則姻眤家惟里間到日榮賀盡室當在念沽名之不異想出門之是同父也母也兄也弟也雖喜人之善則有而傷豫之不肖豈無重增豫鬱結之端矣明鏡前平衡下姿媚無取銖兩不登才歟命歟不自知也烹乳為醍醐煆金為干將豫期烹煆以變化虛中其行乎勿謂業就不增修勿謂名成有所忽及此方遠大虛中志之送鹽山林少府之任序新授鹽山尉孝廉即濟南林君脂轄東轅蒞官也鹽山滄州之屬邑滄州戎狄接際之地國家虞守之會東南居恃力之卒西北有矜功之衆從事之劇惟天下先若非機足應權逹能通變則不之與也公以二善而時與之夫騏驥未馳知有致遠之力于將未割知有剸堅之功堂堂林君假道試吏嶧桐嶰竹必中音律勉以能事為邦之光祿者所以食人為國俸者所以衣人贊時豫尚知之而君豈不知之苟知之何往而不利送周孝廉擢第歸覲序始末與周相接二年間於貢府稠人中見之年甚華神甚淸英如頴如若金在沙若松在林常奇之曰誰家千里駒可羡也豈權衡藻鏡而遺於是邪今春獻藝果登孝廉上第豫以片言隻字進亦同年成名既昔情所佳又今迹斯叶或因有覿獨與之語宮商起於朱絃薑桂在乎太牢冷然可聽芬乎可嘗巳比􅮖詵之玉思懷陸績之橘夏五月自京而東賃廡陋居回軒見别豫則不敏輒奉以言會稽之竹既鏃矣宜羽之荆山之璞既琢矣宜礱之雖休勿休古有光大晨昏之暇勿忘則疊札之望可酬連城之價可取勉哉有如君材蓋不易得送裴八侃茂才却東遊序幼秀裴侃昨自江湖西入關遊京師今自京師東出關遊江湖十二斯冠才氣卓異身猶三尺交友四海著文數篇其措意規格儲乎遠大旬時闕下鬱發聲聞公卿名德待以優禮告離之日祖軷相屬由晨及暝方容升車蓋相追百有餘兩長沙歐陽某企以芳馥亦驅弊轏將欲分手詔之自愛曰楩柟出地知為梁為棟鸞鳯在鷇知磨霄薄雲子之他日豈在乎此不獨斯謂群公斯謂子姑行無忽所謂非徒謂也送無知上人往五臺山序無生永存旨不易源綿兮在煩滴兮處渾釋氏子味其實歸其根其教雖傳非言可言唯相似者復到其門無知上人其到門者歟上人從儒至道從道至釋如歷星月以得白日若棄扇翣而灑長風真空洞照熱惱頓盡水其性雲其身周四海以終靜出六合而非寄維揚秋秒方至自閩日未成旬作臺山之適目關河於不計擬衣食乎隨施怡如也淡如也此行逢流得抵虛舟無程峨峨五峯幾日而上登異淸涼侣善知識所至也之至玄又玄乎豫弱冠之年同時諦之學神不遠逮溺在名利禮足而别悽然自傷岐路既殊聊各以行勉哉無知公勉哉歐陽生送楊據見漳州李使君序儒有馭百行駕六藝曵長裾於王侯之門以禮待楊夫子是日之告謁漳浦李太守之行行儒之事也子幾於儒久矣李太守天枝之芙金鏡之明盛物之量稱物之衡夫子姿容不孤其鑒多少有登其槩何往而不利高梧始華瑤草欲碧去矣夫子時景宜往送陳八秀才赴舉序諸侯歲貢俊才於天子故陳侯今年有觀光之舉白露肅物靑天始高雲回鴻盤言遵永途吾觀夫雄心鋭志將領能事則夷山堙谷不盡其力何東堂一枝南荆一片足塵其慮邪勉哉陳有其才奏其試知有成矣魯山今李胃三月三日宴僚吏序三月三日以酒食出野曰褉飮古俗也有唐今上御宇之九年年定三節一以二月一日之中和終取九月九日之重陽次取此日之禊飮賜群后大宴登高臨流與時所宜洎四方有土之君亦得自宴僚屬貞元十二年暮春月哉哉生明一日則其日也臨汝魯山令趙郡李胃恭國合宴于縣南滍濵先宴曰夫宴者古所以示慈惠而期合歡者也國家錫以斯宴者情亦古情焉况食在充腸不在充目酒在行禮不在溺神歌發其所自和舞發其所自樂窮八珍竭萬鍾強發揚課絲竹則有勞有遠豈合歡之意歟以是首設一席肉一肩酒一壺命自天子命為佐二者次一席酒肉一如之命自已命以為吏者次一席酒肉亦如之命鄉閭許以耆年有德者肉既飽酒既酣因化育之洽有歌謠者進有舞蹈者作皆誠激乎中章乎形容婆娑慷慨與習而為者不類然後漁者請以其舟農者請以其醖圃者請以其蓄弋者請以其鮮啐濁嘗漉浮泛漪瀾風恬日和川晴野媚以熙以怡萬心一之至義之門大順之家父兄子弟一族一堂之中不是過也非仁德淳化其孰能至於是邪旅遊之子實窺盛事茲宴也雖溥於天下百里不同風雨恐他邑之景物此辰不得似公之邑也一方不同教化恐他邑之歡樂此辰下得似公之邑也故序之泉州泛東湖餞裴參和南遊序泛舟餞行别禮之重也昔李郭有之降自近代名望之士亦往往而用其皆殷勤敻出於人意文雅足賦乎時物俾撡執之容可觀風景之媚不孤理未符此事罔得舉淸源郡春正月客有河東裴參和將南遊郡司户置同正前大理評事扶風竇公因携爼豆展故實蓋厚裴而昭已德也奇哉英秀哉其裴歟明嶷乎風姿瓌麗乎詞華朗如嵩如輝如煥如豫翰苑十年之遊飽覩四方之彥九霄寸步一日千里者豫得識之如其人如其人是餞也主賢賔賢譬古無怍指方舟以直上繞長河而屢回絃管鐃拍出沒花栁勝趣則深離觴且酣斜日應程賔辭及固噫停撓一挹裴其升車美哉裴何往而不利况此選列郡莫非哲人有知之鑒其豈相失遊意儻盡姑為時起豫從此更詣承明竇公不日應召宣室秋風似緊當共天衢佇羊角而來一舉磨蒼蒼矣詩人同志之送洪孺卿赴舉序三折股為良醫豫五升詞埸四遭掎托是以竊知乎文則洪氏子舉秀才前期勝負豫得而度子天與黼黻之性加好勤苦之節紡績墳典組織篇什觀經緯機杼則重綿繡假日日當成今年秋貢士果居首薦歌鹿鳴以為餞想鵬摶而飭駕金欲求煆玉將就磨光鋩頴耀朝夕以冀回鴈賔海秋風落山雖難别離向慶無恨中鵠餘矢猶思再發升冬女月期會干闕下歐陽行周文集卷第十
