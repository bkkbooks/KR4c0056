  - {type: variant, offset: 3675, length: 0, content: '', WYG: 鬻三冬之學又當二日之時業屬辭以比事遂含毫而賦之懷忠賦并序丙寅嵗因受譴季冬之月次於殷墟歴闗龍逢墓焉昔聆其風未嘗不迴腸霣涕覩夫塋壟心又增傷遂寫憤于言為賦以吊先生以忠諫致命故以懷忠命篇其辭曰天生彼辛兮用殱覆於商家欲悠悠而罔極毒浩浩其無涯無辜殞身肆市朝之若莽有道併命委炮烙以如麻伊先生之諤諤為酷烈之所加嘗披圖於往載每廢巻以興嗟蕭條舊邑漭滄空陂陷陵成坎古木無枝或人曰此其墓也}
