  - {type: variant, offset: 2109, length: 0, content: '', WYG: 五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士㑹監有獄不果上觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳於後以遺其父母而解其悲哀以卒詹志云求仕與友兮逺違其鄉父母之命兮子奉以行友則既獲兮祿實不豐以志為養兮何有牛羊事實既修兮名譽又光父母忻忻兮常若在㫄命雖云短兮其存者長終要必死兮願不永傷友朋親視兮藥物甚良飲食孔時兮所欲無妨壽命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祀祭則及兮勿謂不通哭泣無益兮抑哀自彊推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘題哀辭後愈性不喜書自為此文惟自書兩通其一通遺清河崔羣羣與余皆歐陽生友也哀生之不得位而死哭之過時而悲其一通今書以遺彭城劉君伉君喜古文以吾所為合於古詣吾廬而來請者八九至而其色不怨志益堅凡愈之為此文蓋哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳雖然愈之為古文豈獨取其句讀不類於今者耶思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也古之道不苟譽毁於人劉君好其辭則其知歐陽生也無惑焉安奉歐陽四門祠文陳宓先生之道由孝弟以至仁妻子信朋友先生之譽由閩越以播江南籍甚於京師發身僻逺之鄉尚友命世之傑故能行為世法文為世師後世謂閩人之舉進士必以先生為稱首前豈無人獨推先生者盖所重在此而不在彼也宓朅來此邑先生之族實居焉遐想清風慨然慕歎像而祀之俾學者知所先後以自强焉文獻通考馬端臨歐陽集十巻晁氏公武曰唐歐陽詹行周也泉州人終國子四門助教閩人不肯北官及常衮為觀察使興學勸士舉進士自詹始與韓愈李觀李綘貞元八年聯第皆天下選時稱龍虎榜云此集李貽孫纂韓退之作詹哀辭稱詹甚美大意謂詹覓舉京師將以為父母榮也又云其德行信於朋友而唐小説載詹惑太原一妓為賦髙城已不見况復城中人之詩卒為之死今集中亦載焉若然則詹之志豈在父母哉有德行者迺爾耶陳氏振孫永嘉人曰詹亦韓愈同年進士考其集中各有明水賦詹亦蚤死愈為之哀辭尤拳拳焉李翺作傳而李集不載其序福唐廉使李貽孫所為也詹之為人有哀辭可信已黄璞何人斯乃有太原凾髻之謗好事者喜傳之不信愈而信璞異哉髙城不可見之句樂府此類多矣不得以為實也跋歐陽四門集真徳秀歐陽四門集鋟版郡齋有年矣嘉定己夘郡士林彬之為余言四門之文之行昌黎韓文公蓋亟稱之至黄璞為閩中名士傳乃記太原妓一節觀者疑焉近嵗黄君介喻君良能皆嘗為文以辯謂宜登載編末以澡千載之誣余曰四門之行獲稱於昌黎而見毁於黄璞後之君子將惟昌黎是信乎抑惟璞之惑乎二君雖無言可也不載之編末亦可也雖然有一焉自世之學者離道而為文於是以文自命者知黼黻其言而不知金玉其行工騷者有登牆之醜能賦者有滌器之汚而世之寡識者反矜詫而慕望焉曰夫所謂學者文而已矣華藻患不縟何以修勑為筆力患不雄何以細謹為嗚呼倘誠若是則所謂文者特飾姦之具爾豈曰貫道之器哉彼宋玉寓言以諷未必真有是若相如之事則君子蓋羞道之服儒衣冠誦先王言不惟顔冉是學而曰吾以學相如也抑何其陋耶四門之謗不白於四門乎何傷余懼夫士之苟焉自恣者將曰四門唐名儒也而有此吾為之奚尤則璞之一言不獨以厚誣四門且將以禍學者無窮也乃刋二君之文如彬之請又附其説如此庶幾有補於萬一云歐陽書室重建記莊楷齊雲山之半有歐陽書室舊址在焉故老相傳謂唐國子四門助教歐陽公詹字行周者平生篤於親愛無書不讀故其詩文俱邃孝友兼隆其為人賢可知矣獨位不勝才年不配德當在諸生時袖文見常衮為主客禮而相國器之舉貞元八年進士第二人為閩人先而閩人榮之與韓愈李觀李絳崔羣王涯馮宿庾承宣聯第龍虎榜皆天下選而天下重之仕四門助教柳宗元謂其同志於文迨没崔羣哭之韓愈誄之李翺從而傳之闔閩八郡祠而祀之李貽孫序其文而刋行之國朝翰林學士東里楊士奇跋陳衆仲國子祭酒瓊山邱濬序張九齡皆翕然而推讓之非其文行大過於人疇克爾耶公之文行不惟見重於相君而且見重於韓柳不惟見重於當時而且見重於天下後世是宜今昔皆宗之而弗替也歟由唐迄今六百餘稔書室鞠為茂草也久邇者邑士王君用宗賀君士髙慕公之文行欲即其地而重興之致仕轉運判官張君庸力贊其成仍相與白於郡守臨川陳侯勉侯韙之始事於成化壬寅十二月成於癸卯之十月規制可觀質而不華堅而耐久左闢門巷一道由石罅中縈紆而出抵於山麓不可以尋丈計非故為是以適人之耳目也蓋馴地勢之左折右旋耳旁餘地作書房寢室庖舍悉有條理外之低者為花塢窪者為蔬畦突而平者蒔藥鑿渠導水以通灌溉又其外植茶種果千百其株躭僻願學者亦將有頼予知孝友肖於公而祗服父事克恭厥兄者有焉詩文肖於公而金宣玉奏澤於道德仁義者有焉豈但科第有所取法哉二君嗜義如此可謂有功於先烈有光於名教者矣室既成未有記適予歸自嶺南遂記之如此觀者毋以為誕}
