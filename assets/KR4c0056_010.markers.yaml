  - {type: variant, offset: 2106, length: 1, content: 卷, WYG: 巻十附錄哀辭韓退之歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文辭進有名於時又作大官臨莅其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮觀游宴饗必召與之時未幾皆化翕然詹於時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也久貞元三年余始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登}
  - {type: page-break, offset: 2106, content: '', id: KR4c0056_WYG_011-1a}
  - {type: page-break, offset: 2106, content: '', id: KR4c0056_WYG_011-1b}
  - {type: variant, offset: 2108, length: 0, content: '', WYG: 始相識自後詹歸閩中余或在京師他處不見詹久者惟詹歸閩中時為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨久然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貎嶷嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也}
