  - {type: variant, offset: 1863, length: 0, content: '', WYG: 可求惟昔穆天子乗之極遐遊王良執其轡造父挾其輈因言天外事恍惚使人愁駑駘謂騏驥餓死余爾羞有能必見用有徳必見收孰云時與命通塞皆自由騏驥不敢言低迴但垂頭人皆劣騏驥共以駑駘優喟余獨興歎才命不同謀寄詩同心子為我髙聲謳故人舒其憤作爾駑驥篇駑取易售陳驥以難知言委曲感既深咨嗟詞亦殷伊情有逺瀾余志遊其源室在周孔堂道適堯舜門調雅聲寡同途遐勢難翻顧兹萬恨來假彼二物云賤貴而貴賤世人良共然芭蕉一葉妖茙葵一}
