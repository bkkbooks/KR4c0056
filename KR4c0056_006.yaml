body:
  text: 歐陽行周文集卷第六雜著德勝頌二章並序唐貞元八年歲庚午隂陽家流曰歲在午人馬食土人之所食也榖馬之所食也草今言食土明歲無嘉榖而野無青草則運數于兹合凶災之大者於是天尋舊步地轉恆軸交紏回薄將有結常沴自春三月至于夏五月或赫日杲杲或密雲溶溶為燋灼為霖霪似不日而至皇帝宿布大和人神鳥獸魚鱉咸若騰歡心揚臺靈欣欣熙熙休氣中積浹磅礴浮蒼蒼濳相戞磨力強者勝九陽構旱而莫展六隂作潦而不就氛祲靄為慶雲烈景皎為祥光油油熏熏宛復如春塊不破而兩足條無聲而風暢日者眚氣欲凝淑氣猶競彼雖罔得為禍此亦未能為福徘徊相持時澤不降五稼含萌而待藝百芳蓄頴以思坼至是土膏融甘液宣若決渟泉如開涌煙豐本增岐芃芃綿綿無磽􅣶與良沃獲一十於百千賸蔬雲矗以萎圃餘糧嶽峙而棲畝夫體病不能害心心平必能制體古人曰人者天地之心也既和且平則天地之病又焉得成歟况奔走遊泳之物曰靈曰祗之類皆吁歈怡逸於其中乎宜其療乾元之宿疹愈坤元之常疾以至於交泰如斯之盛邪古先帝王至聖則堯至仁則湯有黎氓以稱理歷水旱而莫禦豈不以道未全洽而德尚涼哉皇帝非徒能禦之又易之為大慶殊祥其於道德可謂充塞洋溢光今而邁古矣元元蚩蚩嗚嗚啞啞歌聖代者動夭殷地以夜繼晝而其詞未弘輒為頌二章用貽於康衢庶事明而聲暢流乎無窮而以德勝目篇頌曰歲在午天災于常昔人食土今我飫粱匪徒我飫粱鰥寡千箱盛矣乎吾皇之德變眚為祥休哉德兮歲在午天災斯屬昔馬食土今厭菽犬豕粱肉盛矣乎吾皇之德轉禍為福休哉德兮有所恨二章拜序有所恨由故人馬紳死而興也豫待試京師六年與馬生相知者四秋性與情相合也衣與食相同也豫及第歸覲故林自别來無憶不至於襟懷無想不至於姿容願一促膝惄如也昨既至止馬生且疾而巫者忌以見人曰不見有愈見則害遂忍即見庶以求見忍者五日馬生云亡噫故人也昔越萬里猶求見焉惑乎一言蔽乎一垣而死生以之死生之道千秋之離也五日之面半旬之歡也尚可半旬之歡不就而卒有千秋之離一恨也又與生别摻執都門生脫紫羅半臂曰即日相去秦吳聊以為憶豫貧也素乏衣服無暇藏篋笥聮綿在身二年間同弊帛以棄所以鮮而輕著故而不留者豫實未衰馬其方少爾斯謂日相與也所留何止在兹乎今人既往所贈又造次而亡之二恨也申二恨為有所恨二章云相思君子吁嗟萬里亦既至止曷不觀止本不信巫謂巫言是履在門五日如待之死有所恨兮相思遺衣為憶以貽亦既受持曷不保持本不欺友謂友情是違隔生之贈造次將之有所恨兮上董相公東風二首並序啓某啓某業文者相公昔領大司成則飲相公訓人成俗之教中為大司樂則煦相公合莫移風之德及籌廟略則浹相公調元厚生之化竟未能歌謡芬馥紀敘茂實下居暗室有愧明神昨以赴調東周又聆相公此方鎮安之美陪輿人誦作東風詩二首既詠諸途輒塵左右干犯明白不任戰懼東風二章東風美隴西公也貞元十二年相國東都守隴西董公牧于浚浚軍自勦淮夷二孽靈曜希烈矜功多悖師用匪律人亦由殘隴西公和為謀輿仁為化車既去凶渠黎氓以蘇東風解凝發蟄之不若作東風詩二章首美去凶渠也其卒章美蘇氓也東風叶時匪沃匪飄莫雪凝川莫隂沍郊朝不徯夕乃銷東風之行地上兮上德臨慝匪戮匪梟莫暴在戎莫醜在階以踣以殱夕不徯朝隴西公來浚都兮東風叶時匪鑿匪穮莫蟄在泉莫枯在條宵不徯晨乃繇東風之行地上兮上德為政匪食音寺匪招莫顧於家莫流於遼以飽以回晨不徯宵隴西公來浚都兮南陽孝子傳並論貞元九年某旅行虢州稅于村店有一黨先止焉老翁一人丈夫一人婦人一人孩幼兩三人丈夫出絹兩匹賣其囊褁衣服非稱有其絹者視絹有字乃故人鄭師儉手題其名焉問所得曰來自襄陽至臨漢之北郊有閔吾父年老而所乘驢弱者遺此絹使與驢博驢問得姓名乎曰其人扶護親喪回上京不知姓名也某既占鄭書又知鄭侍君靈櫬自南當由彼而還也意其必鄭焉不復問焉各遵所往貞元十一年獲與鄭遇因道所見鄭歔欷為言之曰豫章之回次南陽大澤見一貧翁乘驢驢甚瘠一丈夫肩負雜物可三十斤妻枹半歲嬰孩童稚驅行兩人山路初盡如行陂澤天久霖雨泥水深老翁瘠驢往往顛踣丈夫則常隨之也每見驢倒擲其負若泥若水無顧惜扶抱老翁淚輒盈目倒既數悲不自勝遂以所負置諸驢而負其父平田積雨潦淖到脛不至店舍竟無憩歇父在子上殊自安暢子在父下亦盡歡心父與子笑子與父笑如同乘高車連轡逸騎怡怡焉欣欣焉與之行止者三日日無易日時愛其事父母能竭其力也又痛自欲竭所有無其所贈絹一匹令與驢博驢代以載父其人將求驢者三店知欲分路却其絹曰無驢可博願復本絹每愛其孝又貴以忠為度一絹博驢未就更與一絹自號而西足下之見豈斯人歟某以如其人所行是難也是亦皇唐純孝一人焉行既可述遂依鄭説為之傳其間問其姓氏亦不知何許人實於南陽澤中見之還以為南陽孝子論曰孝子偕孝矣而贈絹非孝歟唯其有之是以似之鄭公師儉孝子偕孝矣懷州應宏詞試片言折獄論夫子説季路於人曰片言折獄者其由也與夫子之言蓋非於季路之云也後之人不窮聖旨以為夫子美於季路任一時之見輕而折獄者十有八九焉迂哉斯人也夫兩訟之為獄獄折而有刑刑者侀也一成而不可變不其重歟古之帝王將刑一人循三槐歷九棘訊群臣訊群吏訊萬人億兆絶議然後致法猶於朝於市於野昭然與衆方棄之所以不易也君莫聖於堯加有舜禹稷契佐之莫明於舜而有夔龍縉雲髙陽佐之莫哲於禹莫賢於湯莫察於文武莫敏於成康于時皆濟濟盈朝明明在位豈無獨見而可臆斷愼刑之道如斯不敢失明刑獄不可輕也凡至獄訟多在小人至於訟也皆欲已勝何則不勝罪戾隨之若是則君子時或妄訟於人未有小人而能自訟者片之為言偏也偏言一家之詞偏詞雖君子不足以信者矧非君子乎且先師曰人而無恆不可以作巫醫巫以鬼神占醫以筋脈體無恆之人筋脈且不足以自體而况有言乎鬼神不足以為占而况視聽乎以斯折獄也小則肌膚必有抶撲之濫焉大則性命必有鈇鎖之冤焉夫子祖述堯舜憲章文武師老聃而崇周公此六人無欲輕傷於人者夫子豈好輕傷哉脫夫子實為片言言可以折獄也不幾乎一言可以喪邦歟夫子之言非於季路賢者審之片言不可以折獄必然之理也自明誠論自性逹物曰誠自學逹誠曰明上聖述誠以啓明其次自明以得誠苟非將聖未有不由明而致誠者文武周孔自性而誠者也無其性不可而及矣顔子遊夏得誠自用者也有其明可得而至焉從古而還自明而誠者衆矣尹喜自明誠而長生孫弘自明誠而為卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴明之於誠猶玉待琢器用於是乎成故曰玉不琢不成器人不學不知道器者隱於不琢而見於琢者也誠者隱於不明而見乎明者也無有琢玉而不成器用明而不至誠焉嗚呼既明且誠施之身可以正百行而通神明處之家可以事父母而親弟兄遊於鄉可以睦閭里而寧訟爭行於國可以輯群臣而子黎氓立於朝可以上下序據於天下可以教化平明之於誠所恨不誠也苟誠也蹈水火其罔害彌天地而必答豈止君臣鄉黨之間乎父子兄弟之際乎大哉明誠也凡百君子有明也何不急夫誠先師有言曰生而知之者上所謂自性而誠者也又曰學而知之者次所謂自明而誠者也且仁遠乎哉我欲仁斯仁至矣夫然則自明而誠可致也苟致之也與自性而誠異派而同流矣知之者知之珍祥論漢武帝覽交門之歌顧謂東方大夫曰古人列后巍巍蕩蕩者則豫今日其庶幾乎東方大夫曰何謂也曰遠人率俾天降珍祥殷湯上感實獲白狼周成旁浹然致越裳放勛曰聖幸祀四方武乙不淑出有震亡豫享虞舜于九疑吊罷民乎盛唐登名山於華隂俯大川乎潯陽天淸地謐符應昭彰是曠迹交神致放勛之慶修身遠害免武乙之殃紫芝産於甘泉白麟呈於雍祠天馬生於渥窪之域寶鼎出於汾水之濵風雲草木相繼於時頭飛鼻飮之長涅齒穿􅎍之鯢絶域欵塞無月無之是多白狼之祉不少越裳之珍也比夫巍巍蕩蕩爾有何見而感焉東方大夫曰噫陛下誤意巍巍蕩蕩歟非古所謂巍巍蕩蕩者夫巍巍者德之容蕩蕩者化之稱非謂廣遊從於險阻幸髣佛於神祗録莫測於妖祥免偶然之壓溺致儻來之貢賦獲無用之戎狄耳且此之數者理不可馮亦明也秦皇帝周施天下不為德我太宗不下階闥不為微周懿死於牖下不為是虞舜崩於蒼梧不為非虢叔得神喪其國西伯無神人以歸龍降于庭夏道昧雉雊于鼎商祚輝苗民逆命堯以盛有緡來賔桀以衰以此觀之即虐如秦皇雖車轍遍于宇內不如太宗端拱於堂上也弱如周懿雖終於帷席不如虞舜之沒於草莽也淫如虢叔雖獲靈祐不如西伯無所禱祈也邪如孔甲雖有嘉祥不如武丁之妖怪也酷如夏桀雖異人屈膝不如唐堯域中之解體也天道沖融變化無窮發祥布象時異始而同終神理閟密吉凶罔測示形告兆亦同紀而異極有多瑞以表善有積慶以稔慝有無災以厚毒有見眚以警德今多瑞多慶不知天之表善歟其稔慝歟無災無眚不知神之厚毒歟其亦警德歟以是先王或不致珍祥而有天下或屢服蠻夷而覆宗社或有鴻災巨眚國以寧或有靈蹤異迹而身以傾珍祥之實乍凶乍吉妖怪之蹤乍吉乍凶譬諸藥工也其有活人之者亦有殺人之者焉譬諸酒醴也雖有敗人之道固有成人之道焉武帝曰若之何而信之曰唯德可以信之欽若上帝輯寧下民其表善也雖休勿休則百福是遒其稔慝也將覆不覆則轉禍為福且人神之主天地之心也孰為妖怪神祗也孰為珍祥天地也者茍修德以待人未有主人怡悅而客忿怒心善而形為惡也若有其德日覩妖怪其巍巍也若無其德日對珍祥其未蕩蕩也武帝矍然斂膝而言曰善矣哉微而體大珍祥不必利妖怪不必害而今而後以二者棄乎道德之外勑內府詔宗伯加東方大夫命一等而贈之束帛歐陽行周文集卷第六
