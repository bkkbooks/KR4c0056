body:
  text: 歐陽行周文集卷第三雜著益昌行並序貞元年中天子以工部郎中興元少尹吳興沈公長源牧利州其為政五年豫旅遊由于利覩人安俗阜欽所以美作詩一章利州故益昌郡也目曰益昌行詩曰驅馬至益昌倍驚風俗和耕夫壟上謠負者途中歌處處川復原重重山與河人煙遍餘田時稼無間坡問業一何修太守德化加問身一何安太守恩懷多賢哉我太守在古無以過愛人甚愛子理邦如理家雲雷既奮騰草木遂萌芽乃知良二千德足為國華今時固精求漢帝非徒嗟四氣有靑春衆植佇楊葩期當作説霖天下同滂沱題華十二判官汝州宅內亭並序覩居處玩好則才不才了然可知如華斯亭華豈常人歟規晝既髙圬塓有潔媚以花草淸以竹木綺罽菴淡琅玕森然墻外人寰入門雲林使人心以之間神以之遠華朝於斯夕於斯心不朗神不王其可得乎則虛廓其靈恬淡其性由才不才矣非逃名遠世方曰冥搜賢哉華未展襟懷視於期則昭然在前矣豫既遊且尚詩以美之衆君子其以為然亦宜相廣詩曰高居勝景誰能有佳意幽情共可歡新栁搖門靑翡翠修篁浮徑碧琅玕步兵阮籍空除屛彭澤陶潛謾挂冠只在城隍也趨府豈如吾子道斯安奉和太原鄭中丞登龍興寺閣靑窗朱戶半天開極目凝神望幾回晉國頽墉生草樹皇家瑞氣在樓臺千條水入黃河去萬點山從紫塞來獨恨侍遊違長者不知高意是誰陪太原和嚴長官八月十五日夜西山童子上方玩月寄嚴中丞少尹西寺碧雲端東𬈑白雪團年來一夜玩君在半天看素魄當懷上淸光在下寒宜裁濟江什有阻惠連歡覩亡友李三十觀秭歸鎮壁題詩處舊友親題壁上詩傷看緣迹不緣詞門前猶是長安道無復回車下筆時題秦嶺南下斯須隔帝鄉北行一步掩南方悠悠煙景兩邉意蜀客秦人各斷腸自南山却赴京師石臼嶺頭即事寄嚴僕射鳥企蛇盤地半天下窺十仞到浮煙因高回望沾恩處認得梁州落日邊與洪孺卿自梁州回途中經駱谷見野果有閩中懸壺子既同採摘用呈之洪亦閩人靑苞未實忽離離摘得盈筐淚更垂上德同之豈無意故園山路一枝枝出蜀門北客今朝出蜀門翛然領得入時魂遊人莫道歸來易三不曾聞古老言韋晤宅聽歌服製虹霓鬢似雲蕭郎屋裏上淸人等間逐酒傾杯樂飛盡虹梁一夜塵與林藴同之蜀途次嘉陵江認得越鳥聲呈林林亦閩中人也正是閩中越鳥聲幾回留聽暗沾纓傷心激念君深淺共有離卿萬里情送聞上人遊嵩山二室峯峯昔願遊從雲從鶴思悠悠丹梯石磴君先去為上靑冥最上頭永安寺照上人房草席蒲團不掃塵松間石上似無人群隂欲午鐘聲動自煮溪𬞞養幻身讀周太公傳論兵去商虐講德興周道屠沽未遇時豈異茲川老山中老僧笑向來人話古時繩床竹杖自扶持秋深頭冷慵將剃白黑蒼然髮到眉贈魯山李明府外戶通宵不閉關抱孫弄子萬家間若將邑號稱賢宰又是皇唐李魯山泉州赴上都洛湯亭留别舍弟及故人天長地濶多岐路身郎飛蓬共水萍匹馬將驅豈容易弟兄親故滿離亭送張驃騎邠寧行營寶馬雕弓金僕姑龍驤虎視出皇都揚鞭莫怪輕胡虜曾在漁陽敵萬夫題梨嶺南北風煙即異方連峯危棧倚蒼蒼哀猿咽水偏高處誰不沾衣望故鄉題第五司戶侍御曾稱野鶴比群公忽作長松向府中驄馬不騎人不識泠然三尺别生風秋夜寄弘濟上人尚被浮名誘此身今時誰與德為鄰遙知是夜檀溪上月照千峯為一人觀送葬何事悲酸淚滿巾浮生共是北邙塵他時不見北山路死者還曾哭送人宿建溪中宵即事蕯藭一席眠還坐蛙噪螢飛夜未央僮僕舟人空寂寂隔簾微月入中倉建溪行待陳詡豫先發福州陳詡發中路待之不得偕行那得會心期先者貪前後者遲空憶麗詞能狀物每看奇異但相思題王明府郊亭日日郊亭啓竹扉論桑勸稼是常機山城要得牛羊下方與農人分背歸塞上行聞説胡兵欲利秋昨來投筆到營州驍雄巳許將軍用邊塞無勞天子憂回別業留别郭中諸公千山江上背斜暉一徑中峯見所歸不信扁舟回在晚宿雲先巳到柴扉九日廣陵同陳十五先輩登高懷林十二先輩客路重陽日登高寄上樓風煙今令節臺閣古雄州泛菊聊斟酒持茰懶插頭情人共惆悵良久不同遊九日廣陵登高懷邵二先輩簮茰泛菊俯平阡飮過三杯却惘然十歲此辰同醉友登高各處巳三年薛舍人使君觀察韓判官侍御許雨晴到所居既霽先呈即事江皋昨夜雨收梅江南夏雨日海寂寂衡門與釣臺西島落花隨水至前山飛鳥出雲來觀風駟馬能言駐行縣雙旌許暫回豈不偶然聊為竹空令石徑掃莓苔除夜侍酒呈諸兄示舍弟莫歎明朝又一春相看堪共貴茲身悠悠寰宇同今夜膝下傳杯有幾人元日陪早朝斗柄東回歲又新邃旒南靣挹來賔和光髣佛樓臺曉休氣氛氲天地春儀籥不唯丹穴鳥稱觴半是越裳人江皋腐草今何幸亦與恆星拱北辰題延平劒潭想象精靈欲見難通津一去水漫漫空餘昔日凌霜色長與澄潭生晝寒曉泊漳州營頭亭回峯疊嶂繞亭隅散點煙霜勝畫圖曰暮華軒卷長箔太淸雲上送蓬壺答韓十八駑驥吟韓詩云駑駘誠齷齪市者何其稠力小苦難制價微良易酬渴飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔驅牽入市門行者不為留借問價幾何黃金比嵩丘借問行幾何咫尺視九州飢食王山禾渴飮醴泉流問誰能為御曠世不花妍異無材實資手植階墀前梗楠十圍瑰松柏百尺堅罔念棟梁功野長丘墟邊傷哉昌黎韓焉得不迍邅上帝本厚生大君方建元實將庇群氓庶此規崇軒班爾圖永安掄擇其精專君看廣厦中豈有庭前萱智逹上人水精念珠歌水巳淸淸中不易當其精精華極何宜更復加磨拭良工磨拭成貫珠泓澄洞徹看如無星輝月耀莫之逾駭雞照乘徒稱殊上人念佛泛真諦一佛一珠以為計既指其珠當佛身亦欲殊明佛像智咨董母訪朱公得之玓瓅群奇中龍龕鷲嶺長隨躬朝自守持纎掌透夜來月照紅絛空窮川極陸難為寶孰説車渠將瑪瑙連連寒溜下隂軒熒熒泫露垂秋草皎晶晶彰煌煌陸離電烻紛不常凌眸暈目生光芒我來借問修行術數日殷勤羡茲物上人視日授微言心淨如斯即諸佛贈山南嚴兵馬使即僕射堂弟也為鴈為鴻弟與兄如雕如鶚傑連英天旋地轉煙雲黑共鼓長風六合淸歐陽行周文集卷第三
