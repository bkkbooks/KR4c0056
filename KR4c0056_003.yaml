body:
  text: 歐陽行周文集卷第三雜著益昌行幷序貞元年中天子以工部郎中興元少尹吳興沈公長源牧利州其爲政五年予旅遊由于利覩人安俗阜欽所以美作詩一章利州故益昌郡也目曰益昌行詩曰驅馬至益昌倍驚風俗和耕夫壟上謠負者途中歌處處川復原重重山與河人煙遍餘田時稼無閑坡問業一何脩太守德化加問身一何安太守恩懷多賢哉我太守在古無以過愛人甚愛子理邦如理家雲雷旣奮騰草木遂萌芽乃知良二千德足爲國華今時固精求漢帝非徒嗟四氣有靑春衆植佇楊葩期當作說霖天下同滂沲題華十二判官汝州宅内亭幷序覩居處翫好則才不才了然可知如華斯亭華豈常人歟規晝旣髙圬塓有潔媚以花草淸以竹木綺罽菴澹琅玕森然墻外人寰入門雲林使人心以之閒神以之遠華朝於斯夕於斯心不朗神不王其可得乎則虛廓其靈恬淡其性由才不才矣非逃名遠世方曰㝠搜賢哉華未展襟懷視於期則昭然在前矣予旣遊且尚詩以美之衆君子其以爲然亦宜相廣詩曰高居勝景誰能有佳意幽情共可歡新栁摇門靑翡翠脩篁浮徑碧琅玕歩兵阮籍空除屛彭澤陶潜謾掛冠只在城隍也趨府豈如吾子道斯安奉和太原鄭中丞登龍興寺閣靑窓朱戸半天開極目凝神望㡬廻晉國頽墉生草樹皇家瑞氣在樓臺千條水入黃河去萬點山從紫塞來獨恨侍遊違長者不知高意是誰陪太原和嚴長官八月十五日夜西山童子上方翫月寄嚴中丞少尹西寺碧雲端東𬈑白雪團年來一夜翫君在半天看素魄當懷上淸光在下寒宜裁濟江什有阻惠連歡覩亡友李三十觀秭歸鎭壁題詩處舊友親題壁上詩傷看緣跡不緣詞門前猶是長安道無復廻車下筆時題秦嶺南下斯須隔帝鄕北行一歩掩南方悠悠煙景兩邉意蜀客秦人各斷腸自南山却赴京師石臼嶺頭即事寄嚴僕射鳥企虵盤地半天下窺十仞到浮煙因高廻望沾恩處認得梁州落日邊與洪孺卿自梁州廻途中經駱谷見野果有閩中懸壺子旣同採摘用呈之洪亦閩人靑苞未實忽離離摘得盈筐淚更垂上德同之豈無意故園山路一枝枝出蜀門北客今朝出蜀門翛然領得入時魂遊人莫道歸來易三不曾聞古老言韋晤宅聽歌服製虹霓鬢似雲蕭郎屋裏上淸人等閑逐酒傾杯樂飛盡虹梁一夜塵與林藴同之蜀途次嘉陵江認得越鳥聲呈林林亦閩中人也正是閩中越鳥聲幾廻留聽暗沾纓傷心激念君深淺共有離卿萬里情送聞上人遊嵩山二室峯峯昔願遊從雲從鶴思悠悠丹梯石磴君先去爲上靑㝠最上頭永安寺照上人房草席蒲團不掃塵松間石上似無人群隂欲午鐘聲動自煑溪𬞞養幻身讀周太公傳論兵去商虐講德興周道屠沽未遇時豈異玆川老山中老僧笑向來人話古時繩床竹杖自扶持秋深頭冷慵將剃白黑蒼然髮到眉贈魯山李明府外戸通宵不閉關抱孫弄子萬家閑若將邑號稱賢宰又是皇唐李魯山泉州赴上都洛湯亭留别舍弟及故人天長地濶多岐路身郎飛蓬共水萍疋馬將驅豈容易弟兄親故滿離亭送張驃騎邠寧行營寳馬琱弓金僕姑龍驤虎視岀皇都揚鞭莫恠輕胡虜曾在漁陽敵萬夫題梨嶺南北風煙即異方連峯危棧倚蒼蒼哀猿咽水偏高處誰不沾衣望故鄕題第五司戸侍御曾稱野鶴比群公忽作長松向府中驄馬不騎人不識泠然三尺别生風秋夜寄弘濟上人尚被浮名誘此身今時誰與德爲鄰遥知是夜檀溪上月照千峯爲一人觀送葬何事悲酸淚滿巾浮生共是北邙塵他時不見北山路死者還曾哭送人宿建溪中宵即事蕯藭一席眠還坐蛙噪螢飛夜未央僮僕舟人空寂寂隔簾微月入中倉建溪行待陳詡予先發福州陳詡發中路待之不得偕行䢷得會心期先者貪前後者遲空憶麗詞能狀物每看奇異但相思題王明府郊亭日日郊亭啓竹扉論桑勸稼是常機山城要得牛羊下方與農人分背歸塞上行聞說胡兵欲利秋昨來投筆到營州驍雄巳許將軍用邊塞無勞天子憂廻別業留别郭中諸公千山江上背斜暉一徑中峯見所歸不信扁舟廻在晩宿雲先巳到柴扉九日廣陵同陳十五先軰登高懷林十二先軰客路重陽日登高寄上樓風煙今令節臺閣古雄州泛菊聊斟酒持茰懶挿頭情人共惆悵良乆不同遊九日廣陵登高懷邵二先軰簮茰泛菊俯平阡飮過三杯却惘然十歲此辰同醉友登高各處巳三年薛舍人使君觀察韓判官侍御許雨晴到所居旣霽先呈即事江皐昨夜雨收梅江南夏雨日海寂寂衡門與釣臺西島落花随水至前山飛鳥岀雲來觀風駟馬能言駐行縣雙旌許蹔廻豈不偶然聊爲竹空令石逕掃莓苔除夜侍酒呈諸兄示舍弟莫歎明朝又一春相看堪共貴玆身悠悠寰宇同今夜膝下傳杯有㡬人元日陪早朝斗柄東廻歲又新邃旒南靣挹來賔和光髣髴樓臺暁休氣氛氲天地春儀籥不唯丹穴鳥稱觴半是越裳人江皐腐草今何幸亦與恒星拱北辰題延平劒潭想象精靈欲見難通津一去水漫漫空餘昔日凌霜色長與澄潭生晝寒曉泊漳州營頭亭廻峯疊嶂遶亭隅散點煙霜勝畫圖曰暮華軒卷長箔太淸雲上送蓬壺荅韓十八駑驥吟韓詩云駑駘誠齷齪市者何其稠力小苦難制價微良易酬渇飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔驅牽入市門行者不爲留借問價㡬何黃金比嵩丘借問行幾何咫尺視九州飢食王山禾渇飮醴泉流問誰能爲御曠世不花妍異無材實資手植堦墀前梗楠十圍瑰松栢百尺堅罔念棟梁功野長丘墟邊傷哉昌黎韓焉得不迍邅上帝本厚生大君方建元實將庇群甿庶此規崇軒班爾圖永安掄擇其精專君看廣厦中豈有庭前萱智逹上人水精念珠歌水巳淸淸中不易當其精精華極何宜更復加磨拭良工磨拭成貫珠泓澄洞澈看如無星輝月耀莫之逾駭雞照乗徒稱殊上人念佛泛眞諦一佛一珠以爲計旣指其珠當佛身亦欲殊明佛像智咨董母訪朱公得之玓瓅群奇中龍龕鷲嶺長随躬朝自守持纎掌透夜來月照紅絛空窮川極陸難爲寳孰說車渠將瑪碯連連寒溜下隂軒熒熒泫露垂秋草皎晶晶彰煌煌陸離電烻紛不常凌眸暈目生光芒我來借問脩行術數日殷勤羡玆物上人視日授微言心凈如斯即諸佛贈山南嚴兵馬使即僕射堂弟也爲鴈爲鴻弟與兄如鵰如鶚傑連英天旋地轉煙雲黑共鼔長風六合淸歐陽行周文集卷第三
